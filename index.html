<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CashFlux</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b1020;
        color: #e5e9f0;
        -webkit-font-smoothing: antialiased;
      }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        font-size: 0.95rem; color: #94a3b8; transition: opacity 0.2s ease;
      }
      #boot.hidden { opacity: 0; pointer-events: none; }
      #boot .dot { animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
      #boot-error {
        display: none; position: fixed; inset: auto 1rem 1rem 1rem;
        background: #3b0d0d; color: #fecaca; border: 1px solid #7f1d1d;
        padding: 0.75rem 1rem; border-radius: 0.5rem; font-family: ui-monospace, monospace;
        font-size: 0.8rem; white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <!-- First-pixel placeholder shown until the wasm app mounts into #app. -->
    <div id="boot"><span>Loading CashFlux<span class="dot">…</span></span></div>
    <div id="app"></div>
    <div id="boot-error"></div>

    <script src="./wasm_exec.js"></script>
    <script>
      (function () {
        const boot = document.getElementById("boot");
        const app = document.getElementById("app");
        const errorBox = document.getElementById("boot-error");

        // Hide the boot placeholder once the app renders something into #app.
        if (app && typeof MutationObserver === "function") {
          const obs = new MutationObserver(function () {
            if (app.children.length > 0) {
              boot.classList.add("hidden");
              obs.disconnect();
            }
          });
          obs.observe(app, { childList: true });
        }

        if (typeof Go !== "function") {
          errorBox.style.display = "block";
          errorBox.textContent = "wasm_exec.js failed to load (Go runtime glue missing).";
          return;
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("./bin/main.wasm"), go.importObject)
          .then(function (result) { go.run(result.instance); })
          .catch(function (err) {
            errorBox.style.display = "block";
            errorBox.textContent = "Failed to start CashFlux wasm app:\n" + String(err);
            console.error(err);
          });
      })();
    </script>
  </body>
</html>
