<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CashFlux</title>

    <!-- PWA: installable, standalone, dark theme -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Design system (candidate C): Inter for UI, Fraunces for display headings + figures -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Candidate-C palette + type scale. Kept in lockstep with design/candidate-c.html.
      tailwind.config = { theme: { extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'], display: ['Fraunces','Georgia','serif'] },
        colors: {
          base:'#0e0e0f', tile:'#121214', line:'#232325', hover:'#161617',
          fg:'#f4f4f5', dim:'#a6a6ac', faint:'#6c6c72',
          up:'#54b884', down:'#d8716f', warn:'#cfa14e',
        },
      } } }
    </script>

    <style>
      :root {
        /* Retargeted to the candidate-C palette so the legacy screen components
           (cards, stats, rows, forms) match the new bento shell. */
        --bg: #0e0e0f;
        --bg-elev: #1a1a1d;
        --bg-card: #121214;
        --border: #2a2a2c;
        --text: #f4f4f5;
        --text-dim: #a6a6ac;
        --text-faint: #888890;
        --accent: #54b884;
        --accent-dim: #1f2c24;
        --brand: #7c83ff;
        --danger: #d8716f;
        --radius: 4px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* Boot loader: an on-brand animated mark while the wasm downloads and
         instantiates. Fades + lifts away once the app mounts. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: var(--bg); z-index: 10;
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      #boot.hidden { opacity: 0; transform: scale(1.03); pointer-events: none; }
      .boot-card { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
      .boot-mark { position: relative; width: 64px; height: 64px; display: grid; place-items: center; }
      .boot-ring { position: absolute; inset: 0; width: 64px; height: 64px; animation: boot-spin 1.15s linear infinite; }
      .boot-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
      .boot-ring-arc {
        fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
        stroke-dasharray: 70 126; stroke-dashoffset: 0;
      }
      .boot-c {
        font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 1.6rem;
        color: var(--text); line-height: 1; animation: boot-breathe 1.8s ease-in-out infinite;
      }
      .boot-word {
        font-family: "Fraunces", Georgia, serif; font-size: 1.15rem; font-weight: 600;
        letter-spacing: 0.01em; color: var(--text); opacity: 0; animation: boot-fade-up 0.6s ease 0.1s forwards;
      }
      .boot-sub {
        font-size: 0.82rem; color: var(--text-faint); opacity: 0;
        animation: boot-fade-up 0.6s ease 0.25s forwards;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-breathe { 0%,100% { opacity: 0.55; transform: scale(0.97); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes boot-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      /* Display scale: zoom the whole app by the user's preference (default 1). */
      #app { zoom: var(--ui-scale, 1); }
      /* Skip-to-content link: off-screen until keyboard-focused. */
      .skip-link { position: absolute; left: 8px; top: -48px; z-index: 200; background: var(--bg-elev);
        color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.8rem;
        font-size: 13px; text-decoration: none; transition: top .12s ease; }
      .skip-link:focus { top: 8px; }
      @media (prefers-reduced-motion: reduce) { .skip-link { transition: none; } }
      /* Visible focus ring for keyboard users on every interactive element (both themes). */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
      [role="switch"]:focus-visible, [role="radio"]:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
      }
      /* App settle-in: a calm fade + slight lift/scale once mounted. */
      #app.app-enter { animation: app-settle 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes app-settle {
        from { opacity: 0; transform: translateY(10px) scale(0.992); }
        to   { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot, #boot.hidden { transition: opacity 0.2s ease; transform: none; }
        .boot-ring, .boot-c, .boot-word, .boot-sub, #app.app-enter { animation: none; opacity: 1; }
        /* No motion: the dialog appears in place (no flip/lift), the toast doesn't
           slide in, and the rail resizes instantly. */
        .flip-inner, .flip-backdrop { transition: none; }
        .toast { animation: none; }
        aside.rail { transition: none; }
      }
      #boot-error {
        display: none; position: fixed; inset: auto 1rem 1rem 1rem; z-index: 20;
        background: #3b0d0d; color: #fecaca; border: 1px solid #7f1d1d;
        padding: 0.75rem 1rem; border-radius: 8px; font-family: ui-monospace, monospace;
        font-size: 0.8rem; white-space: pre-wrap;
      }

      /* App shell */
      .app { min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 5;
        display: flex; align-items: center; gap: 1.25rem;
        padding: 0.75rem 1.25rem; background: rgba(11,16,32,0.85);
        backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }
      .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; white-space: nowrap; }
      .brand-mark {
        display: grid; place-items: center; width: 1.6rem; height: 1.6rem;
        background: var(--accent); color: #052e13; border-radius: 8px; font-weight: 900;
      }
      .brand-name { font-size: 1.05rem; letter-spacing: -0.01em; }
      .nav { display: flex; gap: 0.25rem; flex-wrap: nowrap; }
      .nav-link {
        appearance: none; border: 0; background: transparent; color: var(--text-dim);
        font: inherit; font-size: 0.9rem; padding: 0.4rem 0.7rem; border-radius: 8px;
        cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s;
      }
      .nav-link:hover { background: var(--bg-elev); color: var(--text); }
      .nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

      /* Page */
      .page { width: 100%; max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
      .page-head { margin-bottom: 1.5rem; }
      .page-title { margin: 0; font-size: 1.6rem; letter-spacing: -0.02em; }
      .page-sub { margin: 0.25rem 0 0; color: var(--text-dim); }

      /* Cards & bits */
      .card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      }
      /* Spending highlights (Insights anomaly cards) */
      .insight-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
      .insight-row { display: flex; align-items: flex-start; gap: 0.6rem; margin: 0; line-height: 1.45; }
      .insight-dot { flex: none; font-weight: 800; font-size: 1.05rem; line-height: 1.35; }
      /* Compact density: tighter cards, rows, and fields (set via data-density on <html>). */
      [data-density="compact"] .card { padding: 0.7rem 0.8rem; margin-bottom: 0.6rem; }
      [data-density="compact"] .card-title { margin-bottom: 0.45rem; }
      [data-density="compact"] .row { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      [data-density="compact"] .field, [data-density="compact"] .btn { padding-top: 0.35rem; padding-bottom: 0.35rem; }

      /* Light theme (set via data-theme="light" on <html>). Overrides the legacy
         palette variables, the shell's Tailwind utility colors, and the widgets'
         hardcoded surface hexes. The user accent (--accent) is left untouched. */
      [data-theme="light"] {
        --bg: #f7f6f3; --bg-elev: #efede8; --bg-card: #ffffff;
        --border: #e4e2dd; --text: #1c1c1e; --text-dim: #56565c; --text-faint: #686870;
        --accent-dim: #e4f3ea;
      }
      [data-theme="light"] .bg-base { background-color: #f7f6f3; }
      [data-theme="light"] .bg-tile { background-color: #ffffff; }
      [data-theme="light"] .bg-hover, [data-theme="light"] .hover\:bg-hover:hover { background-color: #efede8; }
      [data-theme="light"] .text-fg { color: #1c1c1e; }
      [data-theme="light"] .text-dim { color: #56565c; }
      [data-theme="light"] .text-faint { color: #686870; }
      [data-theme="light"] .border-line, [data-theme="light"] .border-r, [data-theme="light"] .border-b { border-color: #e4e2dd; }
      [data-theme="light"] .bg-\[\#1c1c1e\] { background-color: #ececec; color: #1c1c1e; }
      [data-theme="light"] .bg-fg { background-color: #1c1c1e; }
      [data-theme="light"] .text-base { color: #f7f6f3; }
      /* Widget shell, segmented + stepper pills, nav hover */
      [data-theme="light"] .w { background: #ffffff; border-color: #e4e2dd; }
      [data-theme="light"] .nav:hover { background: #efede8; color: #1c1c1e; }
      [data-theme="light"] .seg, [data-theme="light"] .rpill { background: #efede8; border-color: #e4e2dd; }
      [data-theme="light"] .seg-btn, [data-theme="light"] .rstep { color: #56565c; }
      [data-theme="light"] .seg-btn.active { background: #ffffff; color: #1c1c1e; }
      [data-theme="light"] .gear-inline, [data-theme="light"] .gear-abs, [data-theme="light"] .menu-btn { color: #8a8a90; }
      /* Flip panel + settings controls */
      [data-theme="light"] .flip-face, [data-theme="light"] .set-face { background: #ffffff; border-color: #e4e2dd; }
      [data-theme="light"] .set-input, [data-theme="light"] .member-chip, [data-theme="light"] .rate-row .rate-in, [data-theme="light"] .data-btn { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .switch { background: #d4d2cc; }
      [data-theme="light"] .switch::after { background: #ffffff; }
      /* Scrollbars */
      [data-theme="light"] main.cf-scroll::-webkit-scrollbar-thumb { background: #cfcdc7; border-color: #f7f6f3; }
      .card-title { margin: 0 0 0.75rem; font-size: 1.05rem; }
      .muted { color: var(--text-dim); margin: 0.25rem 0; }
      .empty { color: var(--text-faint); font-style: italic; }
      .badge {
        display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 999px;
      }
      .badge-soon { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }

      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
      .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
      .stat-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; }
      .stat-value.pos { color: var(--accent); }
      .stat-value.neg { color: var(--danger); }

      /* Rows */
      .rows { display: flex; flex-direction: column; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.6rem 0; border-top: 1px solid var(--border); }
      .row:first-child { border-top: 0; }
      .row-main { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; flex: 1; }
      .row-desc { font-weight: 500; }
      .row-meta { color: var(--text-dim); font-size: 0.82rem; }
      .amount { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
      .amount-income { color: var(--accent); }
      .amount-expense { color: var(--danger); }

      /* Forms */
      .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.6rem; align-items: end; }
      .field { width: 100%; padding: 0.5rem 0.6rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font: inherit; }
      .field:focus { outline: none; border-color: var(--accent); }
      /* Native color picker rendered as a proper swatch (a bare-width text field
         clipped it to a thin line). */
      .color-input { width: 46px; height: 34px; padding: 3px; background: var(--bg-elev);
        border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
      .color-input::-webkit-color-swatch-wrapper { padding: 0; }
      .color-input::-webkit-color-swatch { border: none; border-radius: 5px; }
      /* Small color dot shown beside a category name. */
      .cat-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
        display: inline-block; align-self: center; }
      .btn { padding: 0.55rem 0.9rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); font: inherit; font-weight: 500; cursor: pointer; transition: filter 0.12s; }
      .btn:hover { filter: brightness(1.12); }
      .btn-primary { background: var(--accent); color: #052e13; border-color: var(--accent); font-weight: 600; }
      .btn-del { background: transparent; border: 0; color: var(--text-faint); cursor: pointer; font-size: 1rem; padding: 0 0.3rem; }
      .btn-del:hover { color: var(--danger); }
      /* WCAG 2.5.8 (AA): small icon-only buttons get at least a 24x24 hit area,
         with the glyph centered, so they're comfortably tappable. */
      .btn-del, .toast-x, .rstep, .set-close {
        min-width: 24px; min-height: 24px; display: inline-grid; place-items: center;
      }
      .err { color: #fca5a5; margin: 0.6rem 0 0; font-size: 0.88rem; }

      /* Visually hidden but available to screen readers (e.g. an idle live region). */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }

      /* App-wide toast notice (bottom-center) */
      .toast {
        position: fixed; left: 50%; bottom: 1.25rem; transform: translateX(-50%);
        z-index: 60; max-width: min(92vw, 32rem); display: flex; align-items: center;
        gap: 0.75rem; padding: 0.7rem 0.9rem; border-radius: 10px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        font-size: 0.9rem; animation: toast-in 160ms ease-out;
      }
      .toast-err { border-color: var(--danger); }
      .toast-err .toast-msg { color: var(--danger); }
      .toast-msg { flex: 1; }
      .toast-x {
        flex: none; border: 0; background: transparent; color: inherit; cursor: pointer;
        font-size: 1.2rem; line-height: 1; opacity: 0.7; padding: 0 0.15rem;
      }
      .toast-x:hover { opacity: 1; }
      @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 0.5rem); } to { opacity: 1; transform: translate(-50%, 0); } }

      /* Budgets */
      .budget { padding: 0.7rem 0; border-top: 1px solid var(--border); }
      .budget:first-child { border-top: 0; }
      .budget-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; }
      .budget-amount { font-variant-numeric: tabular-nums; color: var(--text-dim); white-space: nowrap; }
      .budget-sub { color: var(--text-dim); font-size: 0.82rem; }
      .bar { height: 8px; background: var(--bg-elev); border-radius: 999px; overflow: hidden; margin: 0.45rem 0 0.35rem; }
      .bar-fill { height: 100%; background: var(--accent); border-radius: 999px; }
      .bar-fill.near { background: #f59e0b; }
      .bar-fill.over { background: var(--danger); }

      /* To-do */
      .field-wide { grid-column: 1 / -1; }
      .check { background: transparent; border: 0; color: var(--text-dim); cursor: pointer; font-size: 1.15rem; padding: 0 0.5rem 0 0; line-height: 1; }
      .check:hover { color: var(--accent); }
      .row.done .row-desc { text-decoration: line-through; color: var(--text-faint); }
      .task-meta { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.15rem; }
      .badge-prio { font-size: 0.68rem; }
      .prio-high { background: #3b0d0d; color: #fca5a5; border: 1px solid #7f1d1d; }
      .prio-med { background: #2a230c; color: #fcd34d; border: 1px solid #854d0e; }
      .prio-low { background: #0c2a17; color: #86efac; border: 1px solid #166534; }
    </style>

    <!-- ============================================================
         Candidate-C design system — ported verbatim from
         design/candidate-c.html. Drives the bento dashboard shell.
         Keep selectors in sync with that reference mockup.
         ============================================================ -->
    <style id="design-system">
      body.cf { -webkit-font-smoothing: antialiased; }
      .fig { font-variant-numeric: tabular-nums lining-nums; }
      .nav:hover { background:#161617; color:#f4f4f5; }

      /* Bento grid — square outlined cells with a small gap.
         One base cell unit; every row is exactly one unit so widgets integer-scale. */
      .bento { display:grid; --cell:152px; grid-template-columns: repeat(4, minmax(0,1fr)); grid-template-rows: repeat(8, var(--cell)); gap:10px; }
      .w { position:relative; background:#121214; border:1px solid #34343a; overflow:hidden; display:flex; flex-direction:column; }
      .w:hover { border-color:#44444c; }
      .w.drag { opacity:.4; }

      /* reconfigure controls */
      .ghandle { position:absolute; top:7px; right:40px; z-index:3; color:#5a5a64; cursor:grab; font-size:.95rem; line-height:1; }
      .ghandle:active { cursor:grabbing; }
      .gear-inline { margin-left:auto; color:#5a5a64; background:transparent; border:0; cursor:pointer; font-size:.95rem; line-height:1; }
      .gear-inline:hover { color:#f4f4f5; }
      .gear-abs { position:absolute; top:7px; right:16px; z-index:3; color:#5a5a64; background:transparent; border:0; cursor:pointer; font-size:.95rem; line-height:1; }
      .gear-abs:hover { color:#f4f4f5; }

      /* time resolution + range controls */
      .seg { display:inline-flex; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:2px; }
      .seg-btn { padding:.32rem .72rem; border-radius:3px; font-size:.8rem; color:#a6a6ac; background:transparent; border:0; cursor:pointer; }
      .seg-btn:hover { color:#f4f4f5; }
      .seg-btn.active { background:#2a2a30; color:#f4f4f5; }
      .rcap { font-size:.66rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; }
      .rpill { display:inline-flex; align-items:center; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:.2rem .25rem; }
      .rstep { background:transparent; border:0; color:#a6a6ac; cursor:pointer; padding:0 .3rem; font-size:1rem; line-height:1; }
      .rstep:hover { color:#f4f4f5; }
      .rlabel { min-width:128px; text-align:center; font-size:.8rem; }

      /* resize handles — hidden until Shift is held (root gets data-resize), to
         keep the bento visually calm. Toggled by a global key listener in the app. */
      .rz { position:absolute; z-index:3; opacity:0; pointer-events:none; transition:opacity .15s ease; }
      [data-resize] .rz { opacity:1; pointer-events:auto; }
      .rz[data-dir="r"] { top:0; right:0; height:100%; width:11px; cursor:ew-resize; }
      .rz[data-dir="b"] { left:0; bottom:0; width:100%; height:11px; cursor:ns-resize; }
      .rz::after { content:""; position:absolute; background:#5a5a64; border-radius:3px; }
      .rz[data-dir="r"]::after { top:50%; right:2px; transform:translateY(-50%); width:3px; height:24px; }
      .rz[data-dir="b"]::after { left:50%; bottom:2px; transform:translateX(-50%); height:3px; width:24px; }
      .rz:hover::after { background:#9a9aa4; }

      /* dark, modern scrollbar for the scroll pane */
      main.cf-scroll { scrollbar-width: thin; scrollbar-color: #34343a transparent; scroll-behavior: smooth; }
      main.cf-scroll::-webkit-scrollbar { width: 11px; }
      main.cf-scroll::-webkit-scrollbar-track { background: transparent; }
      main.cf-scroll::-webkit-scrollbar-thumb { background: #2d2d33; border-radius: 999px; border: 3px solid #0e0e0f; background-clip: padding-box; }
      main.cf-scroll::-webkit-scrollbar-thumb:hover { background: #44444c; }
      main.cf-scroll::-webkit-scrollbar-thumb:active { background: #55555e; }

      /* Settings flip */
      .flip-backdrop { position:fixed; inset:0; background:rgba(4,4,6,.6); backdrop-filter:blur(3px); display:grid; place-items:center; opacity:0; transition:opacity .28s; z-index:50; }
      .flip-backdrop.show { opacity:1; }
      .flip-wrap { width:384px; max-width:92vw; height:470px; max-height:86vh; perspective:1500px; }
      .flip-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.2,.75,.2,1); transform:rotateY(0) scale(.86); }
      .flip-inner.flipped { transform:rotateY(180deg) scale(1); }
      .flip-face { position:absolute; inset:0; backface-visibility:hidden; border:1px solid #34343a; border-radius:4px; background:#121214; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 30px 70px -20px rgba(0,0,0,.75); }
      .flip-back { transform:rotateY(180deg); }
      .set-h { display:flex; align-items:center; gap:.5rem; padding:.85rem 1rem; border-bottom:1px solid #2a2a2c; }
      .set-h h3 { font-family:'Fraunces',serif; font-size:1.05rem; font-weight:600; flex:1; text-align:center; }
      .set-close { background:transparent; border:0; color:#8a8a92; cursor:pointer; font-size:.95rem; width:1.5rem; line-height:1; }
      .set-close:hover { color:#f4f4f5; }
      .set-body { flex:1; overflow-y:auto; padding:1rem; scrollbar-width:thin; scrollbar-color:#34343a transparent; }
      .set-body::-webkit-scrollbar { width:9px; } .set-body::-webkit-scrollbar-thumb { background:#2d2d33; border-radius:999px; border:2px solid #121214; }
      .set-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; margin:.7rem 0 .3rem; }
      .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:.55rem 0; border-bottom:1px solid #1f1f22; font-size:.9rem; }
      .switch { width:36px; height:21px; border-radius:999px; background:#34343a; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
      .switch::after { content:""; position:absolute; top:2px; left:2px; width:17px; height:17px; border-radius:50%; background:#9a9aa4; transition:.2s; }
      .switch.on { background:#3e7f5e; } .switch.on::after { left:17px; background:#e6f3ec; }
      .swatch { width:22px; height:22px; border-radius:6px; cursor:pointer; border:2px solid transparent; }
      .swatch.sel { border-color:#f4f4f5; }
      .set-input { width:100%; padding:.5rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; }
      .set-foot { padding:.75rem 1rem; border-top:1px solid #2a2a2c; display:flex; gap:.5rem; justify-content:flex-end; }
      .set-btn { min-width:96px; padding:.55rem 1rem; border-radius:4px; cursor:pointer; font-size:.9rem; }
      .set-btn.save { background:#1f2c24; border:1px solid #356b50; color:#7fd0a3; font-weight:600; }
      .set-btn.save:hover { background:#26382d; }
      .set-btn.cancel { background:transparent; border:1px solid #34343a; color:#a6a6ac; font-weight:500; }
      .set-btn.cancel:hover { color:#f4f4f5; border-color:#44444c; }

      /* squared progress bars (consistent radii) */
      .bento [class*="rounded-full"][class*="overflow-hidden"] { border-radius:2px; }

      /* sidebar collapse */
      aside.rail { transition:width .18s ease; }
      aside.rail.collapsed { width:58px; }
      aside.rail.collapsed .brand-name,
      aside.rail.collapsed .nv span,
      aside.rail.collapsed nav > div,
      aside.rail.collapsed .hh-text { display:none; }
      aside.rail.collapsed .nv { justify-content:center; gap:0; padding-left:0; padding-right:0; position:relative; }
      aside.rail.collapsed .railhead { padding-left:0; padding-right:0; justify-content:center; }
      aside.rail.collapsed .hh { justify-content:center; padding-left:0; padding-right:0; }
      /* Collapsed rail: reveal the label as a flyout on hover/focus without widening the rail. */
      aside.rail.collapsed .nv:hover > span,
      aside.rail.collapsed .nv:focus-visible > span,
      aside.rail.collapsed .nv:focus-within > span {
        display:block; position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%);
        white-space:nowrap; background:var(--bg-elev); color:var(--text);
        border:1px solid var(--border); border-radius:6px; padding:0.25rem 0.55rem;
        font-size:13px; line-height:1; box-shadow:0 6px 18px rgba(0,0,0,.28); z-index:60; pointer-events:none;
      }
      @media (prefers-reduced-motion: no-preference) {
        aside.rail.collapsed .nv:hover > span,
        aside.rail.collapsed .nv:focus-visible > span,
        aside.rail.collapsed .nv:focus-within > span { animation: rail-flyout .12s ease both; }
      }
      @keyframes rail-flyout { from { opacity:0; transform:translate(-4px,-50%); } to { opacity:1; transform:translateY(-50%); } }
      .menu-btn { background:transparent; border:0; color:#a6a6ac; cursor:pointer; display:grid; place-items:center; }
      .menu-btn:hover { color:#f4f4f5; }

      /* global settings panel bits */
      .member-chip { display:inline-flex; align-items:center; gap:.4rem; padding:.25rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; font-size:.8rem; }
      .member-add { padding:.25rem .6rem; border:1px dashed #3a3a40; border-radius:4px; color:#a6a6ac; font-size:.8rem; cursor:pointer; background:transparent; }
      .member-add:hover { color:#f4f4f5; }
      .rate-row { display:flex; align-items:center; gap:.6rem; padding:.25rem 0; font-size:.85rem; }
      .rate-row .rate-in { width:90px; padding:.35rem .5rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; text-align:right; }
      .data-btn { padding:.45rem .7rem; border:1px solid #34343a; border-radius:4px; color:#d6d6da; background:#1a1a1d; cursor:pointer; font-size:.82rem; }
      .data-btn:hover { border-color:#44444c; color:#f4f4f5; }

      /* unified widget header: grip (left) · title (center) · gear (right) */
      .wh { display:flex; align-items:center; gap:.55rem; padding:.7rem .85rem .55rem; }
      .wh h3 { font-family:'Fraunces',serif; font-size:1rem; font-weight:600; letter-spacing:-0.01em; flex:1; text-align:center; }
      .wh .grip { width:1.1rem; }
      .grip { cursor:grab; color:#4f4f55; }
      .wbody { padding:0 .85rem .85rem; flex:1; min-height:0; }
      .kpi { padding:.95rem 1rem; }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-card">
        <div class="boot-mark">
          <svg class="boot-ring" viewBox="0 0 64 64" aria-hidden="true">
            <circle class="boot-ring-track" cx="32" cy="32" r="28" />
            <circle class="boot-ring-arc" cx="32" cy="32" r="28" />
          </svg>
          <span class="boot-c">C</span>
        </div>
        <div class="boot-word">CashFlux</div>
        <div class="boot-sub">Getting your money in order…</div>
      </div>
    </div>
    <div id="app"></div>
    <div id="boot-error"></div>
    <button id="installBtn" type="button"
      style="display:none; position:fixed; bottom:1rem; right:1rem; z-index:30;
             padding:0.55rem 1rem; border-radius:4px; cursor:pointer; font: inherit; font-size:0.9rem;
             background:#1f2c24; border:1px solid #356b50; color:#7fd0a3;">Install CashFlux</button>

    <script>
      // PWA install prompt: surface an Install button when the browser offers one.
      (function () {
        var deferred = null;
        var btn = document.getElementById("installBtn");
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (btn) btn.style.display = "block";
        });
        if (btn) {
          btn.addEventListener("click", function () {
            if (!deferred) return;
            deferred.prompt();
            deferred.userChoice.then(function () {
              deferred = null;
              btn.style.display = "none";
            });
          });
        }
        window.addEventListener("appinstalled", function () {
          if (btn) btn.style.display = "none";
        });
      })();
    </script>

    <!-- D3 (pinned) + the chart shim the Go ui.Chart component drives. Loaded
         before the wasm boot so window.cashfluxRenderChart exists by first paint;
         both are service-worker cached for offline use. -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="./chart.js"></script>

    <script src="./wasm_exec.js"></script>
    <script>
      (function () {
        const boot = document.getElementById("boot");
        const app = document.getElementById("app");
        const errorBox = document.getElementById("boot-error");

        if (app && typeof MutationObserver === "function") {
          const obs = new MutationObserver(function () {
            if (app.children.length > 0) {
              app.classList.add("app-enter");
              boot.classList.add("hidden");
              obs.disconnect();
            }
          });
          obs.observe(app, { childList: true });
        }

        if (typeof Go !== "function") {
          errorBox.style.display = "block";
          errorBox.textContent = "wasm_exec.js failed to load (Go runtime glue missing).";
          return;
        }

        // Register the service worker for offline/installability (best-effort).
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./sw.js").catch(function () {});
          });
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("./bin/main.wasm"), go.importObject)
          .then(function (result) { go.run(result.instance); })
          .catch(function (err) {
            errorBox.style.display = "block";
            errorBox.textContent = "Failed to start CashFlux wasm app:\n" + String(err);
            console.error(err);
          });
      })();
    </script>
  </body>
</html>
