<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App base href, set before any relative asset is referenced, so a deep-link
         refresh (e.g. /p/taxes) resolves ./wasm_exec.js, ./bin/main.wasm, etc. to
         the app root instead of the current route's directory. On a *.github.io
         project site the app lives under /<repo>/, so derive the base from the
         first path segment there; everywhere else (local dev, custom domain) it's
         the server root. Must run first in <head>. -->
    <!-- STATIC base so the browser's preload scanner (which does not execute
         scripts) resolves ./assets against the server root, not the current SPA
         route's directory. A dynamically document.write()'n base was invisible to
         the scanner, so deep links like /p/<slug> fetched /p/d3.min.js → 404. The
         script below only *adjusts* this for *.github.io project sites (/<repo>/). -->
    <base href="/" />
    <script>
      (function () {
        if (location.hostname.endsWith("github.io")) {
          var seg = location.pathname.split("/")[1];
          if (seg) document.querySelector("base").setAttribute("href", "/" + seg + "/");
        }
      })();
    </script>

    <script>
      /* GX9-F3: apply the saved theme synchronously BEFORE the boot splash paints, so
         a light-mode user never sees a dark flash on cold start (WASM applies the theme
         too late, after mount). Mirrors uistate.resolveTheme: theme field on the
         cashflux:prefs store; "system" follows the OS color scheme. */
      (function () {
        try {
          var t = "dark", raw = localStorage.getItem("cashflux:prefs");
          if (raw) { var p = JSON.parse(raw); if (p && p.theme) t = p.theme; }
          if (t === "system") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) { /* default dark */ }
      })();
    </script>

    <title>CashFlux — Local-first household budgeting</title>

    <!-- SEO + link-share previews (C6). Copy mirrors manifest.webmanifest. og:image is the
         512px brand PNG (rasterized from favicon.svg) — social scrapers need a raster image. -->
    <meta name="description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights. Your data stays on your device." />
    <meta property="og:title" content="CashFlux" />
    <meta property="og:description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CashFlux" />
    <meta property="og:image" content="./icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CashFlux" />
    <meta name="twitter:description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights." />
    <meta name="twitter:image" content="./icon-512.png" />

    <!-- Brand icons (on-brand green "C" mirroring .brand-mark). SVG for crisp tabs; PNGs
         (rasterized from the SVG) for iOS home-screen + maskable PWA install (C306). -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="mask-icon" href="./favicon.svg" color="#2e8b57" />

    <!-- PWA: installable, standalone, dark theme -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Design system (candidate C): Inter for UI, Fraunces for display headings + figures.
         Self-hosted (web/fonts/, vendored from the css2 API) — a local-first / no-tracking app
         must NOT fetch fonts from Google's CDN at boot (privacy leak + would break offline). -->
    <link href="./fonts.css" rel="stylesheet" />
    <!-- Tailwind CDN removed (C91): all utility classes are now emitted by the typed
         Go `tw`/css vocabulary at runtime into <style id="gwc-css">. No external CSS
         dependency, works offline. The former tailwind.config palette/type tokens live
         in internal/ui/tw (exact hex) + the :root CSS variables below. -->

    <!-- All app CSS + design tokens now live as type-safe Go in internal/styles and are
         injected into <style id="cf-app-css"> at boot (app.Run -> styles.Register). The only
         CSS that stays inline is this minimal boot-critical block: the loading splash renders
         BEFORE the wasm (which owns the styles) downloads, so it uses literal colors with no
         token/var dependency. Keep in sync with the boot markup + the Go splash rules. -->
    <style id="boot-critical">
      *,::before,::after{box-sizing:border-box}
      html,body{margin:0;height:100%}
      body{background:#0e0e0f;color:#f4f4f5;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14.5px;line-height:1.45;-webkit-font-smoothing:antialiased}
      /* Page-shaped loading skeleton (#78): the boot layer previews the shell —
         rail, top bar, hero + tile grid — instead of a centered splash card, so
         the first paint already looks like the app that's about to appear. */
      #boot{position:fixed;inset:0;background:#0e0e0f;z-index:10;transition:opacity .45s ease,transform .45s ease}
      #boot.hidden{opacity:0;transform:scale(1.015);pointer-events:none}
      .sk-shell{display:flex;height:100%}
      .sk-rail{width:240px;flex:none;border-right:1px solid #1e1e21;padding:1rem .9rem;display:flex;flex-direction:column;gap:.65rem}
      .sk-brand{display:flex;align-items:center;gap:.5rem;margin-bottom:.9rem}
      .sk-mark{display:grid;place-items:center;width:1.6rem;height:1.6rem;background:#2e8b57;color:#052e13;border-radius:8px;font-weight:900;animation:sk-breathe 1.8s ease-in-out infinite}
      .sk-brand-word{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.05rem}
      .sk-block{border-radius:8px;background:linear-gradient(100deg,#1a1a1d 40%,#232327 50%,#1a1a1d 60%);background-size:200% 100%;animation:sk-shimmer 1.4s ease-in-out infinite}
      .sk-nav-item{height:1.9rem}
      .sk-main{flex:1;min-width:0;display:flex;flex-direction:column}
      .sk-topbar{display:flex;align-items:center;gap:.85rem;height:3.5rem;flex:none;border-bottom:1px solid #1e1e21;padding:0 1.5rem}
      .sk-title{width:9rem;height:1.15rem}
      .sk-chip{width:13rem;height:1.6rem;border-radius:999px}
      .sk-dot{width:1.6rem;height:1.6rem;border-radius:50%;margin-left:auto}
      .sk-dot~.sk-dot{margin-left:0}
      .sk-content{flex:1;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow:hidden}
      .sk-hero{height:11rem;border-radius:14px;flex:none}
      .sk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
      .sk-tile{height:9.5rem;border-radius:14px}
      .sk-sub{position:fixed;left:0;right:0;bottom:1.1rem;text-align:center;font-size:.82rem;color:#888890;animation:sk-breathe 1.8s ease-in-out infinite}
      @keyframes sk-shimmer{0%{background-position:120% 0}100%{background-position:-80% 0}}
      @keyframes sk-breathe{0%,100%{opacity:.55}50%{opacity:1}}
      @media (max-width:900px){.sk-grid{grid-template-columns:repeat(2,1fr)}}
      @media (max-width:640px){
        .sk-rail{display:none}
        .sk-grid{grid-template-columns:1fr}
        .sk-content{padding:1rem}
        .sk-tabbar{position:fixed;left:0;right:0;bottom:0;height:56px;border-top:1px solid #1e1e21;background:#151517;display:flex;align-items:center;justify-content:space-around;padding:0 .5rem}
        .sk-tab{width:2.4rem;height:2.1rem}
        .sk-sub{bottom:calc(56px + .9rem)}
      }
      @media (min-width:641px){.sk-tabbar{display:none}}
      [data-theme="light"] #boot{background:#f7f6f3;color:#1c1c1e}
      [data-theme="light"] .sk-rail,[data-theme="light"] .sk-topbar{border-color:#e4e2dd}
      [data-theme="light"] .sk-block{background:linear-gradient(100deg,#e9e7e2 40%,#f1efe9 50%,#e9e7e2 60%);background-size:200% 100%}
      [data-theme="light"] .sk-sub{color:#56565c}
      [data-theme="light"] .sk-tabbar{background:#f1efe9;border-color:#e4e2dd}
      #boot-error{display:none;position:fixed;inset:auto 1rem 1rem 1rem;z-index:20;background:#3b0d0d;color:#fecaca;border:1px solid #7f1d1d;padding:.75rem 1rem;border-radius:8px;font-family:ui-monospace,monospace;font-size:.8rem;white-space:pre-wrap}
    </style>
  </head>
  <body>
    <div id="boot" aria-hidden="true">
      <div class="sk-shell">
        <div class="sk-rail">
          <div class="sk-brand"><span class="sk-mark">C</span><span class="sk-brand-word">CashFlux</span></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
          <div class="sk-block sk-nav-item"></div>
        </div>
        <div class="sk-main">
          <div class="sk-topbar">
            <div class="sk-block sk-title"></div>
            <div class="sk-block sk-chip"></div>
            <div class="sk-block sk-dot"></div>
            <div class="sk-block sk-dot"></div>
            <div class="sk-block sk-dot"></div>
          </div>
          <div class="sk-content">
            <div class="sk-block sk-hero"></div>
            <div class="sk-grid">
              <div class="sk-block sk-tile"></div>
              <div class="sk-block sk-tile"></div>
              <div class="sk-block sk-tile"></div>
              <div class="sk-block sk-tile"></div>
              <div class="sk-block sk-tile"></div>
              <div class="sk-block sk-tile"></div>
            </div>
          </div>
        </div>
        <div class="sk-tabbar">
          <div class="sk-block sk-tab"></div>
          <div class="sk-block sk-tab"></div>

          <div class="sk-block sk-tab"></div>
          <div class="sk-block sk-tab"></div>
        </div>
      </div>
      <div class="sk-sub">Getting your money in order…</div>
    </div>
    <div id="app"></div>
    <div id="boot-error"></div>
    <button id="installBtn" type="button"
      style="display:none; position:fixed; bottom:1.25rem; right:4.75rem; z-index:30;
             padding:0.55rem 1rem; border-radius:4px; cursor:pointer; font: inherit; font-size:0.9rem;
             background:#1f2c24; border:1px solid #356b50; color:#7fd0a3;">Install CashFlux</button>

    <script>
      // PWA install prompt: surface an Install button when the browser offers one.
      (function () {
        var deferred = null;
        var btn = document.getElementById("installBtn");
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (btn) btn.style.display = "block";
        });
        if (btn) {
          btn.addEventListener("click", function () {
            if (!deferred) return;
            deferred.prompt();
            deferred.userChoice.then(function () {
              deferred = null;
              btn.style.display = "none";
            });
          });
        }
        window.addEventListener("appinstalled", function () {
          if (btn) btn.style.display = "none";
        });
      })();
    </script>

    <!-- iOS "Add to Home Screen" hint (C307 / #464): iOS Safari never fires
         beforeinstallprompt so the installBtn above never shows there. This
         separate, dismissible banner surfaces the manual A2HS path instead.
         Does NOT touch the installBtn IIFE above. -->
    <div id="iosHintBanner"
      style="display:none; position:fixed; bottom:4.75rem; right:1.25rem; z-index:30;
             max-width:300px; padding:0.7rem 1rem; border-radius:6px;
             background:#1f2c24; border:1px solid #356b50; color:#7fd0a3;
             font-size:0.88rem; line-height:1.45; box-shadow:0 2px 8px rgba(0,0,0,.4);">
      <button id="iosHintClose" type="button"
        style="float:right; margin-left:0.6rem; background:none; border:none;
               color:#7fd0a3; cursor:pointer; font-size:1.1rem; line-height:1;
               padding:0;" aria-label="Dismiss install hint">&#x00D7;</button>
      On iPhone or iPad: tap <strong>Share</strong>, then
      <strong>'Add to Home Screen'</strong> to install CashFlux.
    </div>
    <script>
      // iOS A2HS hint: shown only on iOS Safari outside standalone mode, once
      // per browser (localStorage flag prevents re-showing after dismiss).
      (function () {
        var IOS_KEY = 'cashflux:ios-hint-dismissed';
        if (!/iP(hone|ad|od)/i.test(navigator.userAgent)) return;
        if (navigator.standalone) return;
        if (localStorage.getItem(IOS_KEY)) return;
        var banner = document.getElementById('iosHintBanner');
        var close  = document.getElementById('iosHintClose');
        if (banner) banner.style.display = 'block';
        if (close) {
          close.addEventListener('click', function () {
            localStorage.setItem(IOS_KEY, '1');
            if (banner) banner.style.display = 'none';
          });
        }
      })();
    </script>

    <!-- D3 (pinned) + the chart shim the Go ui.Chart component drives. Loaded
         before the wasm boot so window.cashfluxRenderChart exists by first paint;
         both are service-worker cached for offline use. -->
    <!-- D3 vendored locally (C44): no third-party CDN, no SRI gap, works offline. -->
    <script src="./d3.min.js"></script>
    <script src="./chart.js"></script>
    <!-- W-15 WONDER: count-up animation for KPI hero figures on dashboard mount. -->
    <script src="./countup.js"></script>
    <!-- Calming background music ("muzak"): low-volume looping ambient player. -->
    <script src="./muzak.js"></script>
    <!-- W-21 WONDER: scroll-reveal IntersectionObserver hook. Must load before
         the wasm boots so cashfluxWonder is available on first render. -->
    <script src="./wonder.js"></script>
    <!-- Mermaid diagrams (C70): vendored locally (no CDN, C44) + its shim. -->
    <script src="./mermaid.min.js"></script>
    <script src="./mermaid.js"></script>

    <!-- Markdown rendering for Insights chat (vendored locally, no CDN, C44):
         marked parses Markdown, DOMPurify sanitizes the result before it's set
         as innerHTML, so model-authored text can't inject active markup. -->
    <script src="./marked.min.js"></script>
    <script src="./purify.min.js"></script>

    <script src="./wasm_exec.js"></script>
    <script>
      (function () {
        const boot = document.getElementById("boot");
        const app = document.getElementById("app");
        const errorBox = document.getElementById("boot-error");

        // Swallow the benign "Transition was skipped" AbortError the browser emits
        // when the DOM changes while a View Transition cross-fade is mid-flight (e.g.
        // a deferred below-the-fold render landing during the route transition). It's
        // a non-actionable browser artifact, not an app error — Chrome's own docs say
        // to catch it. Scoped tightly so real rejections still surface.
        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          if (r && r.name === "AbortError" && /transition|skipped/i.test(String(r.message || r))) {
            e.preventDefault();
          }
        });

        // Dismiss the boot splash once the app has rendered. We fade it (CSS) AND
        // then pull it out of the layer (display:none) so a slow or interrupted
        // transition can never leave a translucent #boot stuck over the app — the
        // lingering-splash bug seen across /planning, /split, /goals, /documents.
        function hideBoot() {
          if (!boot || boot.classList.contains("hidden")) return;
          if (app) app.classList.add("app-enter");
          boot.classList.add("hidden");
          var remove = function () { boot.style.display = "none"; };
          boot.addEventListener("transitionend", remove, { once: true });
          setTimeout(remove, 700); // fallback if transitionend never fires
        }

        if (app) {
          if (app.children.length > 0) {
            hideBoot(); // content already mounted before this script ran
          } else if (typeof MutationObserver === "function") {
            const obs = new MutationObserver(function () {
              if (app.children.length > 0) {
                hideBoot();
                obs.disconnect();
              }
            });
            obs.observe(app, { childList: true });
          }
          // Safety net: never let the splash outlive the boot, even if a re-mount
          // races the observer.
          setTimeout(function () { if (app.children.length > 0) hideBoot(); }, 4000);
        }

        if (typeof Go !== "function") {
          errorBox.style.display = "block";
          errorBox.textContent = "wasm_exec.js failed to load (Go runtime glue missing).";
          return;
        }

        // Register the service worker for offline/installability (best-effort).
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./sw.js").catch(function () {});
          });
        }

        const go = new Go();

        // Prefer the gzip-compressed binary: the wasm is ~4× smaller over the wire
        // (the deploy ships main.wasm.gz alongside main.wasm). We decompress it in a
        // stream so instantiate still overlaps the network, then fall back to the raw
        // binary if the browser lacks DecompressionStream or the .gz isn't present —
        // so this can never make boot worse, only lighter.
        function loadCompressed() {
          if (typeof DecompressionStream !== "function") {
            return Promise.reject(new Error("DecompressionStream unavailable"));
          }
          return fetch("./bin/main.wasm.gz").then(function (resp) {
            if (!resp.ok || !resp.body) throw new Error("main.wasm.gz " + resp.status);
            const stream = resp.body.pipeThrough(new DecompressionStream("gzip"));
            const wasmResp = new Response(stream, { headers: { "Content-Type": "application/wasm" } });
            return WebAssembly.instantiateStreaming(wasmResp, go.importObject);
          });
        }
        function loadRaw() {
          return WebAssembly.instantiateStreaming(fetch("./bin/main.wasm"), go.importObject);
        }
        loadCompressed()
          .catch(function (e) {
            console.warn("[wasm] compressed load unavailable, using raw binary:", e && e.message ? e.message : e);
            return loadRaw();
          })
          .then(function (result) { go.run(result.instance); })
          .catch(function (err) {
            errorBox.style.display = "block";
            errorBox.textContent = "Failed to start CashFlux wasm app:\n" + String(err);
            console.error(err);
          });
      })();
    </script>
  </body>
</html>
