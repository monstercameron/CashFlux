      [data-theme="light"] .txn-table tbody td, [data-theme="light"] .txn-table tbody tr.row { color: #1c1c1e !important; }
      [data-theme="light"] .txn-table tbody tr.row:hover { background: #efede8 !important; }
      .txn-table tbody tr.row:hover { background: var(--bg-elev); }
      .txn-table .td-date { white-space: nowrap; color: var(--text-dim); }
      .txn-table .td-cat, .txn-table .td-acct, .txn-table .td-tags { color: var(--text-dim); }
      .txn-table .td-amount { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
      /* Description is the primary scan field (G2 §1/§2): give it room but lock to a
         single line so a long memo can't inflate row height. */
      .txn-table td.row-desc { max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .txn-table .td-tags-inline { color: var(--text-faint); font-size: 0.8rem; }
      /* Actions collapse to an icon strip (G2 §1): compact square buttons, labels
         live in title/aria — no more 560px text-button sprawl. */
      .txn-table .td-actions .btn-icon { padding: 0.2rem 0.35rem; min-height: 0; }
      /* GX12-F3: actions column measured 168–170px — oversized for 2–3 icon-only buttons.
         Cap it to 96px so the ledger reclaims that space for data columns. */
      .txn-table .td-actions { white-space: nowrap; text-align: right; width: 96px; max-width: 96px; }
      /* Cleared toggle (G2 §5): a ✓/○ status glyph, green when cleared. */
      /* Cleared toggle: a discrete per-row control, so give it a ≥24px hit area on
         desktop too (WCAG 2.2 §2.5.8). It was 26×17px with a mouse — the 44×44 sizing
         only kicked in under the 640px touch breakpoint. The glyph stays the same size;
         only the clickable box grows, centered, and the 55px row easily absorbs it. */
      .txn-table .clr-toggle { background: transparent; border: 0; cursor: pointer; font-size: 1.05rem; line-height: 1; color: var(--text-faint); width: 1.6rem;
        display: inline-flex; align-items: center; justify-content: center; min-height: 1.5rem; }
      .txn-table .clr-toggle.is-cleared { color: var(--accent); font-weight: 700; }
      .txn-table tbody tr.row.cleared .td-date, .txn-table tbody tr.row.cleared .row-desc { color: var(--text-dim); }
      .txn-table .td-select .check { background: transparent; border: 0; cursor: pointer; font-size: 1rem; line-height: 1; }
      .txn-table .row-edit td { padding: 0.5rem 0.3rem; }
      .txn-table thead th.td-amount, .txn-table thead th.td-actions { text-align: right; }
      /* Reusable DataTable pagination footer. */
      .data-pager { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; padding: 0.6rem 0.2rem 0.1rem; font-size: 0.86rem; }
      .data-pager .data-pos { font-variant-numeric: tabular-nums; }
      .data-pager .data-pager-label { margin-left: auto; }
      .data-pager .field { width: auto; min-width: 4.5rem; }
      .data-pager .btn[disabled] { opacity: 0.45; cursor: default; }
      /* Narrow screens (C10/C19): stack each row as a card. Breakpoint raised
         760→900 (2026-06-24): the 8-column .txn-table has a ~949px intrinsic
         min-width, so on tablet widths (768/800/810/820/880 — and worst at
         769-900 where the rail is expanded and shrinks the content column) the
         wide table clipped its right-hand columns (Account/Tags/Cleared/Actions)
         with no way to reach them. The card layout has no clip and hides the
         thead, so it sidesteps the sticky-header issue a horizontal-scroll wrapper
         would cause. (Residual: 901-~1185px laptop widths still clip the table —
         tracked separately; needs a product call on cards-vs-column-hiding.) */
      /* Transactions table → card layout. Breakpoint is 1200px (not 900): with the
         ~240px rail, the full column set needs ~1185px of viewport to fit, so a real
         table below that always clipped a column (the 901–1185px "RESIDUAL clip"
         band). Product call: show the stacked card layout up to 1200px and only paint
         the real table at ≥1201px, where every column fits — no clip at any width. */
      @media (max-width: 1200px) {
        .txn-table, .txn-table tbody, .txn-table tr, .txn-table td { display: block; width: 100%; }
        .txn-table thead { display: none; }
        .txn-table tbody tr.row { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.5rem; padding: 0.3rem 0.5rem; }
        .txn-table tbody td { border: 0; padding: 0.15rem 0.2rem; }
        .txn-table .td-amount { text-align: left; }
        .txn-table td.row-desc { max-width: none; white-space: normal; }
      }
      .amount { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
      .amount-income { color: var(--accent); }
      .amount-expense { color: var(--danger); }

      /* Transactions filter toolbar (C47): compact search + Filters popover + chips. */
      .filter-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
      .filter-search { flex: 1 1 220px; min-width: 160px; }
      .filters-trigger { display: inline-flex; align-items: center; gap: 0.4rem; }
      .filter-badge { display: inline-flex; align-items: center; justify-content: center;
        min-width: 1.25rem; height: 1.25rem; padding: 0 0.35rem; border-radius: 999px;
        background: var(--accent); color: #fff; font-size: 0.72rem; font-weight: 700;
        font-variant-numeric: tabular-nums; }
      .filter-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; }
      .filter-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.3rem 0.2rem 0.6rem;
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; font-size: 0.82rem; }
      .filter-chip .chip-text { line-height: 1.2; }
      .chip-x { display: inline-flex; align-items: center; justify-content: center; width: 1.1rem; height: 1.1rem;
        padding: 0; border: none; border-radius: 999px; background: transparent; color: var(--muted);
        font-size: 0.8rem; line-height: 1; cursor: pointer; }
      .chip-x:hover { background: var(--action-danger); color: #fff; }
      .chip-clear-all { background: none; border: none; color: var(--accent); font: inherit; cursor: pointer; padding: 0.2rem 0.3rem; }
      .chip-clear-all:hover { text-decoration: underline; }
      /* Filters popover body: stacked labelled fields. */
      .filter-fields { display: flex; flex-direction: column; gap: 0.7rem; }
      .filter-fields .field-label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; color: var(--muted); }
      .filter-fields .field-label .field { color: var(--text); }

      /* Forms */
      .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.6rem; align-items: end; }
      .field { width: 100%; padding: 0.5rem 0.6rem; min-height: 44px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font: inherit; }
      /* GX4-F1: removed outline:none — was silencing the keyboard focus ring for both mouse and
         keyboard focus. Border-color tint on :focus is a subtle mouse hint; the explicit ring
         on :focus-visible is the keyboard indicator and must not be overridden. */
      /* Soft accent focus glow (design pass GD-6) for a polished, modern field focus on both mouse
         and keyboard. The explicit :focus-visible outline below is preserved for a11y; this only
         adds a subtle halo. transition keeps it gentle. */
      .field { transition: border-color .12s ease, box-shadow .12s ease; }
      .field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
      /* GX4-F1 (select): bare <select> elements also need field-style tokens and a visible
         keyboard ring. No .set-input / .seg-btn so native caret is preserved. */
      select:not(.set-input):not(.seg-btn) { min-height: 44px; padding: 0.5rem 0.6rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font: inherit; cursor: pointer; transition: border-color .12s ease, box-shadow .12s ease; }
      select:not(.set-input):not(.seg-btn):focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
      select:not(.set-input):not(.seg-btn):focus-visible,
      .field:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      /* Native color picker rendered as a proper swatch (a bare-width text field
         clipped it to a thin line). */
      .color-input { width: 44px; height: 44px; padding: 3px; background: var(--bg-elev);
        border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
      .color-input::-webkit-color-swatch-wrapper { padding: 0; }
      .color-input::-webkit-color-swatch { border: none; border-radius: 5px; }
      /* Small color dot shown beside a category name. */
      .cat-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
        display: inline-block; align-self: center; }
      /* GI2 — Category page affordances. */
      /* btn-link: inline text that acts as a link/button (usage count drill). */
      .btn-link { background: none; border: none; padding: 0; font: inherit;
        color: var(--accent); text-decoration: underline; cursor: pointer; }
      .btn-link:hover { opacity: 0.8; }
      /* cat-child-row: subtle fill on indented sub-category rows so nesting is
         visible, especially at 768px where the left border alone is missed. */
      .cat-child-row { background: rgba(255,255,255,0.02); }
      [data-theme="light"] .cat-child-row { background: rgba(0,0,0,0.02); }
      /* cat-zero-usage: dim rows with no transactions so safe-to-delete categories
         are spottable at a glance without hiding them entirely. !important is
         required: these rows carry the wonder-row-enter entrance animation
         (fill-mode:both, final keyframe opacity:1), and a filled animation's value
         outranks every non-important author rule regardless of specificity — so
         without it the dim never applies once the entrance settles. */
      .cat-zero-usage { opacity: 0.55 !important; }
      /* Category map (GI2): a wrapping grid of group chips replacing the old mermaid
         flowchart, which stacked every top-level category in one tall column and wasted
         most of the horizontal width. Each group box shows a parent category + its
         sub-categories as pills; the boxes flow left-to-right and wrap, filling the row. */
      .cat-map { display: flex; flex-wrap: wrap; gap: 0.6rem; }
      .cat-map-group { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem;
        padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 12px;
        background: var(--bg-elev); }
      .cat-map-chip { font-size: 0.88rem; font-weight: 600; color: var(--text); }
      /* Sub-category pill. Uses a theme-adaptive tint of the text color (not --bg-tile,
         which is undefined in light mode and rendered the pill transparent + borderless),
         so the pill reads consistently in BOTH themes — a faint dark tint on light, a faint
         light tint on dark — and the border is always visible against the group fill. */
      .cat-map-sub { font-size: 0.78rem; font-weight: 500; color: var(--text-dim);
        padding: 0.1rem 0.5rem; border-radius: 999px;
        background: color-mix(in srgb, var(--text) 6%, transparent);
        border: 1px solid color-mix(in srgb, var(--text) 14%, transparent); }
      .cat-map-sub2 { opacity: 0.8; }
      /* GX3-F3/F10: unified button-scale tokens so page buttons, modal buttons, and inputs
         all hit the 44px touch-target floor and share the same height. Previously .btn
         measured 35.8px (below WCAG 2.5.8) while inputs and modal buttons were 40–44px.
         --btn-py/--btn-px are consumed by both .btn and .set-btn so height stays in sync. */
      :root { --btn-py: 0.5rem; --btn-px: 0.8rem; }
      .btn { padding: var(--btn-py) var(--btn-px); min-height: 44px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); font: inherit; font-weight: 500; cursor: pointer; transition: filter 0.12s; display: inline-flex; align-items: center; justify-content: center; }
      .btn:hover { filter: brightness(1.12); }
      .btn:disabled, .btn[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; filter: none; }
      /* White text on the mid-green accent, BOTH themes. Light was already white (G19:
         dark-green text measured ~2.1:1 there). Dark still used dark-green #052e13 = only
         3.52:1 — lower than white's 4.25:1 on the same accent, so it was the weaker outlier.
         Unify to white: dark improves 3.52→4.25 and matches light. (Both clear the bold/large
         3:1 bar; full AA-normal 4.5 would need a deeper accent — a brand call, left to a dev.) */
      /* Primary button: a subtle top-lit gradient + glossy top edge + soft drop shadow for a
         dimensional, premium feel (design pass GD-3). The gradient TOP stays exactly var(--accent)
         and only darkens downward, so the white-label contrast floor (4.25:1, measured) is preserved —
         it can only improve toward the bottom. */
      /* White-on-accent fails AA: white over the raw --accent (#2e8b57) top of the
         gradient measured 4.25:1 (< 4.5 for this 14.5px label). Darken the top stop
         ~10% so the whole primary CTA clears AA in both themes while keeping the
         green brand + 180deg gloss. */
      .btn-primary { background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 90%, #000 10%), color-mix(in srgb, var(--accent) 78%, #000 22%));
        color: #ffffff; border-color: color-mix(in srgb, var(--accent) 78%, #000 22%); font-weight: 600;
        box-shadow: 0 1px 2px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.16); }
      .btn-del { background: transparent; border: 0; color: var(--text-faint); cursor: pointer; font-size: 1rem; padding: 0.25rem 0.4rem; }
      .btn-del:hover { color: var(--danger); }
      /* WCAG 2.5.8 (AA): small icon-only buttons get at least a 24x24 hit area,
         with the glyph centered, so they're comfortably tappable. */
      .btn-del, .toast-x, .rstep, .set-close {
        min-width: 24px; min-height: 24px; display: inline-grid; place-items: center;
      }
      .btn-del { min-width: 32px; min-height: 32px; }
      /* Tactile press feedback: interactive controls dip slightly on press so a
         click feels responsive (§6.16). Gated behind reduced-motion. */
      @media (prefers-reduced-motion: no-preference) {
        .btn:active, .btn-primary:active, .nav-link:active, .data-btn:active,
        .seg-btn:active, .menu-btn:active, .check:active, .btn-del:active,
        .member-add:active, .member-chip:active, .set-btn:active, .rstep:active,
        .toast-x:active, .nav:active, .nv:active {
          transform: translateY(1px);
        }
      }
      .err { color: #fca5a5; margin: 0.6rem 0 0; font-size: 0.88rem; }

      /* Visually hidden but available to screen readers (e.g. an idle live region). */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }

      /* App-wide toast notice (bottom-center) */
      .toast {
        position: fixed; left: 50%; bottom: 1.25rem; transform: translateX(-50%);
        z-index: 60; max-width: min(92vw, 32rem); display: flex; align-items: center;
        gap: 0.75rem; padding: 0.7rem 0.9rem; border-radius: 10px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        font-size: 0.9rem; animation: toast-in 160ms ease-out;
      }
      .toast-err { border-color: var(--danger); }
      .toast-err .toast-msg { color: var(--danger); }
      /* GX5-F2: toast used --bg-elev which on the warm-white light page is ~2.1:1 and
         nearly vanishes. Pin a white surface + clear border + lighter shadow in light. */
      [data-theme="light"] .toast { background: #ffffff; border-color: #d1cfc9; box-shadow: 0 6px 20px rgba(0,0,0,0.16); }
      /* GX5-F1: success and error toasts looked identical — add a severity glyph. */
      .toast::before { content: "\2713"; color: var(--accent); font-weight: 700; font-size: 1rem; line-height: 1; }
      .toast-err::before { content: "\26A0"; color: var(--danger); }
      /* GX5-F3: /notifications card had transparent background (rgba(0,0,0,0)) in light
         mode — the global .card rule loses to an override somewhere. Pin surface elevation. */
      [data-theme="light"] section.card { background: #ffffff !important; border: 1px solid #e4e2dd !important; }
      .toast-msg { flex: 1; }
      .toast-x {
        flex: none; border: 0; background: transparent; color: inherit; cursor: pointer;
        font-size: 1.2rem; line-height: 1; opacity: 0.7; padding: 0 0.15rem;
      }
      .toast-x:hover { opacity: 1; }
      @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 0.5rem); } to { opacity: 1; transform: translate(-50%, 0); } }

      /* Budgets */
      .budget { padding: 0.7rem 0; border-top: 1px solid var(--border); }
      .budget:first-child { border-top: 0; }
      .budget-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; }
      .budget-amount { font-variant-numeric: tabular-nums; color: var(--fg, var(--text)); white-space: nowrap; }
      .budget-sub { display: block; color: var(--text-dim); font-size: 0.82rem; margin-top: 0.15rem; }
      /* G-series glamor wave 2 — screen-scoped polish classes (unique names; no cross-screen collisions). */
      .plan-compare-select--compact { max-width: 220px; font-size: 0.85rem; }
      .alloc-list-header { font-size: 0.74rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; padding: 0.15rem 0 0.35rem; }
      .alloc-algo-summary { margin-top: 0.4rem; }
      .alloc-apply-hint { color: var(--text-dim); font-style: italic; }
      .split-summary { font-weight: 600; color: var(--fg, var(--text)); margin-top: 0.4rem; }
      .cadence-badge { display: inline-block; font-size: 0.72rem; font-weight: 600; color: var(--text-dim); background: var(--bg-elev, rgba(255,255,255,0.04)); padding: 0.05rem 0.35rem; border-radius: 6px; margin: 0 0.3rem; vertical-align: middle; }
      .subs-select-all-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
      /* G20 Artifacts: fixed-size thumbnail wrapper + broken-image fallback + list footer. */
      .artifact-thumb-wrap { position: relative; width: 2.5rem; height: 2.5rem; flex-shrink: 0; }
      .artifact-thumb-fallback { display: none; align-items: center; justify-content: center; width: 2.5rem; height: 2.5rem; background: var(--bg-elev, rgba(255,255,255,0.04)); border-radius: 4px; color: var(--text-dim); }
      .artifact-list-footer { border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.5rem; }
      /* G14 Documents: step-indicator accent on the active review card + amber duplicate-row badge. */
      .card-step-active { border-left: 3px solid var(--accent); }
      .badge-warn { display: inline-block; background: #b45309; color: #fff; font-size: 0.7rem; font-weight: 700; padding: 0.05rem 0.4rem; border-radius: 6px; }
      /* G5 Goals: breathing room between bar and sub-line; dimmer secondary % text; stable row height; hide × at rest. */
      .goal-sub { margin-top: 0.5rem; }
      .goal-sub-dim { color: var(--text-dim); font-size: 0.8rem; }
      .budget { min-height: 100px; }
      .budget:not(:hover):not(:focus-within) .btn-del-hover { opacity: 0; pointer-events: none; }
      .cover-form { margin-top: 0.6rem; padding: 0.6rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev, rgba(255,255,255,0.02)); }
      .cover-form .form-grid { margin-top: 0.4rem; }
      /* Bar track (G4 §6): a touch more contrast than --bg-elev so a 0%/empty bar
         still reads as a track rather than vanishing into the card. */
      .bar { height: 8px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; margin: 0.45rem 0 0.35rem; }
      /* Glossy progress fill (design pass GD-7): a 1px inset top highlight + faint bottom shade
         give the bar a subtle cylindrical sheen. Applied on .bar-fill only, so every state variant
         (.near/.over/.done/.final/…) inherits the gloss while keeping its own semantic color. */
      .bar-fill { height: 100%; background: var(--accent); border-radius: 999px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), inset 0 -1px 1px rgba(0,0,0,0.14); }
      /* Progress/budget bars grow into place on load and update instead of snapping (§6.16). */
      @media (prefers-reduced-motion: no-preference) {
        .bar-fill { transition: width 0.45s cubic-bezier(0.2, 0.75, 0.2, 1); }
      }
      .bar-fill.near { background: #f59e0b; }
      .bar-fill.over { background: var(--danger); }
      /* Goal pace states (G5): the progress-bar fill tone differentiates a goal's
         standing at a glance instead of one flat accent. done/final = success
         tones, overdue = danger, soon = amber. on-track/undated keep the accent. */
      .bar-fill.done { background: var(--up, #54b884); }
      .bar-fill.final { background: linear-gradient(90deg, var(--accent), var(--up, #54b884)); }
      .bar-fill.overdue { background: var(--danger); }
      .bar-fill.soon { background: #f59e0b; }

      /* Budget health pills (G4 §4): the over/near summary chips were unstyled
         ".pill" spans rendering as bare colored text; give them a soft filled chip
         so "2 over budget" / "2 near limit" read as distinct status badges. The
         color comes from the tw text-tone class already on the span. */
      .pill { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.74rem; font-weight: 700;
        letter-spacing: 0.02em; padding: 0.12rem 0.5rem; border-radius: 999px;
        background: var(--bg-elev); border: 1px solid var(--border); white-space: nowrap; }
      /* §8.6/§12.1 severity pills: carry the severity in a tinted fill + border and
         keep the LABEL at --text, instead of low-contrast colored text (warn-amber on
         a pale chip measured ~2.1:1 in light). Works in both themes because the tint is
         a color-mix over --bg-elev and the label uses the theme's primary text. */
      .pill.is-warn   { background: color-mix(in srgb, var(--warn) 16%, var(--bg-elev));   border-color: color-mix(in srgb, var(--warn) 40%, var(--border));   color: var(--text); }
      .pill.is-danger { background: color-mix(in srgb, var(--danger) 14%, var(--bg-elev)); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); color: var(--text); }

      /* Insights starter chips (G13): a softer, more inviting pill — distinct from
         the hard-edged form .btn so they read as "tap to explore", not data entry. */
      .chip-suggest { border-radius: 999px; background: var(--bg-elev); border: 1px solid var(--border);
        color: var(--text-dim); font-size: 0.84rem; padding: 0.3rem 0.7rem; font-weight: 500; }
      .chip-suggest:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dim); }
      /* Chat switcher pills stay outlined in both themes (G13). */
      .chat-pill { border-color: var(--border) !important; }

      /* Subscriptions row (G10): the name was being squeezed to zero because
         .row-main can shrink (min-width:0) and the two action buttons claimed the
         row. Reserve name width and pin the actions to a fixed trailing group so the
         subscription name always reads — it's what Marcus is auditing. */
      .sub-row .row-main { min-width: 9rem; flex: 1 1 auto; }
      .sub-actions { flex: none; display: inline-flex; align-items: center; gap: 0.4rem; }
      /* SMART-SU1 in-place highlight: briefly outlines the target subscription row
         when the user clicks "Review subscriptions" while already on the page. */
      .smart-highlight-row { outline: 2px solid var(--accent); border-radius: 6px; transition: outline 0.3s ease; }
      .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.82rem; min-height: 0; }
      /* Ghost-danger: a low-weight destructive action so a per-row "Cancel" doesn't
         out-shout the data (G10) — danger tone on hover, not a solid red block. */
      .btn-ghost-danger { color: var(--danger); border: 1px solid var(--border); background: transparent; }
      .btn-ghost-danger:hover { background: var(--action-danger); color: #fff; border-color: var(--action-danger); }
      @media (max-width: 760px) {
        .sub-row .sub-actions { flex-wrap: wrap; }
      }

      /* Allocate rank badge (G8): a compact "#1/#2" ordinal so the priority order
         is glanceable, not just inferred from bar length. */
      /* Rank badge: a solid accent chip with WHITE text in BOTH themes. It used dark-green
         #052e13 in dark mode, which on the mid-green accent is only 3.52:1 — below white's
         4.25:1 and the weaker of the pair (same issue fixed for .btn-primary). Unifying to
         white lifts dark 3.52→4.25 and matches light; the old accent-on-accent-dim green-on-
         green (~1.5:1, G14) is long gone. Solid fill reads as a strong "this is rank #N" cue. */
      .rank-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 1.5rem;
        height: 1.5rem; padding: 0 0.35rem; border-radius: 999px; background: var(--accent);
        color: #ffffff; font-size: 0.75rem; font-weight: 700; font-variant-numeric: tabular-nums; flex: none; }
      /* "Advanced" disclosure toggle (G8): subordinate, left-aligned, not a primary button. */
      .disclosure-toggle { background: transparent; border: 0; color: var(--accent); font: inherit;
        padding: 0.35rem 0; cursor: pointer; text-align: left; }
      .disclosure-toggle:hover { text-decoration: underline; }
      /* Buttons that should size to their content, not stretch a form-grid cell (G8). */
      .btn.fit { width: fit-content; }

      /* Card header row (G5): a card title with a right-aligned action (e.g.
         "+ Add goal") so adding is discoverable without hunting for the FAB. */
      .card-head { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.75rem; }
      .card-head .card-title { margin: 0; }

      /* Goal pace badge (G5): a compact colored chip per row answering "am I on
         pace?". Tones mirror the bar states; readable in both themes. */
      .pace-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em;
        padding: 0.1rem 0.45rem; border-radius: 999px; white-space: nowrap; line-height: 1.5;
        border: 1px solid var(--border); /* GX3-D7: was borderless; every other pill has a 1px ring */ }
      /* Final-stretch pace badge: neutral --bg-elev pill with accent TEXT (not accent-on-
         accent-dim, which was green-on-green — 2.1:1 dark / 1.95:1 light). Mirrors the sibling
         .pace-ontrack pill (same bg) but keeps the celebratory accent text, so it reads while
         staying accent-aware for custom themes. */
      .pace-final { background: var(--bg-elev); color: var(--accent); }
      .pace-overdue { background: rgba(216,113,111,0.18); color: var(--danger); }
      .pace-soon { background: rgba(245,158,11,0.18); color: #d98c00; }
      [data-theme="light"] .pace-soon { color: #b45309; }
      .pace-ontrack { background: var(--bg-elev); color: var(--text-dim); }

      /* Notification Center severity pills (C267): compact inline status chips
         surfacing info / warning / critical tones. Colors reuse existing palette
         vars (--warn, --down, --accent) and are tuned to WCAG AA contrast in both
         themes. Text label (not color-only) satisfies accessibility. */
      .sev-pill { display: inline-block; font-size: 0.68rem; font-weight: 700;
        letter-spacing: 0.04em; text-transform: uppercase;
        padding: 0.1rem 0.45rem; border-radius: 999px; white-space: nowrap;
        line-height: 1.5; border: 1px solid transparent; vertical-align: middle; }
      .sev-info     { background: var(--bg-elev); color: var(--text-dim); border-color: var(--border); }
      .sev-warning  { background: rgba(217,140, 0,0.14); color: #a16207; border-color: rgba(217,140,0,0.35); }
      .sev-critical { background: rgba(220, 38,38,0.12); color: #b91c1c; border-color: rgba(220,38,38,0.30); }
      [data-theme="light"] .sev-warning  { color: #92400e; }
      [data-theme="light"] .sev-critical { color: #991b1b; }

      /* Goal/budget rows: at narrow widths the head wraps so a long goal name no
         longer collides with the amount; the bar + sub-line stack below (G5 §768). */
      @media (max-width: 760px) {
        .budget-head { flex-wrap: wrap; align-items: baseline; }
        .budget-head .row-desc { flex: 1 1 100%; }
        .budget-head .budget-amount { flex: 0 0 auto; }
      }

      /* Stat figures must stay full-contrast in both themes (G4/G5): the plain
         (non-pos/neg) value inherits body text, which the light palette keeps dark,
         but pin it explicitly so a muted wrapper can never wash it out. */
      .stat-value { color: var(--text); }
      .budget .row-desc { color: var(--text); }

      /* Semantic tone classes (C91): up = positive, down = negative, warn = caution.
         Named so they style every usage path — both literal class strings and the
         markers tw.ColorClass emits — now that the Tailwind CDN that used to generate
         text-up/bg-down/etc. is gone. Exact palette hex (kept in sync with internal/ui/tw). */
      /* up/down follow the live theme (var --up/--down) so gain/loss indicators stay
         legible in light mode — the literal dark values (#54b884/#d8716f) measure
         ~2.2:1 on white. Dark is byte-identical (engine sets --up/--down to these). */
      /* Money tones reference the semantic money tokens (spec §4.3/§14.3): direction
         only, never the interaction accent. Computed value is byte-identical today
         (--money-positive/-negative alias --up/--down), so this is a zero-visual-change
         semantic migration. --text-warn stays hardcoded for now — mapping it to
         --severity-warn would shift the hue (#cfa14e → amber), a real change to defer. */
      .text-up { color: var(--money-positive, #54b884); } .text-down { color: var(--money-negative, #d8716f); } .text-warn { color: #cfa14e; }
      .text-dim { color: #ababb3; } .text-faint { color: #7d7d85; } .text-fg { color: #f4f4f5; }
      .bg-up { background-color: #54b884; } .bg-down { background-color: #d8716f; }
      .bg-warn { background-color: #cfa14e; } .bg-dim { background-color: #ababb3; }
      /* Interaction state hooks (spec §13.2): attribute-driven so components express
         state via data-state/aria-* instead of ad-hoc classes. Net-new vocabulary —
         no element currently sets data-state, so this restyles nothing today; screens
         adopt it during the component pass. (The [aria-expanded] .chevron rotation hook
         from §13.2 is deferred: existing .chevron elements already manage their own
         rotation, so a global rule there would not be additive.) */
      [data-state="selected"] { background: var(--surface-selected); }
      [data-state="dirty"]    { border-color: var(--severity-warn); }
      [data-state="error"]    { border-color: var(--severity-alert); }
      [aria-busy="true"]      { cursor: progress; }
      .bg-fg { background-color: #f4f4f5; } .bg-line { background-color: #232325; }

      /* Artifacts (G20) --------------------------------------------------- */
      /* Inline quota-nudge notice inside a card (not a toast). */
      .notice { padding: 0.45rem 0.7rem; border-radius: 6px; font-size: 0.85rem;
        border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-dim); }
      .notice-warn { border-color: #d39200; background: rgba(211,146,0,0.08); color: #cfa14e; }
      [data-theme="light"] .notice-warn { color: #92620a; background: #fff8e1; border-color: #d39200; }
      /* Storage progress bar (quota meter below the upload buttons). */
      .storage-bar { height: 6px; background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 999px; overflow: hidden; }
      .storage-bar-fill { height: 100%; background: var(--accent); border-radius: 999px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), inset 0 -1px 1px rgba(0,0,0,0.14);
        transition: width 0.35s ease; }
      .storage-bar-fill.storage-bar-warn { background: #f59e0b; }
      /* CSV inline preview table shown inside an artifact row. */
      .csv-preview { border-collapse: collapse; font-size: 0.78rem; width: 100%; }
      .csv-preview th, .csv-preview td { padding: 0.15rem 0.5rem; border: 1px solid var(--border);
        text-align: left; white-space: nowrap; }
      .csv-preview thead { background: var(--bg-elev); color: var(--text-dim); }
      /* Positive reference badge on artifact rows ("Referenced by N transaction(s)"). */
      .ref-positive { color: var(--accent); }
      [data-theme="light"] .ref-positive { color: #1a7a47; }

      /* To-do */
      .field-wide { grid-column: 1 / -1; }
      .check { background: transparent; border: 1px solid transparent; color: var(--text-dim); cursor: pointer; font-size: 1.15rem; line-height: 1; min-width: 24px; min-height: 24px; display: inline-grid; place-items: center; margin-right: 0.4rem; box-sizing: border-box; }
      .check:hover { color: var(--accent); }
      .row.selected .check { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
      .row.done .row-desc { text-decoration: line-through; color: var(--text-faint); }
      .task-meta { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.15rem; }
      .badge-prio { font-size: 0.75rem; }
      .prio-high { background: #3b0d0d; color: #fca5a5; border: 1px solid #7f1d1d; }
      .prio-med { background: #2a230c; color: #fcd34d; border: 1px solid #854d0e; }
      .prio-low { background: #0c2a17; color: #86efac; border: 1px solid #166534; }

      /* ───────────────────────────────────────────────────────────────────
         WONDER override hardening (W-1/W-2/W-4/W-11). These re-assert the
         flourish transforms LATE in the cascade so later base component rules
         can't silently clobber them:
           • .card / .w hover-lift was being zeroed by .wonder-reveal.in-view
             { transform:none } (equal specificity, later source order). The
             `html` prefix adds +1 element specificity so the lift wins.
           • a later `.btn { transition: filter }` rule dropped the `transform`
             transition the press-scale (W-2) animates through — re-added here.
           • the row stagger (W-11) is hard-killed when wonder is off, beating
             the per-nth-child rules that wire it (which out-specify the plain
             off-guard above).
         Every transform scales by --wonder-on, which resolves to 0 under
         [data-wonder="off"] and prefers-reduced-motion, so these stay
         identity (no movement) in those modes — no extra off-guard needed. */
      html .card:hover {
        transform: translateY(calc(-1 * var(--wonder-lift) * var(--wonder-on)));
        box-shadow: var(--wonder-shadow);
      }
      /* W-3 tile hover-lift needs !important: unlike .card (whose clobber is the
         plain .wonder-reveal.in-view{transform:none} rule, beaten by specificity),
         bento tiles carry the wonder-bento-enter entrance animation (fill-mode:both,
         final keyframe `transform: none`), and a filled animation outranks every
         non-important author rule regardless of specificity. box-shadow stays
         non-important (no animation touches it). The :not(.drag) exclusion is kept
         so a tile being dragged never gets the hover transform fighting the drag
         translate. Off-safe — translateY scales by --wonder-on → 0. */
      html .w:not(.drag):hover {
        transform: translateY(calc(-1 * var(--wonder-lift) * var(--wonder-on))) !important;
        box-shadow: var(--wonder-shadow) !important;
      }
      /* GD-2 resting elevation for bento tiles. The drag/pack engine writes an inline
         box-shadow:none on every .w (beats non-important author rules — which is also why the
         hover shadow above needs !important), so resting depth must be !important too. :not(.drag)
         leaves the dragged ghost entirely to the engine. Matches the .card elevation (GD-1) so
         the dashboard reads as the same layered, premium surface as every other page. */
      html .w:not(.drag) {
        box-shadow: 0 1px 1px rgba(0,0,0,0.20), 0 10px 26px -18px rgba(0,0,0,0.55),
                    inset 0 1px 0 rgba(255,255,255,0.035) !important;
      }
      html[data-theme="light"] .w:not(.drag) {
        box-shadow: 0 1px 2px rgba(17,24,39,0.05), 0 12px 28px -20px rgba(17,24,39,0.16),
                    inset 0 1px 0 rgba(255,255,255,0.7) !important;
      }
      /* !important is likewise required for list rows: they carry the
         wonder-row-enter entrance animation with fill-mode:both, whose final
         keyframe is `transform: none`. A filled animation's value outranks every
         non-important author rule regardless of specificity, so the hover nudge
         can only win with !important. Still off-safe — translateX scales by
         --wonder-on, which is 0 under off/reduced-motion. */
      html .row:not(.txn-table .row):hover {
        transform: translateX(calc(3px * var(--wonder-on))) !important;
      }
      html .btn,
      html .data-btn, html .seg-btn, html .add-item, html .menu-btn, html .icon-btn {
        transition: transform var(--wonder-dur-fast) var(--wonder-ease),
                    filter 0.12s ease,
                    background-color var(--wonder-dur-fast) ease,
                    color var(--wonder-dur-fast) ease;
      }
      [data-wonder="off"] .rows .row,
      [data-wonder="off"] .list-rows .row,
      [data-wonder="off"] .rows .row:not(.txn-table .row),
      [data-wonder="off"] .list-rows .row:not(.txn-table .row) { animation: none !important; }

      /* ── Frontend-design polish pass (C254–C276) ──────────────────────────
         Token-driven refinements only; all values use existing CSS vars.
         Every addition is gated by prefers-reduced-motion where motion is used.
         WCAG AA contrast verified in light + dark for color-bearing rules.
         ─────────────────────────────────────────────────────────────────── */

      /* C267 – Severity pill refinements.
         Replace hardcoded hex with themed constructs; add a crisper letter-spacing
         and the same font-weight rhythm as .pace-badge siblings. Light theme
         contrast: warning #92400e on amber-bg ~4.9:1 ✓; critical #991b1b on red-bg
         ~5.1:1 ✓. Dark: warning #d4a017 on rgba-amber-bg ~4.8:1 ✓;
         critical #f87171 on rgba-red-bg ~4.7:1 ✓. */
      .sev-pill {
        font-size: 0.67rem; font-weight: 700; letter-spacing: 0.05em;
        text-transform: uppercase; white-space: nowrap; line-height: 1.4;
        padding: 0.1rem 0.42rem; border-radius: 999px; border: 1px solid transparent;
        display: inline-block; vertical-align: middle;
        /* Subtle inset for tactile depth — same technique as .btn-primary */
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .sev-info {
        background: var(--bg-elev); color: var(--text-dim); border-color: var(--border);
      }
      .sev-warning {
        background: rgba(217,140,0,0.13); color: #d4a017; border-color: rgba(217,140,0,0.30);
      }
      .sev-critical {
        background: rgba(220,38,38,0.11); color: #f87171; border-color: rgba(220,38,38,0.28);
      }
      [data-theme="light"] .sev-warning  { color: #92400e; background: rgba(245,158,11,0.12); }
      [data-theme="light"] .sev-critical { color: #991b1b; background: rgba(220,38,38,0.09); }

      /* C268 – Per-item notification control buttons.
         Compact icon-button affordance: ghost by default, accent ring on focus,
         danger tone for dismiss. Hover/focus states satisfy WCAG 2.4.11 (focus visible). */
      .notif-ctrl-btn {
        display: inline-grid; place-items: center;
        min-width: 28px; min-height: 28px;
        padding: 0.1rem 0.3rem;
        background: transparent; border: 1px solid transparent;
        border-radius: 6px; color: var(--text-faint);
        font-size: 0.82rem; line-height: 1; cursor: pointer;
        transition: color var(--wonder-dur-fast) ease,
                    background-color var(--wonder-dur-fast) ease,
                    border-color var(--wonder-dur-fast) ease;
      }
      .notif-ctrl-btn:hover {
        color: var(--text); background: var(--bg-elev); border-color: var(--border);
      }
      .notif-ctrl-btn:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 1px;
      }
      .notif-ctrl-dismiss:hover {
        color: var(--danger); background: rgba(216,113,111,0.10); border-color: rgba(216,113,111,0.28);
      }
      [data-theme="light"] .notif-ctrl-btn:hover { background: #f3f2ef; border-color: #d1cfc9; }
      [data-theme="light"] .notif-ctrl-dismiss:hover { background: rgba(185,28,28,0.07); border-color: rgba(185,28,28,0.22); }

      /* C274 – Single-device note helper text.
         Calm, well-set secondary copy. Inherits .muted color; adds a slightly
         reduced size and a left rule to distinguish it from body text. */
      [data-testid="members-single-device-note"] {
        font-size: 0.82rem; color: var(--text-faint);
        padding-left: 0.6rem;
        border-left: 2px solid var(--border);
        margin-top: 0.3rem; margin-bottom: 0.5rem;
        line-height: 1.5;
      }
      [data-theme="light"] [data-testid="members-single-device-note"] {
        color: #636369; border-left-color: #d1cfc9;
      }

      /* C276 – Member role badge + default chip.
         .badge already has layout; add the two missing semantic variants so
         they render with clear visual weight distinction:
           • .badge          → role pill: neutral elevated surface, dimmed text
           • .badge-muted    → "Default" chip: fainter, visually subordinate
           • .badge-soon     → already defined (blue for upcoming/plan items)
         Contrast in dark: role badge #ababb3 on #1a1a1d ~4.6:1 ✓
         Contrast in light: role badge #636369 on #f3f2ef ~4.8:1 ✓ */
      .badge {
        background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border);
      }
      .badge-muted {
        background: transparent; color: var(--text-faint);
        border: 1px solid var(--border); opacity: 0.8;
      }
      [data-theme="light"] .badge        { background: #f3f2ef; color: #636369; border-color: #d1cfc9; }
      [data-theme="light"] .badge-muted  { color: #9a9a9f; border-color: #d1cfc9; }

      /* C275 – Role selector: no extra CSS needed — uses existing .field class.
         Typography crispness is handled by the .badge + .badge-muted refinements above. */

      /* C269/C263/C264 – Notifications settings section, Manage-alerts rows, threshold inputs.
         Row rhythm: consistent spacing, aligned toggle/label pairs, labelled threshold inputs. */
      [data-testid="settings-notifications"] { display: flex; flex-direction: column; gap: 0; }
      [data-testid="settings-notifications"] h4.set-label { margin-top: 0.9rem; }
      [data-testid="settings-manage-alerts"] { display: flex; flex-direction: column; }

      /* C257/C259 – Smart Insights/Manage tabs + pagination.
         Ghost button variant: the base .btn with a transparent background, so the
         tab bar reads as a segmented-control: active = elevated, inactive = ghost.

      .btn-ghost {
        background: transparent; border-color: transparent; color: var(--text-dim);
        font-weight: 400;
      }
      .btn-ghost:hover {
        background: var(--bg-elev); border-color: var(--border); color: var(--text);

      [data-theme="light"] .btn-ghost:hover { background: #f3f2ef; border-color: #d1cfc9; color: #1c1c1e; }

      /* Smart tab bar active-tab underline indicator: non-obtrusive accent bottom border

      [role="tablist"] .btn:not(.btn-ghost) {

        border-bottom-width: 2px;
        font-weight: 600;

        border: 1px solid var(--border) !important;
        border-radius: 8px !important;

      .smart-card[data-severity="nudge"]  { border-left: 3px solid var(--accent)  !important; }
      [data-theme="light"] .smart-card {
        background: #ffffff;
        box-shadow: 0 1px 3px rgba(17,24,39,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
      }
      [data-theme="light"] .smart-card:hover {
        box-shadow: 0 3px 8px rgba(17,24,39,0.11);
      }

      /* C271 – Catch-up banner staggered reveal.
         Two-element stagger: the header label fades in first, then the count.
         Both elements slide up 8px (reduced-motion: fade only, no translate).
         The banner itself gets a warm-tinted accent surface for distinction. */
      .notif-catchup-banner {
        display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap;
        padding: 0.55rem 0.8rem; margin-bottom: 0.75rem;
        background: var(--accent-dim); border: 1px solid rgba(46,139,87,0.28);
        border-radius: 6px;
      }
      [data-theme="light"] .notif-catchup-banner {
        background: #edf7f1; border-color: rgba(46,139,87,0.30);
      }
      .notif-catchup-label {
        font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--accent);
      }
      [data-theme="light"] .notif-catchup-label { color: #1a7a47; }
      .notif-catchup-count {
        font-size: 0.88rem; color: var(--text-dim);
      }
      [data-theme="light"] .notif-catchup-count { color: #3c3c43; }

      /* Staggered reveal for banner children (prefers-reduced-motion guarded) */
      @media (prefers-reduced-motion: no-preference) {
        @keyframes catchup-fadeslide {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .notif-catchup-banner .notif-catchup-label {
          animation: catchup-fadeslide 220ms var(--wonder-ease-out) both;
          animation-delay: 0ms;
        }
        .notif-catchup-banner .notif-catchup-count {
          animation: catchup-fadeslide 220ms var(--wonder-ease-out) both;
          animation-delay: 80ms;
        }
      }

      /* C271 – Dashboard catch-up card (dashCatchUpCard).
         Gentle staggered reveal for the card and its contents on load.
         Respects prefers-reduced-motion. */
      @media (prefers-reduced-motion: no-preference) {
        @keyframes catchup-card-in {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }

        [data-testid="dash-catchup-card"] {
          animation: catchup-card-in 280ms var(--wonder-ease-out) 60ms both;
        }

    <!-- ============================================================
         Candidate-C design system — ported verbatim from
         design/candidate-c.html. Drives the bento dashboard shell.
         Keep selectors in sync with that reference mockup.
         ============================================================ -->
    <style id="enterprise-tokens">
      /* ───────────────────────────────────────────────────────────────────────
         ENTERPRISE SEMANTIC TOKEN LAYER (R46 — CASHFLUX_ENTERPRISE_UI_STYLE_SPEC §4,§5,§7,§13)
         Step 1 of the token migration (spec §14.1): add semantic alias tokens that
         derive from the runtime theme tokens (--bg-base/--bg-card/--accent/--up/--down/
         --warn/--radius emitted onto :root by internal/theme) WITHOUT changing rendered
         UI. Components migrate onto these roles in later passes; nothing is restyled
         here. Engine-owned tokens (--line, --muted, --danger) are intentionally
         NOT globally re-aliased: --muted resolves per-theme and --line is consumed
         with a hardcoded fallback, so redefining them here would CHANGE dark-mode
         rendering — a §14.1 step-1 ("no visual change") violation. They migrate per
         selector in the later component pass, where each change is contrast-verified.
         --bg is safe to bridge now (the engine emits it as the same value as
         --surface-page), so it is aliased below per the §4.2 compatibility target.
         ─────────────────────────────────────────────────────────────────────── */
      :root {
        /* Surfaces (§4.1) */
        --surface-page:     var(--bg-base);
        --surface-card:     var(--bg-card);
        --surface-raised:   var(--bg-elev);
        --surface-sunken:   color-mix(in srgb, var(--bg-base) 88%, #000 12%);
        --surface-selected: color-mix(in srgb, var(--accent) 16%, var(--bg-card));

        /* Borders (§4.1) */
        --border-subtle:   color-mix(in srgb, var(--border) 70%, transparent);
        --border-strong:   color-mix(in srgb, var(--border) 72%, var(--text) 28%);
        --border-selected: var(--accent);

        /* Text roles (§4.1) — money/labels must reference these, not raw tokens */
        --text-primary:   var(--text);
        --text-secondary: var(--text-dim);
        --text-tertiary:  var(--text-faint);
        --text-inverse:   #ffffff;

        /* Interaction (§4.1) — accent is interaction ONLY, never money */
        --interactive:       var(--accent);
        --interactive-hover: color-mix(in srgb, var(--accent) 84%, var(--text) 16%);
        --interactive-muted: var(--accent-dim);
        --focus-ring:        var(--accent);

        /* Money semantics (§4.3) — direction only */
        --money-positive: var(--up);
        --money-negative: var(--down);
        --money-neutral:  var(--text-primary);

        /* Severity (§4.3) — attention/risk; distinct from money + interaction */
        --severity-info:  var(--accent);
        --severity-nudge: var(--accent);
        --severity-warn:  var(--warn);
        --severity-alert: var(--danger);

        /* §4.2 compatibility bridge: --bg is engine-emitted as the same value as
           --surface-page, so aliasing it is zero visual change. (--line/--muted are
           deferred — see header note.) */
        --bg: var(--surface-page);

        /* Dedicated destructive fill (§4.3): split from negative-money so white
           label text stays contrast-safe on the button. --severity-alert below maps
           to --danger per the §4.1 token table (alert and money-negative share a hue
           by design); they're disambiguated by severity rails/icons per §8.6, and the
           destructive *button fill* is split out here so it stays contrast-safe. */
        --action-danger: #c0392b;

        /* Chart palette (§4.4) */
        --chart-1: var(--accent);
        --chart-2: var(--up);
        --chart-3: var(--warn);
        --chart-4: #52a3ff;
        --chart-5: #b88cff;
        --chart-negative: var(--down);

        /* Spacing scale (§5.1) — 4px sub-unit, 8px rhythm */
        --space-0: 0;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;
        --space-8: 64px;

        /* Radius scale (§7.1) — tighter enterprise set; --radius stays engine-owned */
        --radius-0:    0;
        --radius-xs:   2px;
        --radius-sm:   4px;
        --radius-md:   6px;
        --radius-lg:   8px;
        --radius-pill: 999px;

        /* Elevation (§7.2) — hierarchy not decoration */
        --shadow-1: 0 1px 2px rgba(0,0,0,0.22);
        --shadow-2: 0 8px 24px rgba(0,0,0,0.28);
        --shadow-3: 0 20px 60px rgba(0,0,0,0.38);

        /* Type scale (§6.2) — fixed steps tracked by the user text-scale, NOT viewport.
           The , 1) fallback matches the existing house convention (see #app zoom rule)
           and degrades gracefully if --ui-scale is ever unset. */
        --type-11: calc(11px * var(--ui-scale, 1));
        --type-12: calc(12px * var(--ui-scale, 1));
        --type-13: calc(13px * var(--ui-scale, 1));
        --type-14: calc(14px * var(--ui-scale, 1));
        --type-16: calc(16px * var(--ui-scale, 1));
        --type-18: calc(18px * var(--ui-scale, 1));
        --type-20: calc(20px * var(--ui-scale, 1));
        --type-24: calc(24px * var(--ui-scale, 1));
        --type-32: calc(32px * var(--ui-scale, 1));

        /* Control sizing + interaction feedback (§13.3). --field-h defaults to 36px
           per the §13.3 token table and §8.8 field CSS (var(--field-h, 36px)); the
           §5.1 comfortable/compact 40/36 split is applied via density mode in a later
           pass, not by changing this default. */
        --control-h:         36px;
        --control-h-compact: 32px;
        --field-h:           36px;
        --icon-button-size:  32px;
        --focus-ring-width:  2px;
        --focus-ring-offset: 2px;
        --hover-tint:        color-mix(in srgb, var(--interactive) 8%, transparent);
        --pressed-scale:     0.985;
        --disabled-opacity:  0.48;

        /* Motion durations (§13.3) */
        --motion-instant: 0ms;
        --motion-fast:    100ms;
        --motion-base:    160ms;
        --motion-medium:  220ms;
        --motion-slow:    320ms;

        /* Motion easing (§13.3) */
        --ease-standard:   cubic-bezier(0.2, 0, 0, 1);
        --ease-enter:      cubic-bezier(0, 0, 0, 1);
        --ease-exit:       cubic-bezier(0.4, 0, 1, 1);
        --ease-emphasized: cubic-bezier(0.2, 0, 0, 1);
      }

      /* Coarse-pointer / touch targets (§5.5.9): grow controls to 44px where the
         pointer is imprecise, without changing the desktop fine-pointer defaults. */
      @media (pointer: coarse) {
        :root {
          --control-h:        44px;
          --field-h:          44px;
          --icon-button-size: 44px;
        }
      }
    </style>
    <style id="design-system">
      body.cf { -webkit-font-smoothing: antialiased; }
      .fig { font-variant-numeric: tabular-nums lining-nums; }
      /* Type scale (C48): a small semantic set so dashboard sizing is consistent
         instead of ad-hoc text-[Npx]. Sizes are rem, so the whole scale tracks the
         display-scale zoom on #app coherently. caption/body cover label and body
         text; figure/figure-lg are the single primary and hero data-figure sizes
         (line-height is left to any explicit leading-* utility on the element). */
      .t-caption   { font-size: 0.75rem; }    /* labels, captions, legends, sublines */
      .t-body      { font-size: 0.8125rem; }  /* default tile body text */
      .t-figure    { font-size: 1.5rem; }     /* primary KPI / data figure */
      .t-figure-lg { font-size: 2.125rem; letter-spacing: -0.025em; }   /* hero figure */
      .nav:hover { background:#161617; color:#f4f4f5; }

      /* Shape-aware dashboard content: widgets can adapt their internals to the
         user-resized bento cell, starting with the net-worth trend chart. */
      .trend-body { display:flex; flex-direction:column; min-height:0; height:100%; gap:.45rem; overflow:hidden; }
      .trend-head { flex:0 0 auto; }
      .trend-figure { flex:0 0 auto; line-height:1.05; }
      .trend-standard { margin-top:.18rem; }
      .trend-expanded { display:none; flex:0 0 auto; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.45rem; }
      .trend-stat { min-width:0; border:1px solid rgba(244,244,245,.08); background:rgba(244,244,245,.025); padding:.38rem .45rem; }
      .trend-stat span { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .trend-chart { flex:1 1 auto; min-height:0; }
      .w[data-widget="trend"][data-row-span="1"] .trend-body { gap:.25rem; justify-content:flex-end; }
      .w[data-widget="trend"][data-row-span="1"] .trend-head { display:flex; align-items:baseline; justify-content:space-between; gap:.5rem; }
      .w[data-widget="trend"][data-row-span="1"] .trend-figure { font-size:1.02rem; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-head { display:block; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-standard,
      .w[data-widget="trend"][data-row-span="1"] .trend-expanded { display:none; }
      .w[data-widget="trend"][data-row-span="1"] .trend-chart { flex:0 0 54px; min-height:54px; }
      .w[data-widget="trend"][data-row-span="1"] .trend-chart .tick,
      .w[data-widget="trend"][data-row-span="1"] .trend-chart .domain { display:none; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-chart { flex-basis:58px; min-height:58px; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-chart svg { overflow:visible; }
      .w[data-widget="trend"][data-row-span="2"] .trend-chart { flex-basis:0; min-height:118px; }
      .w[data-widget="trend"][data-row-span="3"] .trend-chart { flex-basis:0; min-height:220px; margin-top:auto; }
      .w[data-widget="trend"][data-col-span="2"] .trend-body,
      .w[data-widget="trend"][data-col-span="3"] .trend-body,
      .w[data-widget="trend"][data-col-span="4"] .trend-body { gap:.65rem; }
      .w[data-widget="trend"][data-col-span="2"] .trend-figure,
      .w[data-widget="trend"][data-col-span="3"] .trend-figure,
      .w[data-widget="trend"][data-col-span="4"] .trend-figure { font-size:1.8rem; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="3"] .trend-figure { font-size:1.55rem; }
      .w[data-widget="trend"][data-col-span="2"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="2"][data-row-span="3"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="3"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="4"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="4"][data-row-span="3"] .trend-expanded { display:grid; }
      .w[data-widget="trend"][data-col-span="2"][data-row-span="3"] .trend-body,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="3"] .trend-body,
      .w[data-widget="trend"][data-col-span="4"][data-row-span="3"] .trend-body {
        display:grid; grid-template-rows:auto auto minmax(0,1fr); align-content:stretch;
      }

      /* Bento grid — square outlined cells with a small gap.
         One base cell unit; every row is exactly one unit so widgets integer-scale. */
      .bento { display:grid; --cell:152px; grid-template-columns: repeat(4, minmax(0,1fr)); grid-template-rows: repeat(8, var(--cell)); grid-auto-rows: var(--cell); gap:10px; overflow-anchor:none; }
      .w { position:relative; background:#121214; border:1px solid #34343a; overflow:hidden; display:flex; flex-direction:column; transition: border-color .12s ease; will-change: transform; } /* GX8-F2 */
      .w:hover { border-color:#44444c; }
      /* opacity is !important: .bento .w carries the wonder-bento-enter entrance
         animation (fill-mode:both, final keyframe opacity:1), whose filled value
         would otherwise clobber this drag-ghost cue. This is a functional drag
         affordance (not a motion flourish), so it should always apply while
         dragging regardless of the WONDER setting. */
      .w.drag { opacity:.35 !important; pointer-events:none; cursor:grabbing; }
      [data-bento-dragging] .bento { cursor:grabbing; }
      [data-bento-dragging] .bento .w:not(.drag) { transition: border-color .15s ease, box-shadow .15s ease; }

      /* reconfigure controls */
      .ghandle { position:absolute; top:7px; right:40px; z-index:3; color:#5a5a64; cursor:grab; font-size:.95rem; line-height:1; }
      .ghandle:active { cursor:grabbing; }
      .gear-inline { margin-left:auto; color:#5a5a64; background:transparent; border:0; cursor:pointer; font-size:.95rem; line-height:1; transition:color .12s ease; }
      /* Brighten the gear when the tile is hovered/focused so per-tile settings
         are discoverable (C21); the gear only renders on configurable tiles. */
      .w:hover .gear-inline, .w:focus-within .gear-inline { color:#9a9aa2; }
      .gear-inline:hover { color:#f4f4f5; }
      .gear-abs { position:absolute; top:7px; right:16px; z-index:3; color:#5a5a64; background:transparent; border:0; cursor:pointer; font-size:.95rem; line-height:1; }
      .gear-abs:hover { color:#f4f4f5; }
      /* W-6 · gear transition extension (after base rule so cascade order is correct) */
      .gear-inline, .gear-abs { transition: color .12s ease, transform var(--wonder-dur-fast) var(--wonder-ease); }

      /* time resolution + range controls */
      .seg { display:inline-flex; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:2px; position:relative; }
      /* Sliding pill indicator (§6.16): positioned by JS (measures the active
         segment) via a standard transform/width, animated by these transitions. */
      /* GD-10: the active-segment pill had a raised box-shadow only in light mode — give the dark
         pill the same subtle elevation + a hairline top highlight so the selected period/toggle reads
         as a lifted chip in both themes, consistent with the rest of the design pass. */
      .seg-pill { position:absolute; top:2px; bottom:2px; left:0; width:0; background:#2a2a30; border-radius:3px; opacity:0; pointer-events:none; z-index:0; transition: transform .18s ease, width .18s ease, opacity .12s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05); }
      .seg-btn { padding:.32rem .72rem; border-radius:3px; font-size:.85rem; color:#a6a6ac; background:transparent; border:0; cursor:pointer; position:relative; z-index:1; }
      .seg-btn:hover { color:#f4f4f5; }
      .seg-btn.active { background:transparent; color:#f4f4f5; }
      @media (prefers-reduced-motion: reduce) { .seg-pill { transition:none; } }
      .rcap { font-size:.66rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; }
      .rpill { display:inline-flex; align-items:center; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:.2rem .25rem; }
      .rstep { background:transparent; border:0; color:#a6a6ac; cursor:pointer; padding:0 .3rem; font-size:1rem; line-height:1; }
      .rstep:hover { color:#f4f4f5; }
      .rlabel { min-width:128px; text-align:center; font-size:.8rem; }

      /* resize handles stay quiet until a tile is hovered or focused. */
      .rz { position:absolute; z-index:6; opacity:0; pointer-events:none; border:0; padding:0; background:transparent; color:#d4d4d8; transition:opacity .12s ease, background .12s ease, color .12s ease; }
      .w:hover .rz, .w:focus-within .rz, .w:focus-visible .rz { opacity:.9; pointer-events:auto; }
      .rz[data-dir="l"], .rz[data-dir="r"] { top:24px; bottom:8px; width:16px; cursor:ew-resize; }
      .rz[data-dir="l"] { left:0; }
      .rz[data-dir="r"] { right:0; }
      .rz[data-dir="t"], .rz[data-dir="b"] { left:34px; right:34px; height:16px; cursor:ns-resize; }
      .rz[data-dir="t"] { top:0; }
      .rz[data-dir="b"] { bottom:0; }
      .rz::before { content:""; position:absolute; border-radius:999px; background:rgba(212,212,216,.62); box-shadow:0 0 0 1px rgba(244,244,245,.12), 0 6px 18px rgba(0,0,0,.28); }
      .rz[data-dir="l"]::before, .rz[data-dir="r"]::before { top:50%; width:3px; height:min(44px,42%); transform:translateY(-50%); }
      .rz[data-dir="l"]::before { left:4px; }
      .rz[data-dir="r"]::before { right:4px; }
      .rz[data-dir="t"]::before, .rz[data-dir="b"]::before { left:50%; width:min(48px,42%); height:3px; transform:translateX(-50%); }
      .rz[data-dir="t"]::before { top:4px; }
      .rz[data-dir="b"]::before { bottom:4px; }
      .rz[data-dir="l"]::after, .rz[data-dir="r"]::after { content:""; position:absolute; top:50%; width:0; height:0; transform:translateY(-50%); border-top:4px solid transparent; border-bottom:4px solid transparent; }
      .rz[data-dir="l"]::after { left:3px; border-right:5px solid currentColor; }
      .rz[data-dir="r"]::after { right:3px; border-left:5px solid currentColor; }
      .rz[data-dir="t"]::after, .rz[data-dir="b"]::after { content:""; position:absolute; left:50%; width:0; height:0; transform:translateX(-50%); border-left:4px solid transparent; border-right:4px solid transparent; }
      .rz[data-dir="t"]::after { top:3px; border-bottom:5px solid currentColor; }
      .rz[data-dir="b"]::after { bottom:3px; border-top:5px solid currentColor; }
      /* GX4-F6: removed outline:none from :focus-visible — never suppress the keyboard ring.
         Hover keeps its appearance; keyboard focus gets the global accent ring. */
      .rz:hover, .rz:focus-visible { opacity:1; color:#fff; background:rgba(244,244,245,.045); }
      .rz:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
      .rz:hover::before, .rz:focus-visible::before { background:rgba(244,244,245,.78); }
      .rz.off { opacity:0 !important; pointer-events:none !important; }

      /* dark, modern scrollbar for the scroll pane */
      main.cf-scroll { scrollbar-width: thin; scrollbar-color: #34343a transparent; scroll-behavior: smooth; }
      main.cf-scroll::-webkit-scrollbar { width: 11px; }
      main.cf-scroll::-webkit-scrollbar-track { background: transparent; }
      main.cf-scroll::-webkit-scrollbar-thumb { background: #2d2d33; border-radius: 999px; border: 3px solid #0e0e0f; background-clip: padding-box; }
      main.cf-scroll::-webkit-scrollbar-thumb:hover { background: #44444c; }
      main.cf-scroll::-webkit-scrollbar-thumb:active { background: #55555e; }

      /* Settings flip */
      .flip-backdrop { position:fixed; inset:0; background:rgba(4,4,6,.6); backdrop-filter:blur(3px); display:grid; place-items:center; opacity:0; pointer-events:none; transition:opacity .28s; z-index:50; } /* C414: closed backdrop intercepts nothing */
      .flip-backdrop.show { opacity:1; pointer-events:auto; }
      .flip-wrap { width:384px; max-width:92vw; height:470px; max-height:86vh; perspective:1500px; }
      .flip-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.2,.75,.2,1); transform:rotateY(0) scale(.86); }
      .flip-inner.flipped { transform:rotateY(180deg) scale(1); }
      .flip-face { position:absolute; inset:0; backface-visibility:hidden; border:1px solid #34343a; border-radius:4px; background:#121214; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 30px 70px -20px rgba(0,0,0,.75); }
      .flip-back { transform:rotateY(180deg); }
      .set-h { display:flex; align-items:center; gap:.5rem; padding:.85rem 1rem; border-bottom:1px solid #2a2a2c; }
      .set-h h3 { font-family:var(--font-display),'Fraunces',serif; font-size:1.05rem; font-weight:600; flex:1; text-align:center; }
      .set-close { background:transparent; border:0; color:#8a8a92; cursor:pointer; font-size:.95rem; width:1.5rem; line-height:1; }
      .set-close:hover { color:#f4f4f5; }
      .set-body { flex:1; overflow-y:auto; padding:1rem 1rem 1.5rem; scrollbar-width:thin; scrollbar-color:#34343a transparent; }
      .set-body::-webkit-scrollbar { width:9px; } .set-body::-webkit-scrollbar-thumb { background:#2d2d33; border-radius:999px; border:2px solid #121214; }
      .set-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; margin:.7rem 0 .3rem; }
      .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:.55rem 0; border-bottom:1px solid #1f1f22; font-size:.9rem; }
      .switch { width:40px; height:24px; border-radius:999px; background:#34343a; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
      .switch::after { content:""; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#9a9aa4; transition:.2s; }
      /* W-8 · Toggle/switch spring — overrides the bare .2s above with an overshoot ease.
         cubic-bezier(.34,1.56,.64,1) gives a spring; [data-wonder="off"] zeroes --wonder-dur
         (→ 0ms) so the knob snaps; the universal reduced-motion transition-duration:0.001ms
         already covers ::after, neutralising motion for those users too. */
      .switch::after { transition: left var(--wonder-dur) cubic-bezier(.34,1.56,.64,1), background var(--wonder-dur) var(--wonder-ease-out); }
      .switch.on { background:#3e7f5e; } .switch.on::after { left:19px; background:#e6f3ec; }
      .swatch { width:24px; height:24px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition: border-color .12s ease; }
      /* GD-19: faint ring on hover so unselected accent swatches read as interactive. The selected
         .swatch.sel rule is more specific, so hovering the current swatch keeps its white ring. */
      .swatch:hover { border-color: var(--text-faint); }
      .swatch.sel { border-color:#f4f4f5; }
      .set-input { width:100%; padding:.5rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; }
      .set-foot { padding:.75rem 1rem; border-top:1px solid #2a2a2c; display:flex; flex-shrink:0; gap:.5rem; justify-content:flex-end; } /* C123: footer never squeezed off-panel */
      /* GX3-F3: align modal footer buttons to the same scale token as .btn so height is consistent. */
      .set-btn { min-width:96px; padding:var(--btn-py,0.5rem) 1rem; min-height:44px; border-radius:4px; cursor:pointer; font-size:.9rem; display:inline-flex; align-items:center; justify-content:center; }
      .set-btn.save { background:#1f2c24; border:1px solid #356b50; color:#7fd0a3; font-weight:600; }
      .set-btn.save:hover { background:#26382d; }
      .set-btn.cancel { background:transparent; border:1px solid #34343a; color:#a6a6ac; font-weight:500; }
      .set-btn.cancel:hover { color:#f4f4f5; border-color:#44444c; }

      /* squared progress bars (consistent radii) */
      .bento [class*="rounded-full"][class*="overflow-hidden"] { border-radius:2px; }

      /* Hide the left-rail's scrollbar but keep it scrollable (wheel/trackpad/
         keyboard) — the nav overflows once "My pages" grows (C31). */
      aside.rail nav { scrollbar-width: none; }
      aside.rail nav::-webkit-scrollbar { width: 0; height: 0; display: none; }

      /* sidebar collapse */
      aside.rail { transition:width .18s ease; }
      aside.rail.collapsed { width:58px; }
      aside.rail.collapsed .brand-name,
      aside.rail.collapsed .nv span,
      aside.rail.collapsed nav .rail-section,
      aside.rail.collapsed .hh-text { display:none; }
      aside.rail.collapsed .nv { justify-content:center; gap:0; padding-left:0; padding-right:0; position:relative; }
      /* Alt+1–9 keyboard-jump hint at the trailing edge of each primary nav item (L34).
         Surfaces the otherwise-undiscoverable shortcut; hidden when the rail is collapsed. */
      .nav-alt-hint { margin-left:auto; font-size:0.7rem; line-height:1; color:var(--muted); opacity:0.7;
        border:1px solid var(--border); border-radius:4px; padding:1px 4px; }
      aside.rail.collapsed .nav-alt-hint { display:none; }
      aside.rail.collapsed .railhead { padding-left:0; padding-right:0; justify-content:center; }
      aside.rail.collapsed .hh { justify-content:center; padding-left:0; padding-right:0; }
      /* Collapsed rail: reveal the label as a flyout on hover/focus without widening the rail. */
      aside.rail.collapsed .nv:hover > span,
      aside.rail.collapsed .nv:focus-visible > span,
      aside.rail.collapsed .nv:focus-within > span {
        display:block; position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%);
        white-space:nowrap; background:var(--bg-elev); color:var(--text);
        border:1px solid var(--border); border-radius:6px; padding:0.25rem 0.55rem;
        font-size:13px; line-height:1; box-shadow:0 6px 18px rgba(0,0,0,.28); z-index:60; pointer-events:auto;
      }
      @media (prefers-reduced-motion: no-preference) {
        aside.rail.collapsed .nv:hover > span,
        aside.rail.collapsed .nv:focus-visible > span,
        aside.rail.collapsed .nv:focus-within > span { animation: rail-flyout .12s ease both; }
      }
      @keyframes rail-flyout { from { opacity:0; transform:translate(-4px,-50%); } to { opacity:1; transform:translateY(-50%); } }

      /* Phone layout (C10): below 768px the full 240px rail pushed content
         off-screen and the page scrolled horizontally. Collapse the rail to its
         icon-only width to reclaim space, stack the bento into one column
         (overriding tiles' inline grid placement), and clamp horizontal overflow. */
      @media (max-width: 767px) {
        html, body, #app { overflow-x: hidden; max-width: 100vw; }
        aside.rail { width: 56px; }
        aside.rail .brand-name,
        aside.rail .nv span,
        aside.rail nav .rail-section,
        aside.rail .hh-text { display: none; }
        aside.rail .nv { justify-content: center; gap: 0; padding-left: 0; padding-right: 0; }
        aside.rail .railhead { padding-left: 0; padding-right: 0; justify-content: center; }
        aside.rail .hh { justify-content: center; padding-left: 0; padding-right: 0; }
        .bento { grid-template-columns: 1fr !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
      }
      /* Tablet/narrow (C19): the top bar's controls (resolution segmented + jump +
         stepper + custom range + Add) ran off the right edge with no wrap, so some
         were unreachable. Let the bar grow to two rows — breadcrumb on top, the
         controls wrapping onto a full-width second row — so nothing is clipped. */
      @media (max-width: 1024px) {
        /* height:auto must beat Tailwind's .h-14; flex:1 0 100% forces the
           control cluster onto its own full-width row (without it, flexbox just
           shrinks everything onto one line and squashes the breadcrumb). */
        .topbar { height: auto !important; min-height: 3.5rem; flex-wrap: wrap; row-gap: .4rem; padding-top: .4rem; padding-bottom: .4rem; }
        .topbar-controls { margin-left: 0; flex: 1 0 100%; flex-wrap: wrap; row-gap: .4rem; justify-content: flex-start; }
        .reso-control { flex-wrap: wrap; row-gap: .4rem; }
        /* List rows (transactions etc.): let the action buttons wrap below the
           description instead of overlapping it when the row is too narrow (C19).
           row-main keeps flex:1 so it takes the first line and the controls flow
           underneath. A no-op on rows that still fit. */
        .row { flex-wrap: wrap; row-gap: .4rem; }
      }
      /* Tablet bento (C19): between the phone breakpoint and the desktop, the
         4-column grid squeezed tiles to ~150px and KPI figures clipped. Flow the
         tiles into 2 columns instead (header stays full-width) so figures fit. */
      @media (min-width: 768px) and (max-width: 1024px) {
        .bento { grid-template-columns: repeat(2, 1fr) !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: auto !important; grid-row: auto !important; }
        .bento > *:first-child { grid-column: 1 / -1 !important; } /* dashboard header spans both columns */
      }
      /* GX7-F2: at narrow portrait widths (≤480px) the topbar controls wrap to 3–4 rows,
         consuming up to 296px (37%) of an 800px phone screen before any content appears.
         Switch to a horizontally-scrollable single-row strip so all controls stay accessible
         without bloating the vertical chrome. The existing two-row wrap (C19, ≤1024px) is
         preserved at tablet widths; this override only kicks in at phone width. */
      @media (max-width: 480px) {
        .topbar { flex-wrap: nowrap; overflow-x: auto; min-height: 3rem; height: auto !important;
          -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .topbar::-webkit-scrollbar { display: none; }
        .topbar-controls { flex: 0 0 auto; flex-wrap: nowrap; overflow-x: visible; row-gap: 0; }
        .reso-control { flex-wrap: nowrap; }
      }
      /* GX7-F4: at ≤767px the bento override (.bento>* { grid-column: 1/-1 }) can leak into
         .stat-grid when it sits inside the bento flow, collapsing the KPI row to 1 column.
         Re-assert auto-fit with a tighter minmax (120px) so 3 stat tiles fit in 344px. */
      @media (max-width: 767px) {
        .page .stat-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) !important; }
      }
      .menu-btn { background:transparent; border:0; color:#a6a6ac; cursor:pointer; display:grid; place-items:center; }
      /* "+ Add" popover menu (C23): a button that opens a small list of add
         actions. Always in the DOM; .hidden-menu toggles visibility so the
         framework's On* hooks stay at stable positions. */
      .add-wrap { position:relative; display:inline-flex; align-items:center; gap:1px; }
      /* C44: split-button caret — opens the full add-anything menu; narrower than the
         primary + button so the pair reads as one control. */
      .add-caret { display:inline-flex; align-items:center; justify-content:center; width:20px; height:30px;
        background:transparent; border:none; color:var(--text-dim); cursor:pointer; border-radius:6px;
        transition: background .12s ease, color .12s ease; }
      .add-caret:hover { color:var(--text); background:var(--bg-elev); }
      [data-theme="light"] .add-caret { border:1px solid var(--border); }
      /* Open direction is decided at open-time in addmenu.go (syscall/js measures the
         button's gap to the viewport's right edge): the +Add button reflows between
         the left of the content area (≤24px from the rail) and the right edge across
         widths, so neither a fixed left:0 nor right:0 nor a breakpoint is robust —
         right:0 overlaps the rail when the button is left, left:0 overflows when it's
         right. Default opens RIGHTward (left:0); `.open-left` flips to right:0 when
         there isn't ~224px of room on the right. */
      .add-menu { position:absolute; left:0; right:auto; top:calc(100% + 6px); z-index:50; min-width:210px;
        background:var(--bg-elev); border:1px solid var(--border); border-radius:8px; padding:4px;
        box-shadow:0 8px 24px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:2px; }
      .add-menu.open-left { left:auto; right:0; }
      .add-item { text-align:left; padding:.5rem .7rem; border-radius:5px; background:transparent;
        border:0; color:var(--text); cursor:pointer; font:inherit; font-size:13px; }
      .add-item:hover, .add-item:focus-visible { background:var(--hover); }
      .add-backdrop { position:fixed; inset:0; z-index:40; }
      .hidden-menu { display:none; }
      /* Stacking safety for ⋯ / +Add popovers: while a menu is OPEN, elevate its wrapper AND its host
