<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App base href, set before any relative asset is referenced, so a deep-link
         refresh (e.g. /p/taxes) resolves ./wasm_exec.js, ./bin/main.wasm, etc. to
         the app root instead of the current route's directory. On a *.github.io
         project site the app lives under /<repo>/, so derive the base from the
         first path segment there; everywhere else (local dev, custom domain) it's
         the server root. Must run first in <head>. -->
    <script>
      (function () {
        var base = "/";
        if (location.hostname.endsWith("github.io")) {
          var seg = location.pathname.split("/")[1];
          if (seg) base = "/" + seg + "/";
        }
        document.write('<base href="' + base + '">');
      })();
    </script>

    <title>CashFlux</title>

    <!-- PWA: installable, standalone, dark theme -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Design system (candidate C): Inter for UI, Fraunces for display headings + figures -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN removed (C91): all utility classes are now emitted by the typed
         Go `tw`/css vocabulary at runtime into <style id="gwc-css">. No external CSS
         dependency, works offline. The former tailwind.config palette/type tokens live
         in internal/ui/tw (exact hex) + the :root CSS variables below. -->

    <style>
      :root {
        /* Retargeted to the candidate-C palette so the legacy screen components
           (cards, stats, rows, forms) match the new bento shell. */
        --bg: #0e0e0f;
        --bg-elev: #1a1a1d;
        --bg-card: #121214;
        --border: #2a2a2c;
        --text: #f4f4f5;
        --text-dim: #ababb3;
        --text-faint: #888890;
        --accent: #2e8b57;
        --accent-dim: #1f2c24;
        --brand: #7c83ff;
        --danger: #d8716f;
        --radius: 0px;
        /* Default type tokens (B20). The theme engine overrides these on :root;
           consumers keep a static fallback chain after var() so text still
           renders if a chosen font fails to load. */
        --font-ui: Inter;
        --font-display: 'Fraunces';
        /* Optional dashboard banner (B20). --banner-bg is the background image /
           gradient; the band is shown only when data-banner="on". */
        --banner-bg: none;
        /* Icon line weight (B13). The theme engine overrides this; the inline
           default keeps icons crisp before the engine applies. */
        --icon-stroke: 1.6;
      }

      /* Dashboard banner band (B20): a decorative full-width header strip above
         the bento grid. Collapsed (not rendered) unless a banner is chosen. */
      .app-banner { display: none; }
      :root[data-banner="on"] .app-banner {
        display: block; height: 132px; margin-bottom: 1rem;
        background-image: var(--banner-bg, none); background-size: cover; background-position: center;
        border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: inset 0 -44px 64px -34px rgba(0,0,0,0.55);
      }
      * { box-sizing: border-box; }
      /* Minimal Tailwind-preflight equivalent (C91): the Tailwind CDN used to ship
         a base reset; with the CDN gone we restore the rules the app relies on so
         layout/typography stay identical. Most important: block-level replaced
         elements (an inline <svg> otherwise leaves a baseline gap that overflows
         tight tiles like the net-worth trend chart). */
      *, ::before, ::after { border-width: 0; border-style: solid; border-color: currentColor; }
      img, svg, video, canvas, audio, iframe, embed, object { display: block; vertical-align: middle; }
      img, video { max-width: 100%; height: auto; }
      button, input, optgroup, select, textarea { font-family: inherit; font-feature-settings: inherit; font-size: 100%; font-weight: inherit; line-height: inherit; color: inherit; margin: 0; padding: 0; }
      button, select { text-transform: none; }
      button, [type='button'], [type='reset'], [type='submit'] { -webkit-appearance: button; background-color: transparent; background-image: none; cursor: pointer; }
      :-moz-focusring { outline: auto; }
      h1, h2, h3, h4, h5, h6 { font-size: inherit; font-weight: inherit; }
      a { color: inherit; text-decoration: inherit; }
      ol, ul, menu { list-style: none; margin: 0; padding: 0; }
      p, h1, h2, h3, h4, h5, h6, blockquote, figure, pre, fieldset, hr { margin: 0; }
      table { border-collapse: collapse; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: var(--font-ui), Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        /* Default density rebalanced down (C25): the out-of-the-box 16px/1.5 read
           too heavy for a dense finance app. The Fraunces display figures keep
           their explicit sizes, so the data accents stay prominent. The Compact
           toggle and Display scale remain as further levers on top of this. */
        font-size: 14.5px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      /* Boot loader: an on-brand animated mark while the wasm downloads and
         instantiates. Fades + lifts away once the app mounts. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: var(--bg); z-index: 10;
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      #boot.hidden { opacity: 0; transform: scale(1.03); pointer-events: none; }
      .boot-card { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
      .boot-mark { position: relative; width: 64px; height: 64px; display: grid; place-items: center; }
      .boot-ring { position: absolute; inset: 0; width: 64px; height: 64px; animation: boot-spin 1.15s linear infinite; }
      .boot-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
      .boot-ring-arc {
        fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
        stroke-dasharray: 70 126; stroke-dashoffset: 0;
      }
      .boot-c {
        font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 1.6rem;
        color: var(--text); line-height: 1; animation: boot-breathe 1.8s ease-in-out infinite;
      }
      .boot-word {
        font-family: "Fraunces", Georgia, serif; font-size: 1.15rem; font-weight: 600;
        letter-spacing: 0.01em; color: var(--text); opacity: 0; animation: boot-fade-up 0.6s ease 0.1s forwards;
      }
      .boot-sub {
        font-size: 0.82rem; color: var(--text-faint); opacity: 0;
        animation: boot-fade-up 0.6s ease 0.25s forwards;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-breathe { 0%,100% { opacity: 0.55; transform: scale(0.97); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes boot-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      /* Display scale: zoom the whole app by the user's preference (default 1). */
      #app { zoom: var(--ui-scale, 1); }
      /* Skip-to-content link: off-screen until keyboard-focused. */
      .skip-link { position: absolute; left: 8px; top: -48px; z-index: 200; background: var(--bg-elev);
        color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.8rem;
        font-size: 13px; text-decoration: none; transition: top .12s ease; }
      .skip-link:focus { top: 8px; }
      @media (prefers-reduced-motion: reduce) { .skip-link { transition: none; } }
      /* Visible focus ring for keyboard users on every interactive element (both themes). */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
      [role="switch"]:focus-visible, [role="radio"]:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
      }
      /* App settle-in: a calm fade + slight lift/scale once mounted. */
      #app.app-enter { animation: app-settle 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes app-settle {
        from { opacity: 0; transform: translateY(10px) scale(0.992); }
        to   { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot, #boot.hidden { transition: opacity 0.2s ease; transform: none; }
        .boot-ring, .boot-c, .boot-word, .boot-sub, #app.app-enter { animation: none; opacity: 1; }
        /* No motion: the dialog appears in place (no flip/lift), the toast doesn't
           slide in, and the rail resizes instantly. */
        .flip-inner, .flip-backdrop { transition: none; }
        .toast { animation: none; }
        aside.rail { transition: none; }
        /* GX8-F1: the explicit list above missed ~20 interactive-element transitions
           (.btn, .w, .row, .nav-link, .seg-btn, .data-btn, etc.) which still animated
           under reduce. Universally neutralize TRANSITIONS (keyframe animations are
           already guarded individually above + via no-preference blocks). */
        *, *::before, *::after { transition-duration: 0.001ms !important; }
      }
      #boot-error {
        display: none; position: fixed; inset: auto 1rem 1rem 1rem; z-index: 20;
        background: #3b0d0d; color: #fecaca; border: 1px solid #7f1d1d;
        padding: 0.75rem 1rem; border-radius: 8px; font-family: ui-monospace, monospace;
        font-size: 0.8rem; white-space: pre-wrap;
      }

      /* App shell */
      .app { min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 5;
        display: flex; align-items: center; gap: 1.25rem;
        padding: 0.75rem 1.25rem; background: rgba(11,16,32,0.85);
        backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
        /* Wrap controls onto a second row when they don't fit, rather than
           turning a fixed-height header into a scroll container (C34). */
        flex-wrap: wrap; row-gap: 0.4rem; min-height: 3.5rem;
      }
      .topbar-controls { flex-wrap: wrap; row-gap: 0.4rem; }
      .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; white-space: nowrap; }
      .brand-mark {
        display: grid; place-items: center; width: 1.6rem; height: 1.6rem;
        background: var(--accent); color: #052e13; border-radius: 8px; font-weight: 900;
      }
      .brand-name { font-size: 1.05rem; letter-spacing: -0.01em; }
      .nav { display: flex; gap: 0.25rem; flex-wrap: nowrap; }
      .nav-link {
        appearance: none; border: 0; background: transparent; color: var(--text-dim);
        font: inherit; font-size: 0.9rem; padding: 0.4rem 0.7rem; border-radius: 8px;
        cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s;
      }
      .nav-link:hover { background: var(--bg-elev); color: var(--text); }
      .nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

      /* Page */
      .page { width: 100%; max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
      /* GX7-F1: on ultra-wide displays content sprawled to ~2320px (no cap on main),
         giving grotesque table column spacing + unreadable line lengths. Cap + center
         the content area. Gated at min-width:1441px so all common widths are untouched. */
      @media (min-width: 1441px) { main { max-width: 1440px; margin-inline: auto; } }
      .page-head { margin-bottom: 1.5rem; }
      .page-title { margin: 0; font-size: 1.6rem; letter-spacing: -0.02em; }
      .page-sub { margin: 0.25rem 0 0; color: var(--text-dim); }

      /* Cards & bits */
      .card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      }
      /* Spending highlights (Insights anomaly cards) */
      .insight-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
      .insight-row { display: flex; align-items: flex-start; gap: 0.6rem; margin: 0; line-height: 1.45; }
      .insight-dot { flex: none; font-weight: 800; font-size: 1rem; line-height: 1.35; }
      /* Compact density: tighter cards, rows, and fields (set via data-density on <html>). */
      /* Section divider (G9): groups a long card scroll into labelled clusters
         (Spending / Income / Trends) so the page can be navigated, not just read
         top-to-bottom. An uppercase muted label with a hairline rule. */
      .section-divider { display: flex; align-items: center; gap: 0.6rem; margin: 1.6rem 0 0.6rem;
        font-size: 0.74rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--text-faint); }
      .section-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
      .section-divider:first-child { margin-top: 0; }
      [data-theme="light"] .section-divider { color: #686870; }

      [data-density="compact"] .card { padding: 0.7rem 0.8rem; margin-bottom: 0.6rem; }
      [data-density="compact"] .card-title { margin-bottom: 0.45rem; }
      [data-density="compact"] .row { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      [data-density="compact"] .field, [data-density="compact"] .btn { padding-top: 0.35rem; padding-bottom: 0.35rem; min-height: 40px; }

      /* Light theme (set via data-theme="light" on <html>). Overrides the legacy
         palette variables, the shell's Tailwind utility colors, and the widgets'
         hardcoded surface hexes. The user accent (--accent) is left untouched. */
      [data-theme="light"] {
        --bg: #f7f6f3; --bg-elev: #efede8; --bg-card: #ffffff;
        --border: #e4e2dd; --text: #1c1c1e; --text-dim: #56565c; --text-faint: #686870;
        --accent-dim: #e4f3ea;
        /* GM4-6: --hover was undefined in light, so .add-item / command-palette
           selected rows fell back to the dark #1c1c1e (near-black on near-black text
           = ~1:1). Define a light hover surface so selection is visible. */
        --hover: #e8e6e1;
      }
      [data-theme="light"] .bg-base { background-color: #f7f6f3; }
      [data-theme="light"] .bg-tile { background-color: #ffffff; }
      [data-theme="light"] .bg-hover, [data-theme="light"] .hover\:bg-hover:hover { background-color: #efede8; }
      [data-theme="light"] .text-fg { color: #1c1c1e; }
      [data-theme="light"] .text-dim { color: #56565c; }
      [data-theme="light"] .text-faint { color: #686870; }
      /* Legacy components read var(--text)/(--text-dim), but the theme engine emits
         those as runtime vars that can outrank the [data-theme="light"] palette
         override — so in light mode a card title or category name could keep the
         dark theme's near-white --text and vanish on a white card (G9 measured
         rgb(244,244,245) on white). Pin the COLOR directly (not via the var) under
         data-theme="light" so these always read on white, whatever --text resolves
         to. This is the definitive fix for the recurring G4–G11 light-mode finding. */
      [data-theme="light"] .card-title, [data-theme="light"] .page-title,
      [data-theme="light"] .row-desc, [data-theme="light"] .stat-value,
      [data-theme="light"] .budget-amount,
      [data-theme="light"] .amount:not(.amount-income):not(.amount-expense),
      [data-theme="light"] .budget .row-desc { color: #1c1c1e; }
      [data-theme="light"] .muted, [data-theme="light"] .row-meta,
      [data-theme="light"] .budget-sub,
      [data-theme="light"] .stat-label, [data-theme="light"] .page-sub,
      [data-theme="light"] .set-label, [data-theme="light"] .t-caption { color: #3c3c43; }
      [data-theme="light"] .border-line, [data-theme="light"] .border-r, [data-theme="light"] .border-b { border-color: #e4e2dd; }
      [data-theme="light"] .bg-\[\#1c1c1e\] { background-color: #ececec; color: #1c1c1e; }
      [data-theme="light"] .bg-fg { background-color: #1c1c1e; }
      [data-theme="light"] .text-base { color: #f7f6f3; }
      /* G22 CRITICAL: custom widget tile header text was near-white (rgb(244,244,245)) on a
         white tile background — ~1.05:1 ratio, completely invisible. Pin .wh headings to
         the darkest foreground token so the title is always readable. */
      [data-theme="light"] .wh h2, [data-theme="light"] .wh h3 { color: #1c1c1e; }
      [data-theme="light"] .wh .grip { color: #6a6a72; }
      /* G22 CRITICAL: custom page content area had no background-color in light mode — the
         body dark bg bled through the transparent content div as a near-black void. Apply
         the warm-white body bg so bento and empty-state cards sit on the correct surface. */
      [data-theme="light"] .bento, [data-theme="light"] .bento + *, [data-theme="light"] main > div { background-color: var(--bg); }
      /* G23 T1-B: shell/nav backgrounds switch to light tokens — eliminates dark bands between cards
         and the dark topbar/rail stripe in light mode. */
      /* GX1: the theme engine emits runtime backgrounds that outrank these shell
         overrides, leaving the whole chrome (topbar, rail, icon buttons, +Add menu,
         active nav chip) DARK in light mode. Strengthen with !important + add the
         missing surfaces so the shell is correct in light. All [CSS-ONLY]. */
      [data-theme="light"] .topbar { background: rgba(247,246,243,0.92) !important; color: #1c1c1e; border-color: #e4e2dd; }
      [data-theme="light"] aside.rail, [data-theme="light"] .rail { background: var(--bg-elev) !important; color: #1c1c1e; }
      [data-theme="light"] main { background: var(--bg) !important; }
      /* GX1-F2: active nav chip was dark-on-dark → invisible on the warm-white rail. */
      [data-theme="light"] aside.rail .nv.active, [data-theme="light"] aside.rail .nv[aria-current="page"] {
        background: var(--accent-dim) !important; color: #1c1c1e !important; }
      [data-theme="light"] aside.rail .nv { color: #3c3c43; }
      [data-theme="light"] aside.rail .nv:hover { background: #efede8 !important; color: #1c1c1e; }
      [data-theme="light"] aside.rail .rail-section { color: #6a6a72; }
      /* GX1-F3: topbar icon buttons rendered on a dark rgb(32,32,34) surface in light. */
      [data-theme="light"] .muzak-btn, [data-theme="light"] .notify-btn, [data-theme="light"] .add-btn {
        background: #ffffff !important; color: #3c3c43; border: 1px solid #e4e2dd; }
      [data-theme="light"] .muzak-btn:hover, [data-theme="light"] .notify-btn:hover, [data-theme="light"] .add-btn:hover {
        background: #efede8 !important; color: #1c1c1e; }
      /* GX1-F4: +Add menu + notices popover panels were near-black in light. */
      [data-theme="light"] .add-menu, [data-theme="light"] .notify-menu, [data-theme="light"] .muzak-menu {
        background: #ffffff !important; border-color: #e4e2dd !important; color: #1c1c1e; }
      [data-theme="light"] .add-item:hover, [data-theme="light"] .notify-item:hover { background: #efede8 !important; color: #1c1c1e; }
      /* G22 + GX2-F5: darken .empty text in light for WCAG AA. The plain rule was
         outranked on some surfaces (dashboard widgets, cards) by runtime --text-faint
         (~3.2:1), so pin a darker value with !important across .empty + widget empties. */
      [data-theme="light"] .empty, [data-theme="light"] .w .empty, [data-theme="light"] .card .empty { color: #4b4b52 !important; }
      /* Widget shell, segmented + stepper pills, nav hover */
      [data-theme="light"] .w { background: #ffffff; border-color: #e4e2dd; }
      [data-theme="light"] .nav:hover { background: #efede8; color: #1c1c1e; }
      [data-theme="light"] .seg, [data-theme="light"] .rpill { background: #efede8; border-color: #e4e2dd; }
      [data-theme="light"] .seg-btn, [data-theme="light"] .rstep { color: #56565c; }
      [data-theme="light"] .seg-btn.active { background: #ffffff; color: #1c1c1e; }
      [data-theme="light"] .gear-inline, [data-theme="light"] .gear-abs, [data-theme="light"] .menu-btn, [data-theme="light"] .set-close { color: #6a6a72; }
      /* Flip panel + settings controls */
      [data-theme="light"] .flip-face, [data-theme="light"] .set-face { background: #ffffff; border-color: #e4e2dd; }
      /* G21 CRITICAL: panel backdrop was dark semi-transparent in light mode; use warm-white surface. */
      [data-theme="light"] .flip-backdrop { background: rgba(239,237,232,0.75); }
      /* G21 CRITICAL: toggle-row labels were near-white (rgb(244,244,245)) in light — white-on-white. */
      [data-theme="light"] .toggle-row span { color: #1c1c1e; }
      [data-theme="light"] .set-input, [data-theme="light"] .member-chip, [data-theme="light"] .rate-row .rate-in, [data-theme="light"] .data-btn { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .badge-soon { background: #e8f2ff; color: #1d4ed8; border-color: #bfdbfe; }
      [data-theme="light"] .switch { background: #d4d2cc; }
      [data-theme="light"] .switch::after { background: #ffffff; }
      /* GM (modal UX) light-mode + polish fixes — landable CSS, no wasm rebuild.
         GM2-1: modal/flip-panel title (.set-h h3) was near-white on the now-white
         face → invisible across ALL entity modals. Pin to dark foreground. */
      [data-theme="light"] .set-h h3 { color: #1c1c1e; }
      /* GM2-2 / GM4-9: footer Save/Cancel buttons were hardcoded dark-green/dark on a
         white face. Light: accent-filled Save with white label, neutral Cancel. */
      [data-theme="light"] .set-btn.save { background: var(--accent,#2e8b57); border-color: transparent; color: #ffffff; }
      [data-theme="light"] .set-btn.save:hover { filter: brightness(0.95); }
      [data-theme="light"] .set-btn.cancel { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .set-btn.cancel:hover { border-color: #cfcdc7; color: #000; }
      /* GM4-8: flip/settings panel header + footer separators were dark hex in light. */
      [data-theme="light"] .set-h { border-bottom-color: #e4e2dd; }
      [data-theme="light"] .set-foot { border-top-color: #e4e2dd; }
      /* GM2-6: the top-bar "+" Add button had no border/fill in light and read as
         invisible. Give it a subtle outline so the primary entry point is findable. */
      [data-theme="light"] .add-btn { border: 1px solid var(--border); border-radius: 6px; }
      /* GM2-10: CloseOnly footer button used .set-btn.save styling (green, primary-
         looking) on a dismiss action, misleading users. .set-btn.close styles it as
         a neutral dismiss action matching .set-btn.cancel. */
      .set-btn.close { background: transparent; border: 1px solid #34343a; color: #a6a6ac; font-weight: 500; }
      .set-btn.close:hover { color: #f4f4f5; border-color: #44444c; }
      [data-theme="light"] .set-btn.close { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .set-btn.close:hover { border-color: #cfcdc7; color: #000; }
      /* GM2-12: .set-body scrollbar was hardcoded dark. In light mode the dark-grey
         thumb on white looks jarring; switch to a warm-neutral thumb. */
      [data-theme="light"] .set-body { scrollbar-color: #c5c3be transparent; }
      [data-theme="light"] .set-body::-webkit-scrollbar-thumb { background: #c5c3be; border-color: #ffffff; }
      /* GM4-7: command-palette backdrop used a harsh dark scrim in light while the
         FlipPanel uses a warm tint. Match it (inline 0,0,0,.5 needs !important). */
      [data-theme="light"] #cf-cmd-palette { background: rgba(239,237,232,0.72) !important; }
      /* GM3-5/GM3-6/GM3-7: confirm-dialog scrim had no blur (inconsistent with FlipPanel),
         the box-shadow was not theme-aware, and the panel was cramped at 110px.
         Add blur + hairline ring + breathing room. */
      .cf-dialog-scrim { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
      .cf-dialog { box-shadow: 0 12px 40px rgba(0,0,0,.35), 0 0 0 1px var(--border,#2a2a2c);
                   padding: 1.5rem 1.5rem 1.25rem; min-height: 6rem; }
      /* GM1-S5: at 768 the flip panel sat 15px from the viewport edge. Give it a
         comfortable gutter without exceeding its design width. */
      .flip-wrap { max-width: min(760px, calc(100vw - 24px)); }
      /* Scrollbars */
      [data-theme="light"] main.cf-scroll::-webkit-scrollbar-thumb { background: #cfcdc7; border-color: #f7f6f3; }
      /* Card titles stay full-contrast in both themes (G4–G11): they inherit --text
         (dark in the light palette) already, but pin it explicitly so the recurring
         "titles invisible in light mode" audit finding can never recur from a muted
         wrapper or utility class. */
      .card-title { margin: 0 0 0.75rem; font-size: 1.05rem; color: var(--text); font-weight: 600; }
      /* G9.1 Reports hero zone — headline stat strip above the card scroll. */
      .reports-hero { margin-bottom: 1rem; padding: 1.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
      .hero-period { font-size: 0.825rem; font-weight: 500; color: var(--text-dim); margin: 0 0 0.6rem; }
      .hero-main { display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap; }
      .hero-net { font-size: 2.5rem; font-weight: 800; line-height: 1.1; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .hero-net.pos { color: var(--accent); }
      .hero-net.neg { color: var(--danger); }
      .hero-flankers { display: flex; gap: 1.25rem; align-items: baseline; flex-wrap: wrap; }
      .hero-flanker { display: flex; flex-direction: column; gap: 0.1rem; }
      .hero-flanker-label { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
      .hero-flanker-value { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .hero-flanker-value.pos { color: var(--accent); }
      .hero-flanker-value.neg { color: var(--danger); }
      .hero-secondary { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
      .hero-stat { display: flex; flex-direction: column; gap: 0.1rem; }
      .hero-stat-label { font-size: 0.73rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
      .hero-stat-value { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
      /* G9.1 Alert card strip — heads-up anomaly urgency. */
      .card-alert { border-left: 4px solid var(--danger); background: color-mix(in srgb, var(--danger) 6%, var(--card-bg)); }
      .muted { color: var(--text-dim); margin: 0.25rem 0; }
      .empty { color: var(--text-faint); font-style: italic; }
      /* Empty-state call-to-action block: centered message + "Add first…" button (§6.5). */
      .empty-cta { display:flex; flex-direction:column; align-items:center; gap:.85rem; padding:1.75rem 1rem; text-align:center; }
      .empty-cta .empty { margin:0; }
      /* Bills month calendar (B22): a 7-column grid of day cells with due-day dots. */
      .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:.5rem; }
      .cal-head { text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:2px 0; }
      .cal-cell { min-height:46px; border:1px solid var(--border); border-radius:6px; padding:4px 5px; position:relative; }
      .cal-cell.out { opacity:.35; }
      .cal-cell.today { border-color:var(--accent); }
      .cal-day { font-size:12px; color:var(--text-dim); }
      .cal-dot { position:absolute; bottom:6px; left:6px; width:7px; height:7px; border-radius:50%; background:var(--danger,#d8716f); }
      /* Bills two-column layout (G11 follow-up): at ≥1024 px the bill list sits on the
         left and the calendar floats to the right so both are visible without scrolling. */
      .bills-layout { display: flex; flex-direction: column; gap: 1rem; }
      @media (min-width: 1024px) {
        .bills-layout { flex-direction: row; align-items: flex-start; }
        .bills-layout > .card:first-child { flex: 1 1 auto; min-width: 0; }
        .bills-layout > .card:last-child { flex: 0 0 320px; }
      }
      /* bill-sub-actions: fixed trailing action group per bill row, mirrors .sub-actions
         from G10 so buttons don't crowd the name/amount (G11 follow-up). */
      .bill-sub-actions { flex: none; display: inline-flex; align-items: center; gap: 0.4rem; }
      @media (max-width: 760px) {
        .bill-sub-actions { flex-wrap: wrap; }
      }
      .badge {
        display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 999px;
      }
      .badge-soon { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }

      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
      .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
      .stat-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
      /* Keep stat figures on one line (G11): a "Next due" ISO date was hyphenating to
         "2026-07-" / "01" in the narrow single-column 768px stat card. */
      .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; white-space: nowrap; }
      .stat-value.pos { color: var(--accent); }
      .stat-value.neg { color: var(--danger); }
      .stat-sub { display: block; margin-top: 0.3rem; font-size: 0.82rem; }

      /* Net-worth-dominant summary (G3): a hero net-worth tile beside smaller
         assets/liabilities tiles. The hero spans both rows and reads larger so the
         north-star figure lands first. Collapses to a single column when narrow. */
      .nw-summary { display: grid; grid-template-columns: 1.6fr 1fr; grid-auto-rows: 1fr; gap: 0.75rem; margin-bottom: 1rem; }
      .nw-summary .stat-hero { grid-row: 1 / 3; display: flex; flex-direction: column; justify-content: center; }
      .nw-summary .stat-hero .stat-value { font-size: 2.1rem; }
      @media (max-width: 640px) {
        .nw-summary { grid-template-columns: 1fr; }
        .nw-summary .stat-hero { grid-row: auto; }
      }

      /* Stale-action buttons (G3 §4/§6): tie "Mark all updated" and the per-row
         "Update balance" to the amber STALE badge so they read as the resolving
         action, not muted chrome. */
      .btn-stale { border: 1px solid #c2870b; color: #d98c00; }
      .btn-stale:hover { background: rgba(245,158,11,0.12); }
      [data-theme="light"] .btn-stale { color: #b45309; border-color: #d39200; }

      /* Account-type glyph slot (G3 §5). */
      .acct-type-icon { display: inline-flex; align-items: center; flex: none; }

      /* Rows */
      .rows { display: flex; flex-direction: column; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.6rem 0; border-top: 1px solid var(--border); transition: background 0.12s ease; }
      /* Row hover affordance: a subtle highlight so the cursor's row is obvious and
         the list is easier to scan (§6.16). Inset slightly so it reads as a band. */
      .row:hover { background: var(--bg-elev); }
      .row:first-child { border-top: 0; }
      /* Narrow reflow (G3 §1): below ~760px a list row wraps so a long account name
         + STALE badge no longer collide with the action buttons — the name/meta take
         the full first line, the figure + actions wrap beneath, left-aligned. */
      @media (max-width: 760px) {
        .row { flex-wrap: wrap; row-gap: 0.4rem; }
        .row .row-main { flex: 1 1 100%; }
        .row .acct-type-icon { order: -1; }
      }
      /* Inline-edit rows: a full-width block (not the flex .row) so the nested
         .form-grid expands to multiple columns and editing looks like adding,
         instead of collapsing into a tall single column (C18). */
      .row-edit { padding: 0.6rem 0; border-top: 1px solid var(--border); }
      .row-edit:first-child { border-top: 0; }
      [data-density="compact"] .row-edit { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      .row-main { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; flex: 1; }
      /* Primary row label stays full-contrast in both themes (G4/G5/G6): it
         inherits body text, but pin it explicitly so a muted wrapper or a stale
         utility class can never wash a task/account/goal name out in light mode. */
      .row-desc { font-weight: 500; color: var(--text); }
      /* To-do portfolio summary line (G6). */
      .todo-summary { margin: 0 0 0.6rem; font-size: 0.86rem; font-variant-numeric: tabular-nums; }
      .row-meta { color: var(--text-dim); font-size: 0.82rem; }
      /* Transactions table (C47): a dense, sortable, column-aligned ledger. */
      .txn-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
      .txn-table thead th { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); color: var(--text-dim); font-weight: 600; white-space: nowrap; position: sticky; top: 0; background: var(--bg); z-index: 1; }
      /* GX4-F3: padding-block lifts .th-sort from 20px to ≥24px — meets WCAG 2.5.8 minimum tap target. */
      .txn-table .th-sort { background: transparent; border: 0; color: inherit; font: inherit; font-weight: 600; cursor: pointer; padding: 0.2rem 0; display: inline-flex; align-items: center; gap: 0.15rem; min-height: 24px; }
      .txn-table .th-sort:hover { color: var(--text); }
      .txn-table th[aria-sort="ascending"] .th-sort, .txn-table th[aria-sort="descending"] .th-sort { color: var(--accent); }
      .txn-table tr { display: table-row; }                 /* override the legacy .row flex */
      /* Denser rows for a scan-heavy ledger (G2 §2): tighter vertical padding lifts
         visible row count toward the 15–20 target. */
      .txn-table tbody td { padding: 0.28rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .txn-table tbody tr.selected { background: var(--accent-dim); }
      /* Zebra striping + themed hover (G2 §3): alternating tint + a clear hover band
         so the eye doesn't lose its place across the columns. */
      .txn-table tbody tr.row:nth-child(even) { background: rgba(255,255,255,0.03); }
      [data-theme="light"] .txn-table tbody tr.row:nth-child(even) { background: rgba(0,0,0,0.025); }
      /* GX3-D2: the DataTable stayed dark-on-dark in light (runtime vars resolved to the
         dark palette in the table context, outranking var(--bg)/(--text)). Pin light
         surfaces + text with !important, matching the GX1 shell pattern. */
      [data-theme="light"] .txn-table thead th { background: #f7f6f3 !important; color: #3c3c43 !important; }
      [data-theme="light"] .txn-table tbody td, [data-theme="light"] .txn-table tbody tr.row { color: #1c1c1e !important; }
      [data-theme="light"] .txn-table tbody tr.row:hover { background: #efede8 !important; }
      .txn-table tbody tr.row:hover { background: var(--bg-elev); }
      .txn-table .td-date { white-space: nowrap; color: var(--text-dim); }
      .txn-table .td-cat, .txn-table .td-acct, .txn-table .td-tags { color: var(--text-dim); }
      .txn-table .td-amount { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
      /* Description is the primary scan field (G2 §1/§2): give it room but lock to a
         single line so a long memo can't inflate row height. */
      .txn-table td.row-desc { max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .txn-table .td-tags-inline { color: var(--text-faint); font-size: 0.8rem; }
      /* Actions collapse to an icon strip (G2 §1): compact square buttons, labels
         live in title/aria — no more 560px text-button sprawl. */
      .txn-table .td-actions .btn-icon { padding: 0.2rem 0.35rem; min-height: 0; }
      .txn-table .td-actions { white-space: nowrap; text-align: right; }
      /* Cleared toggle (G2 §5): a ✓/○ status glyph, green when cleared. */
      .txn-table .clr-toggle { background: transparent; border: 0; cursor: pointer; font-size: 1.05rem; line-height: 1; color: var(--text-faint); width: 1.6rem; }
      .txn-table .clr-toggle.is-cleared { color: var(--accent); font-weight: 700; }
      .txn-table tbody tr.row.cleared .td-date, .txn-table tbody tr.row.cleared .row-desc { color: var(--text-dim); }
      .txn-table .td-select .check { background: transparent; border: 0; cursor: pointer; font-size: 1rem; line-height: 1; }
      .txn-table .row-edit td { padding: 0.5rem 0.3rem; }
      .txn-table thead th.td-amount, .txn-table thead th.td-actions { text-align: right; }
      /* Reusable DataTable pagination footer. */
      .data-pager { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; padding: 0.6rem 0.2rem 0.1rem; font-size: 0.86rem; }
      .data-pager .data-pos { font-variant-numeric: tabular-nums; }
      .data-pager .data-pager-label { margin-left: auto; }
      .data-pager .field { width: auto; min-width: 4.5rem; }
      .data-pager .btn[disabled] { opacity: 0.45; cursor: default; }
      /* Narrow screens (C10/C19): stack each row as a card. */
      @media (max-width: 760px) {
        .txn-table, .txn-table tbody, .txn-table tr, .txn-table td { display: block; width: 100%; }
        .txn-table thead { display: none; }
        .txn-table tbody tr.row { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.5rem; padding: 0.3rem 0.5rem; }
        .txn-table tbody td { border: 0; padding: 0.15rem 0.2rem; }
        .txn-table .td-amount { text-align: left; }
        .txn-table td.row-desc { max-width: none; white-space: normal; }
      }
      .amount { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
      .amount-income { color: var(--accent); }
      .amount-expense { color: var(--danger); }

      /* Transactions filter toolbar (C47): compact search + Filters popover + chips. */
      .filter-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
      .filter-search { flex: 1 1 220px; min-width: 160px; }
      .filters-trigger { display: inline-flex; align-items: center; gap: 0.4rem; }
      .filter-badge { display: inline-flex; align-items: center; justify-content: center;
        min-width: 1.25rem; height: 1.25rem; padding: 0 0.35rem; border-radius: 999px;
        background: var(--accent); color: #fff; font-size: 0.72rem; font-weight: 700;
        font-variant-numeric: tabular-nums; }
      .filter-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; }
      .filter-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.3rem 0.2rem 0.6rem;
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; font-size: 0.82rem; }
      .filter-chip .chip-text { line-height: 1.2; }
      .chip-x { display: inline-flex; align-items: center; justify-content: center; width: 1.1rem; height: 1.1rem;
        padding: 0; border: none; border-radius: 999px; background: transparent; color: var(--muted);
        font-size: 0.8rem; line-height: 1; cursor: pointer; }
      .chip-x:hover { background: var(--danger); color: #fff; }
      .chip-clear-all { background: none; border: none; color: var(--accent); font: inherit; cursor: pointer; padding: 0.2rem 0.3rem; }
      .chip-clear-all:hover { text-decoration: underline; }
      /* Filters popover body: stacked labelled fields. */
      .filter-fields { display: flex; flex-direction: column; gap: 0.7rem; }
      .filter-fields .field-label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; color: var(--muted); }
      .filter-fields .field-label .field { color: var(--text); }

      /* Forms */
      .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.6rem; align-items: end; }
      .field { width: 100%; padding: 0.5rem 0.6rem; min-height: 44px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font: inherit; }
      /* GX4-F1: removed outline:none — was silencing the keyboard focus ring for both mouse and
         keyboard focus. Border-color tint on :focus is a subtle mouse hint; the explicit ring
         on :focus-visible is the keyboard indicator and must not be overridden. */
      .field:focus { border-color: var(--accent); }
      /* GX4-F1 (select): bare <select> elements also need field-style tokens and a visible
         keyboard ring. No .set-input / .seg-btn so native caret is preserved. */
      select:not(.set-input):not(.seg-btn) { min-height: 44px; padding: 0.5rem 0.6rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font: inherit; cursor: pointer; }
      select:not(.set-input):not(.seg-btn):focus { border-color: var(--accent); }
      select:not(.set-input):not(.seg-btn):focus-visible,
      .field:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      /* Native color picker rendered as a proper swatch (a bare-width text field
         clipped it to a thin line). */
      .color-input { width: 44px; height: 44px; padding: 3px; background: var(--bg-elev);
        border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
      .color-input::-webkit-color-swatch-wrapper { padding: 0; }
      .color-input::-webkit-color-swatch { border: none; border-radius: 5px; }
      /* Small color dot shown beside a category name. */
      .cat-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
        display: inline-block; align-self: center; }
      /* GI2 — Category page affordances. */
      /* btn-link: inline text that acts as a link/button (usage count drill). */
      .btn-link { background: none; border: none; padding: 0; font: inherit;
        color: var(--accent); text-decoration: underline; cursor: pointer; }
      .btn-link:hover { opacity: 0.8; }
      /* cat-child-row: subtle fill on indented sub-category rows so nesting is
         visible, especially at 768px where the left border alone is missed. */
      .cat-child-row { background: rgba(255,255,255,0.02); }
      [data-theme="light"] .cat-child-row { background: rgba(0,0,0,0.02); }
      /* cat-zero-usage: dim rows with no transactions so safe-to-delete categories
         are spottable at a glance without hiding them entirely. */
      .cat-zero-usage { opacity: 0.55; }
      /* GX3-F3/F10: unified button-scale tokens so page buttons, modal buttons, and inputs
         all hit the 44px touch-target floor and share the same height. Previously .btn
         measured 35.8px (below WCAG 2.5.8) while inputs and modal buttons were 40–44px.
         --btn-py/--btn-px are consumed by both .btn and .set-btn so height stays in sync. */
      :root { --btn-py: 0.5rem; --btn-px: 0.8rem; }
      .btn { padding: var(--btn-py) var(--btn-px); min-height: 44px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); font: inherit; font-weight: 500; cursor: pointer; transition: filter 0.12s; display: inline-flex; align-items: center; justify-content: center; }
      .btn:hover { filter: brightness(1.12); }
      .btn:disabled, .btn[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; filter: none; }
      .btn-primary { background: var(--accent); color: #052e13; border-color: var(--accent); font-weight: 600; }
      /* In light mode the dark-green primary text on the mid-green accent measured
         ~2.1:1 (G19 "Run now") — fails AA. White on the same accent clears the
         large/bold-text 3:1 bar and reads cleanly across the app's primary buttons. */
      [data-theme="light"] .btn-primary { color: #ffffff; }
      .btn-del { background: transparent; border: 0; color: var(--text-faint); cursor: pointer; font-size: 1rem; padding: 0.25rem 0.4rem; }
      .btn-del:hover { color: var(--danger); }
      /* WCAG 2.5.8 (AA): small icon-only buttons get at least a 24x24 hit area,
         with the glyph centered, so they're comfortably tappable. */
      .btn-del, .toast-x, .rstep, .set-close {
        min-width: 24px; min-height: 24px; display: inline-grid; place-items: center;
      }
      .btn-del { min-width: 32px; min-height: 32px; }
      /* Tactile press feedback: interactive controls dip slightly on press so a
         click feels responsive (§6.16). Gated behind reduced-motion. */
      @media (prefers-reduced-motion: no-preference) {
        .btn:active, .btn-primary:active, .nav-link:active, .data-btn:active,
        .seg-btn:active, .menu-btn:active, .check:active, .btn-del:active,
        .member-add:active, .member-chip:active, .set-btn:active, .rstep:active,
        .toast-x:active, .nav:active, .nv:active {
          transform: translateY(1px);
        }
      }
      .err { color: #fca5a5; margin: 0.6rem 0 0; font-size: 0.88rem; }

      /* Visually hidden but available to screen readers (e.g. an idle live region). */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }

      /* App-wide toast notice (bottom-center) */
      .toast {
        position: fixed; left: 50%; bottom: 1.25rem; transform: translateX(-50%);
        z-index: 60; max-width: min(92vw, 32rem); display: flex; align-items: center;
        gap: 0.75rem; padding: 0.7rem 0.9rem; border-radius: 10px;
        background: var(--bg-elev); color: var(--text);
        border: 1px solid var(--border); box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        font-size: 0.9rem; animation: toast-in 160ms ease-out;
      }
      .toast-err { border-color: var(--danger); }
      .toast-err .toast-msg { color: var(--danger); }
      /* GX5-F2: toast used --bg-elev which on the warm-white light page is ~2.1:1 and
         nearly vanishes. Pin a white surface + clear border + lighter shadow in light. */
      [data-theme="light"] .toast { background: #ffffff; border-color: #d1cfc9; box-shadow: 0 6px 20px rgba(0,0,0,0.16); }
      /* GX5-F1: success and error toasts looked identical — add a severity glyph. */
      .toast::before { content: "\2713"; color: var(--accent); font-weight: 700; font-size: 1rem; line-height: 1; }
      .toast-err::before { content: "\26A0"; color: var(--danger); }
      /* GX5-F3: /notifications card had transparent background (rgba(0,0,0,0)) in light

      [data-theme="light"] section.card { background: #ffffff !important; border: 1px solid #e4e2dd !important; }
      .toast-msg { flex: 1; }
      .toast-x {

      /* Budgets */
      .budget { padding: 0.7rem 0; border-top: 1px solid var(--border); }
      .budget:first-child { border-top: 0; }
      .budget-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; }
      .budget-amount { font-variant-numeric: tabular-nums; color: var(--fg, var(--text)); white-space: nowrap; }
      .budget-sub { display: block; color: var(--text-dim); font-size: 0.82rem; margin-top: 0.15rem; }
      .cover-form { margin-top: 0.6rem; padding: 0.6rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-elev, rgba(255,255,255,0.02)); }
      .cover-form .form-grid { margin-top: 0.4rem; }
      /* Bar track (G4 §6): a touch more contrast than --bg-elev so a 0%/empty bar
         still reads as a track rather than vanishing into the card. */
      .bar { height: 8px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; margin: 0.45rem 0 0.35rem; }
      .bar-fill { height: 100%; background: var(--accent); border-radius: 999px; }

      @media (prefers-reduced-motion: no-preference) {

      }

      .bar-fill.over { background: var(--danger); }
      /* Goal pace states (G5): the progress-bar fill tone differentiates a goal's
         standing at a glance instead of one flat accent. done/final = success
         tones, overdue = danger, soon = amber. on-track/undated keep the accent. */
      .bar-fill.done { background: var(--up, #54b884); }
      .bar-fill.final { background: linear-gradient(90deg, var(--accent), var(--up, #54b884)); }
      .bar-fill.overdue { background: var(--danger); }
      .bar-fill.soon { background: #f59e0b; }

      /* Budget health pills (G4 §4): the over/near summary chips were unstyled

         so "2 over budget" / "2 near limit" read as distinct status badges. The
         color comes from the tw text-tone class already on the span. */
      .pill { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.74rem; font-weight: 700;
        letter-spacing: 0.02em; padding: 0.12rem 0.5rem; border-radius: 999px;
        background: var(--bg-elev); border: 1px solid var(--border); white-space: nowrap; }

      /* Insights starter chips (G13): a softer, more inviting pill — distinct from
         the hard-edged form .btn so they read as "tap to explore", not data entry. */
      .chip-suggest { border-radius: 999px; background: var(--bg-elev); border: 1px solid var(--border);
        color: var(--text-dim); font-size: 0.84rem; padding: 0.3rem 0.7rem; font-weight: 500; }
      .chip-suggest:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dim); }
      /* Chat switcher pills stay outlined in both themes (G13). */
      .chat-pill { border-color: var(--border) !important; }

      /* Subscriptions row (G10): the name was being squeezed to zero because
         .row-main can shrink (min-width:0) and the two action buttons claimed the
         row. Reserve name width and pin the actions to a fixed trailing group so the
         subscription name always reads — it's what Marcus is auditing. */
      .sub-row .row-main { min-width: 9rem; flex: 1 1 auto; }
      .sub-actions { flex: none; display: inline-flex; align-items: center; gap: 0.4rem; }
      .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.82rem; min-height: 0; }
      /* Ghost-danger: a low-weight destructive action so a per-row "Cancel" doesn't

      .btn-ghost-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
      @media (max-width: 760px) {

      /* Allocate rank badge (G8): a compact "#1/#2" ordinal so the priority order

      .rank-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 1.5rem;
        height: 1.5rem; padding: 0 0.35rem; border-radius: 999px; background: var(--accent-dim);
        color: var(--accent); font-size: 0.75rem; font-weight: 700; font-variant-numeric: tabular-nums; flex: none; }
      /* "Advanced" disclosure toggle (G8): subordinate, left-aligned, not a primary button. */
      .disclosure-toggle { background: transparent; border: 0; color: var(--accent); font: inherit;
        padding: 0.35rem 0; cursor: pointer; text-align: left; }
      .disclosure-toggle:hover { text-decoration: underline; }
      /* Buttons that should size to their content, not stretch a form-grid cell (G8). */
      .btn.fit { width: fit-content; }

      /* Card header row (G5): a card title with a right-aligned action (e.g.
         "+ Add goal") so adding is discoverable without hunting for the FAB. */
      .card-head { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.75rem; }
      .card-head .card-title { margin: 0; }

      /* Goal pace badge (G5): a compact colored chip per row answering "am I on
         pace?". Tones mirror the bar states; readable in both themes. */
      .pace-badge { display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em;
        padding: 0.1rem 0.45rem; border-radius: 999px; white-space: nowrap; line-height: 1.5;
        border: 1px solid var(--border); /* GX3-D7: was borderless; every other pill has a 1px ring */ }
      .pace-final { background: var(--accent-dim); color: var(--accent); }
      .pace-overdue { background: rgba(216,113,111,0.18); color: var(--danger); }
      .pace-soon { background: rgba(245,158,11,0.18); color: #d98c00; }
      [data-theme="light"] .pace-soon { color: #b45309; }
      .pace-ontrack { background: var(--bg-elev); color: var(--text-dim); }

      /* Goal/budget rows: at narrow widths the head wraps so a long goal name no
         longer collides with the amount; the bar + sub-line stack below (G5 §768). */
      @media (max-width: 760px) {
        .budget-head { flex-wrap: wrap; align-items: baseline; }
        .budget-head .row-desc { flex: 1 1 100%; }
        .budget-head .budget-amount { flex: 0 0 auto; }
      }

      /* Stat figures must stay full-contrast in both themes (G4/G5): the plain
         (non-pos/neg) value inherits body text, which the light palette keeps dark,
         but pin it explicitly so a muted wrapper can never wash it out. */
      .stat-value { color: var(--text); }
      .budget .row-desc { color: var(--text); }

      /* Semantic tone classes (C91): up = positive, down = negative, warn = caution.
         Named so they style every usage path — both literal class strings and the
         markers tw.ColorClass emits — now that the Tailwind CDN that used to generate
         text-up/bg-down/etc. is gone. Exact palette hex (kept in sync with internal/ui/tw). */

      .text-dim { color: #ababb3; } .text-faint { color: #7d7d85; } .text-fg { color: #f4f4f5; }
      .bg-up { background-color: #54b884; } .bg-down { background-color: #d8716f; }
      .bg-warn { background-color: #cfa14e; } .bg-dim { background-color: #ababb3; }
      .bg-fg { background-color: #f4f4f5; } .bg-line { background-color: #232325; }

      /* Artifacts (G20) --------------------------------------------------- */
      /* Inline quota-nudge notice inside a card (not a toast). */
      .notice { padding: 0.45rem 0.7rem; border-radius: 6px; font-size: 0.85rem;
        border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-dim); }
      .notice-warn { border-color: #d39200; background: rgba(211,146,0,0.08); color: #cfa14e; }
      [data-theme="light"] .notice-warn { color: #92620a; background: #fff8e1; border-color: #d39200; }
      /* Storage progress bar (quota meter below the upload buttons). */
      .storage-bar { height: 6px; background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 999px; overflow: hidden; }
      .storage-bar-fill { height: 100%; background: var(--accent); border-radius: 999px;
        transition: width 0.35s ease; }
      .storage-bar-fill.storage-bar-warn { background: #f59e0b; }
      /* CSV inline preview table shown inside an artifact row. */
      .csv-preview { border-collapse: collapse; font-size: 0.78rem; width: 100%; }
      .csv-preview th, .csv-preview td { padding: 0.15rem 0.5rem; border: 1px solid var(--border);
        text-align: left; white-space: nowrap; }
      .csv-preview thead { background: var(--bg-elev); color: var(--text-dim); }
      /* Positive reference badge on artifact rows ("Referenced by N transaction(s)"). */
      .ref-positive { color: var(--accent); }
      [data-theme="light"] .ref-positive { color: #1a7a47; }

      /* To-do */
      .field-wide { grid-column: 1 / -1; }
      .check { background: transparent; border: 1px solid transparent; color: var(--text-dim); cursor: pointer; font-size: 1.15rem; line-height: 1; min-width: 24px; min-height: 24px; display: inline-grid; place-items: center; margin-right: 0.4rem; box-sizing: border-box; }
      .check:hover { color: var(--accent); }
      .row.selected .check { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
      .row.done .row-desc { text-decoration: line-through; color: var(--text-faint); }
      .task-meta { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.15rem; }
      .badge-prio { font-size: 0.75rem; }
      .prio-high { background: #3b0d0d; color: #fca5a5; border: 1px solid #7f1d1d; }
      .prio-med { background: #2a230c; color: #fcd34d; border: 1px solid #854d0e; }

    <!-- ============================================================
         Candidate-C design system — ported verbatim from
         design/candidate-c.html. Drives the bento dashboard shell.

    <style id="design-system">
      body.cf { -webkit-font-smoothing: antialiased; }
      .fig { font-variant-numeric: tabular-nums lining-nums; }
      /* Type scale (C48): a small semantic set so dashboard sizing is consistent
         instead of ad-hoc text-[Npx]. Sizes are rem, so the whole scale tracks the
         display-scale zoom on #app coherently. caption/body cover label and body
         text; figure/figure-lg are the single primary and hero data-figure sizes
         (line-height is left to any explicit leading-* utility on the element). */
      .t-caption   { font-size: 0.75rem; }    /* labels, captions, legends, sublines */
      .t-body      { font-size: 0.8125rem; }  /* default tile body text */
      .t-figure    { font-size: 1.5rem; }     /* primary KPI / data figure */
      .t-figure-lg { font-size: 2.125rem; }   /* hero figure */
      .nav:hover { background:#161617; color:#f4f4f5; }

      /* Shape-aware dashboard content: widgets can adapt their internals to the
         user-resized bento cell, starting with the net-worth trend chart. */
      .trend-body { display:flex; flex-direction:column; min-height:0; height:100%; gap:.45rem; overflow:hidden; }
      .trend-head { flex:0 0 auto; }
      .trend-figure { flex:0 0 auto; line-height:1.05; }
      .trend-standard { margin-top:.18rem; }
      .trend-expanded { display:none; flex:0 0 auto; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.45rem; }
      .trend-stat { min-width:0; border:1px solid rgba(244,244,245,.08); background:rgba(244,244,245,.025); padding:.38rem .45rem; }
      .trend-stat span { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .trend-chart { flex:1 1 auto; min-height:0; }
      .w[data-widget="trend"][data-row-span="1"] .trend-body { gap:.25rem; justify-content:flex-end; }
      .w[data-widget="trend"][data-row-span="1"] .trend-head { display:flex; align-items:baseline; justify-content:space-between; gap:.5rem; }
      .w[data-widget="trend"][data-row-span="1"] .trend-figure { font-size:1.02rem; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-head { display:block; }

      .w[data-widget="trend"][data-row-span="1"] .trend-chart .domain { display:none; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-chart { flex-basis:58px; min-height:58px; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="1"] .trend-chart svg { overflow:visible; }
      .w[data-widget="trend"][data-row-span="2"] .trend-chart { flex-basis:0; min-height:118px; }
      .w[data-widget="trend"][data-row-span="3"] .trend-chart { flex-basis:0; min-height:220px; margin-top:auto; }
      .w[data-widget="trend"][data-col-span="2"] .trend-body,
      .w[data-widget="trend"][data-col-span="3"] .trend-body,
      .w[data-widget="trend"][data-col-span="4"] .trend-body { gap:.65rem; }
      .w[data-widget="trend"][data-col-span="2"] .trend-figure,
      .w[data-widget="trend"][data-col-span="3"] .trend-figure,
      .w[data-widget="trend"][data-col-span="4"] .trend-figure { font-size:1.8rem; }
      .w[data-widget="trend"][data-col-span="1"][data-row-span="3"] .trend-figure { font-size:1.55rem; }
      .w[data-widget="trend"][data-col-span="2"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="2"][data-row-span="3"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="3"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="4"][data-row-span="2"] .trend-expanded,
      .w[data-widget="trend"][data-col-span="4"][data-row-span="3"] .trend-expanded { display:grid; }
      .w[data-widget="trend"][data-col-span="2"][data-row-span="3"] .trend-body,
      .w[data-widget="trend"][data-col-span="3"][data-row-span="3"] .trend-body,

        display:grid; grid-template-rows:auto auto minmax(0,1fr); align-content:stretch;
      }

      /* Bento grid — square outlined cells with a small gap.
         One base cell unit; every row is exactly one unit so widgets integer-scale. */
      .bento { display:grid; --cell:152px; grid-template-columns: repeat(4, minmax(0,1fr)); grid-template-rows: repeat(8, var(--cell)); grid-auto-rows: var(--cell); gap:10px; overflow-anchor:none; }
      .w { position:relative; background:#121214; border:1px solid #34343a; overflow:hidden; display:flex; flex-direction:column; transition: border-color .15s ease; will-change: transform; }
      .w:hover { border-color:#44444c; }
      .w.drag { opacity:.35; pointer-events:none; cursor:grabbing; }
      [data-bento-dragging] .bento { cursor:grabbing; }
      [data-bento-dragging] .bento .w:not(.drag) { transition: border-color .15s ease, box-shadow .15s ease; }

      /* reconfigure controls */
      .ghandle { position:absolute; top:7px; right:40px; z-index:3; color:#5a5a64; cursor:grab; font-size:.95rem; line-height:1; }
      .ghandle:active { cursor:grabbing; }

      /* Brighten the gear when the tile is hovered/focused so per-tile settings
         are discoverable (C21); the gear only renders on configurable tiles. */
      .w:hover .gear-inline, .w:focus-within .gear-inline { color:#9a9aa2; }
      .gear-inline:hover { color:#f4f4f5; }
      .gear-abs { position:absolute; top:7px; right:16px; z-index:3; color:#5a5a64; background:transparent; border:0; cursor:pointer; font-size:.95rem; line-height:1; }
      .gear-abs:hover { color:#f4f4f5; }

      /* time resolution + range controls */
      .seg { display:inline-flex; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:2px; }
      .seg-btn { padding:.32rem .72rem; border-radius:3px; font-size:.85rem; color:#a6a6ac; background:transparent; border:0; cursor:pointer; }
      .seg-btn:hover { color:#f4f4f5; }
      .seg-btn.active { background:#2a2a30; color:#f4f4f5; }
      .rcap { font-size:.66rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; }
      .rpill { display:inline-flex; align-items:center; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; padding:.2rem .25rem; }
      .rstep { background:transparent; border:0; color:#a6a6ac; cursor:pointer; padding:0 .3rem; font-size:1rem; line-height:1; }
      .rstep:hover { color:#f4f4f5; }
      .rlabel { min-width:128px; text-align:center; font-size:.8rem; }

      /* resize handles stay quiet until a tile is hovered or focused. */
      .rz { position:absolute; z-index:6; opacity:0; pointer-events:none; border:0; padding:0; background:transparent; color:#d4d4d8; transition:opacity .12s ease, background .12s ease, color .12s ease; }
      .w:hover .rz, .w:focus-within .rz, .w:focus-visible .rz { opacity:.9; pointer-events:auto; }
      .rz[data-dir="l"], .rz[data-dir="r"] { top:24px; bottom:8px; width:16px; cursor:ew-resize; }
      .rz[data-dir="l"] { left:0; }
      .rz[data-dir="r"] { right:0; }
      .rz[data-dir="t"], .rz[data-dir="b"] { left:34px; right:34px; height:16px; cursor:ns-resize; }
      .rz[data-dir="t"] { top:0; }
      .rz[data-dir="b"] { bottom:0; }
      .rz::before { content:""; position:absolute; border-radius:999px; background:rgba(212,212,216,.62); box-shadow:0 0 0 1px rgba(244,244,245,.12), 0 6px 18px rgba(0,0,0,.28); }
      .rz[data-dir="l"]::before, .rz[data-dir="r"]::before { top:50%; width:3px; height:min(44px,42%); transform:translateY(-50%); }
      .rz[data-dir="l"]::before { left:4px; }
      .rz[data-dir="r"]::before { right:4px; }
      .rz[data-dir="t"]::before, .rz[data-dir="b"]::before { left:50%; width:min(48px,42%); height:3px; transform:translateX(-50%); }
      .rz[data-dir="t"]::before { top:4px; }

      .rz[data-dir="l"]::after { left:3px; border-right:5px solid currentColor; }
      .rz[data-dir="r"]::after { right:3px; border-left:5px solid currentColor; }
      .rz[data-dir="t"]::after, .rz[data-dir="b"]::after { content:""; position:absolute; left:50%; width:0; height:0; transform:translateX(-50%); border-left:4px solid transparent; border-right:4px solid transparent; }
      .rz[data-dir="t"]::after { top:3px; border-bottom:5px solid currentColor; }
      .rz[data-dir="b"]::after { bottom:3px; border-top:5px solid currentColor; }
      /* GX4-F6: removed outline:none from :focus-visible — never suppress the keyboard ring.

      .rz:hover, .rz:focus-visible { opacity:1; color:#fff; background:rgba(244,244,245,.045); }

      /* dark, modern scrollbar for the scroll pane */

      main.cf-scroll::-webkit-scrollbar { width: 11px; }

      main.cf-scroll::-webkit-scrollbar-thumb:hover { background: #44444c; }
      main.cf-scroll::-webkit-scrollbar-thumb:active { background: #55555e; }

      .flip-backdrop { position:fixed; inset:0; background:rgba(4,4,6,.6); backdrop-filter:blur(3px); display:grid; place-items:center; opacity:0; transition:opacity .28s; z-index:50; }

      .flip-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.2,.75,.2,1); transform:rotateY(0) scale(.86); }
