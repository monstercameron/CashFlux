<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App base href, set before any relative asset is referenced, so a deep-link
         refresh (e.g. /p/taxes) resolves ./wasm_exec.js, ./bin/main.wasm, etc. to
         the app root instead of the current route's directory. On a *.github.io
         project site the app lives under /<repo>/, so derive the base from the
         first path segment there; everywhere else (local dev, custom domain) it's
         the server root. Must run first in <head>. -->
    <script>
      (function () {
        var base = "/";
        if (location.hostname.endsWith("github.io")) {
          var seg = location.pathname.split("/")[1];
          if (seg) base = "/" + seg + "/";
        }
        document.write('<base href="' + base + '">');
      })();
    </script>

    <title>CashFlux</title>

    <!-- PWA: installable, standalone, dark theme -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Design system (candidate C): Inter for UI, Fraunces for display headings + figures -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN removed (C91): all utility classes are now emitted by the typed
         Go `tw`/css vocabulary at runtime into <style id="gwc-css">. No external CSS
         dependency, works offline. The former tailwind.config palette/type tokens live
         in internal/ui/tw (exact hex) + the :root CSS variables below. -->

    <style>
      :root {
        /* Retargeted to the candidate-C palette so the legacy screen components
           (cards, stats, rows, forms) match the new bento shell. */
        --bg: #0e0e0f;
        --bg-elev: #1a1a1d;
        --bg-card: #121214;
        --border: #2a2a2c;
        --text: #f4f4f5;
        --text-dim: #ababb3;
        --text-faint: #888890;
        --accent: #2e8b57;
        --accent-dim: #1f2c24;
        --brand: #7c83ff;
        --danger: #d8716f;
        --radius: 0px;
        /* Default type tokens (B20). The theme engine overrides these on :root;
           consumers keep a static fallback chain after var() so text still
           renders if a chosen font fails to load. */
        --font-ui: Inter;
        --font-display: 'Fraunces';
        /* Optional dashboard banner (B20). --banner-bg is the background image /
           gradient; the band is shown only when data-banner="on". */
        --banner-bg: none;
        /* Icon line weight (B13). The theme engine overrides this; the inline
           default keeps icons crisp before the engine applies. */
        --icon-stroke: 1.6;
      }

      /* Dashboard banner band (B20): a decorative full-width header strip above
         the bento grid. Collapsed (not rendered) unless a banner is chosen. */
      .app-banner { display: none; }
      :root[data-banner="on"] .app-banner {
        display: block; height: 132px; margin-bottom: 1rem;
        background-image: var(--banner-bg, none); background-size: cover; background-position: center;
        border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: inset 0 -44px 64px -34px rgba(0,0,0,0.55);
      }
      * { box-sizing: border-box; }
      /* Minimal Tailwind-preflight equivalent (C91): the Tailwind CDN used to ship
         a base reset; with the CDN gone we restore the rules the app relies on so
         layout/typography stay identical. Most important: block-level replaced
         elements (an inline <svg> otherwise leaves a baseline gap that overflows
         tight tiles like the net-worth trend chart). */
      *, ::before, ::after { border-width: 0; border-style: solid; border-color: currentColor; }
      img, svg, video, canvas, audio, iframe, embed, object { display: block; vertical-align: middle; }
      img, video { max-width: 100%; height: auto; }
      button, input, optgroup, select, textarea { font-family: inherit; font-feature-settings: inherit; font-size: 100%; font-weight: inherit; line-height: inherit; color: inherit; margin: 0; padding: 0; }
      button, select { text-transform: none; }
      button, [type='button'], [type='reset'], [type='submit'] { -webkit-appearance: button; background-color: transparent; background-image: none; cursor: pointer; }
      :-moz-focusring { outline: auto; }
      h1, h2, h3, h4, h5, h6 { font-size: inherit; font-weight: inherit; }
      a { color: inherit; text-decoration: inherit; }
      ol, ul, menu { list-style: none; margin: 0; padding: 0; }
      p, h1, h2, h3, h4, h5, h6, blockquote, figure, pre, fieldset, hr { margin: 0; }
      table { border-collapse: collapse; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: var(--font-ui), Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        /* Default density rebalanced down (C25): the out-of-the-box 16px/1.5 read
           too heavy for a dense finance app. The Fraunces display figures keep
           their explicit sizes, so the data accents stay prominent. The Compact
           toggle and Display scale remain as further levers on top of this. */
        font-size: 14.5px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      /* Boot loader: an on-brand animated mark while the wasm downloads and
         instantiates. Fades + lifts away once the app mounts. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: var(--bg); z-index: 10;
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      #boot.hidden { opacity: 0; transform: scale(1.03); pointer-events: none; }
      .boot-card { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
      .boot-mark { position: relative; width: 64px; height: 64px; display: grid; place-items: center; }
      .boot-ring { position: absolute; inset: 0; width: 64px; height: 64px; animation: boot-spin 1.15s linear infinite; }
      .boot-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
      .boot-ring-arc {
        fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
        stroke-dasharray: 70 126; stroke-dashoffset: 0;
      }
      .boot-c {
        font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 1.6rem;
        color: var(--text); line-height: 1; animation: boot-breathe 1.8s ease-in-out infinite;
      }
      .boot-word {
        font-family: "Fraunces", Georgia, serif; font-size: 1.15rem; font-weight: 600;
        letter-spacing: 0.01em; color: var(--text); opacity: 0; animation: boot-fade-up 0.6s ease 0.1s forwards;
      }
      .boot-sub {
        font-size: 0.82rem; color: var(--text-faint); opacity: 0;
        animation: boot-fade-up 0.6s ease 0.25s forwards;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-breathe { 0%,100% { opacity: 0.55; transform: scale(0.97); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes boot-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      /* Display scale: zoom the whole app by the user's preference (default 1). */
      #app { zoom: var(--ui-scale, 1); }
      /* Skip-to-content link: off-screen until keyboard-focused. */
      .skip-link { position: absolute; left: 8px; top: -48px; z-index: 200; background: var(--bg-elev);
        color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.8rem;
        font-size: 13px; text-decoration: none; transition: top .12s ease; }
      .skip-link:focus { top: 8px; }
      @media (prefers-reduced-motion: reduce) { .skip-link { transition: none; } }
      /* Visible focus ring for keyboard users on every interactive element (both themes). */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
      [role="switch"]:focus-visible, [role="radio"]:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
      }
      /* App settle-in: a calm fade + slight lift/scale once mounted. */
      #app.app-enter { animation: app-settle 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes app-settle {
        from { opacity: 0; transform: translateY(10px) scale(0.992); }
        to   { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot, #boot.hidden { transition: opacity 0.2s ease; transform: none; }
        .boot-ring, .boot-c, .boot-word, .boot-sub, #app.app-enter { animation: none; opacity: 1; }
        /* No motion: the dialog appears in place (no flip/lift), the toast doesn't
           slide in, and the rail resizes instantly. */
        .flip-inner, .flip-backdrop { transition: none; }
        .toast { animation: none; }
        aside.rail { transition: none; }
      }
      #boot-error {
        display: none; position: fixed; inset: auto 1rem 1rem 1rem; z-index: 20;
        background: #3b0d0d; color: #fecaca; border: 1px solid #7f1d1d;
        padding: 0.75rem 1rem; border-radius: 8px; font-family: ui-monospace, monospace;
        font-size: 0.8rem; white-space: pre-wrap;
      }

      /* App shell */
      .app { min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 5;
        display: flex; align-items: center; gap: 1.25rem;
        padding: 0.75rem 1.25rem; background: rgba(11,16,32,0.85);
        backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
        /* Wrap controls onto a second row when they don't fit, rather than
           turning a fixed-height header into a scroll container (C34). */
        flex-wrap: wrap; row-gap: 0.4rem; min-height: 3.5rem;
      }
      .topbar-controls { flex-wrap: wrap; row-gap: 0.4rem; }
      .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; white-space: nowrap; }
      .brand-mark {
        display: grid; place-items: center; width: 1.6rem; height: 1.6rem;
        background: var(--accent); color: #052e13; border-radius: 8px; font-weight: 900;
      }
      .brand-name { font-size: 1.05rem; letter-spacing: -0.01em; }
      .nav { display: flex; gap: 0.25rem; flex-wrap: nowrap; }
      .nav-link {
        appearance: none; border: 0; background: transparent; color: var(--text-dim);
        font: inherit; font-size: 0.9rem; padding: 0.4rem 0.7rem; border-radius: 8px;
        cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s;
      }
      .nav-link:hover { background: var(--bg-elev); color: var(--text); }
      .nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

      /* Page */
      .page { width: 100%; max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
      .page-head { margin-bottom: 1.5rem; }
      .page-title { margin: 0; font-size: 1.6rem; letter-spacing: -0.02em; }
      .page-sub { margin: 0.25rem 0 0; color: var(--text-dim); }

      /* Cards & bits */
      .card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      }
      /* Spending highlights (Insights anomaly cards) */
      .insight-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
      .insight-row { display: flex; align-items: flex-start; gap: 0.6rem; margin: 0; line-height: 1.45; }
      .insight-dot { flex: none; font-weight: 800; font-size: 1rem; line-height: 1.35; }
      /* Compact density: tighter cards, rows, and fields (set via data-density on <html>). */
      [data-density="compact"] .card { padding: 0.7rem 0.8rem; margin-bottom: 0.6rem; }
      [data-density="compact"] .card-title { margin-bottom: 0.45rem; }
      [data-density="compact"] .row { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      [data-density="compact"] .field, [data-density="compact"] .btn { padding-top: 0.35rem; padding-bottom: 0.35rem; min-height: 40px; }

      /* Light theme (set via data-theme="light" on <html>). Overrides the legacy
         palette variables, the shell's Tailwind utility colors, and the widgets'
         hardcoded surface hexes. The user accent (--accent) is left untouched. */
      [data-theme="light"] {
        --bg: #f7f6f3; --bg-elev: #efede8; --bg-card: #ffffff;
        --border: #e4e2dd; --text: #1c1c1e; --text-dim: #56565c; --text-faint: #686870;
        --accent-dim: #e4f3ea;
      }
      [data-theme="light"] .bg-base { background-color: #f7f6f3; }
      [data-theme="light"] .bg-tile { background-color: #ffffff; }
      [data-theme="light"] .bg-hover, [data-theme="light"] .hover\:bg-hover:hover { background-color: #efede8; }
      [data-theme="light"] .text-fg { color: #1c1c1e; }
      [data-theme="light"] .text-dim { color: #56565c; }
      [data-theme="light"] .text-faint { color: #686870; }
      [data-theme="light"] .border-line, [data-theme="light"] .border-r, [data-theme="light"] .border-b { border-color: #e4e2dd; }
      [data-theme="light"] .bg-\[\#1c1c1e\] { background-color: #ececec; color: #1c1c1e; }
      [data-theme="light"] .bg-fg { background-color: #1c1c1e; }
      [data-theme="light"] .text-base { color: #f7f6f3; }
      /* Widget shell, segmented + stepper pills, nav hover */
      [data-theme="light"] .w { background: #ffffff; border-color: #e4e2dd; }
      [data-theme="light"] .nav:hover { background: #efede8; color: #1c1c1e; }
      [data-theme="light"] .seg, [data-theme="light"] .rpill { background: #efede8; border-color: #e4e2dd; }
      [data-theme="light"] .seg-btn, [data-theme="light"] .rstep { color: #56565c; }
      [data-theme="light"] .seg-btn.active { background: #ffffff; color: #1c1c1e; }
      [data-theme="light"] .gear-inline, [data-theme="light"] .gear-abs, [data-theme="light"] .menu-btn, [data-theme="light"] .set-close { color: #6a6a72; }
      /* Flip panel + settings controls */
      [data-theme="light"] .flip-face, [data-theme="light"] .set-face { background: #ffffff; border-color: #e4e2dd; }
      [data-theme="light"] .set-input, [data-theme="light"] .member-chip, [data-theme="light"] .rate-row .rate-in, [data-theme="light"] .data-btn { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .badge-soon { background: #e8f2ff; color: #1d4ed8; border-color: #bfdbfe; }
      [data-theme="light"] .switch { background: #d4d2cc; }
      [data-theme="light"] .switch::after { background: #ffffff; }
      /* Scrollbars */
      [data-theme="light"] main.cf-scroll::-webkit-scrollbar-thumb { background: #cfcdc7; border-color: #f7f6f3; }
      .card-title { margin: 0 0 0.75rem; font-size: 1.05rem; }
      .muted { color: var(--text-dim); margin: 0.25rem 0; }
      .empty { color: var(--text-faint); font-style: italic; }
      /* Empty-state call-to-action block: centered message + "Add first…" button (§6.5). */
      .empty-cta { display:flex; flex-direction:column; align-items:center; gap:.85rem; padding:1.75rem 1rem; text-align:center; }
      .empty-cta .empty { margin:0; }
      /* Bills month calendar (B22): a 7-column grid of day cells with due-day dots. */
      .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:.5rem; }
      .cal-head { text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:2px 0; }
      .cal-cell { min-height:46px; border:1px solid var(--border); border-radius:6px; padding:4px 5px; position:relative; }
      .cal-cell.out { opacity:.35; }
      .cal-cell.today { border-color:var(--accent); }
      .cal-day { font-size:12px; color:var(--text-dim); }
      .cal-dot { position:absolute; bottom:6px; left:6px; width:7px; height:7px; border-radius:50%; background:var(--danger,#d8716f); }
      .badge {
        display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 999px;
      }
      .badge-soon { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }

      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
      .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
      .stat-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; }
      .stat-value.pos { color: var(--accent); }
      .stat-value.neg { color: var(--danger); }

      /* Rows */
      .rows { display: flex; flex-direction: column; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.6rem 0; border-top: 1px solid var(--border); transition: background 0.12s ease; }
      /* Row hover affordance: a subtle highlight so the cursor's row is obvious and
         the list is easier to scan (§6.16). Inset slightly so it reads as a band. */
      .row:hover { background: var(--bg-elev); }
      .row:first-child { border-top: 0; }
      /* Inline-edit rows: a full-width block (not the flex .row) so the nested
         .form-grid expands to multiple columns and editing looks like adding,
         instead of collapsing into a tall single column (C18). */
      .row-edit { padding: 0.6rem 0; border-top: 1px solid var(--border); }
      .row-edit:first-child { border-top: 0; }
      [data-density="compact"] .row-edit { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      .row-main { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; flex: 1; }
      .row-desc { font-weight: 500; }
      .row-meta { color: var(--text-dim); font-size: 0.82rem; }
      /* Transactions table (C47): a dense, sortable, column-aligned ledger. */
      .txn-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
      .txn-table thead th { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); color: var(--text-dim); font-weight: 600; white-space: nowrap; position: sticky; top: 0; background: var(--bg); z-index: 1; }
      .txn-table .th-sort { background: transparent; border: 0; color: inherit; font: inherit; font-weight: 600; cursor: pointer; padding: 0; display: inline-flex; align-items: center; gap: 0.15rem; }
      .txn-table .th-sort:hover { color: var(--text); }
      .txn-table th[aria-sort="ascending"] .th-sort, .txn-table th[aria-sort="descending"] .th-sort { color: var(--accent); }
      .txn-table tr { display: table-row; }                 /* override the legacy .row flex */
      .txn-table tbody td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .txn-table tbody tr.selected { background: var(--accent-dim); }
      .txn-table tbody tr.row:hover { background: #161617; }
      .txn-table .td-date { white-space: nowrap; color: var(--text-dim); }
      .txn-table .td-cat, .txn-table .td-acct, .txn-table .td-tags { color: var(--text-dim); }
      .txn-table .td-amount { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; font-weight: 600; }
      .txn-table .td-actions { white-space: nowrap; text-align: right; }
      .txn-table .td-select .check { background: transparent; border: 0; cursor: pointer; font-size: 1rem; line-height: 1; }
      .txn-table .row-edit td { padding: 0.5rem 0.3rem; }
      .txn-table thead th.td-amount, .txn-table thead th.td-actions { text-align: right; }
      /* Reusable DataTable pagination footer. */
      .data-pager { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; padding: 0.6rem 0.2rem 0.1rem; font-size: 0.86rem; }
      .data-pager .data-pos { font-variant-numeric: tabular-nums; }
      .data-pager .data-pager-label { margin-left: auto; }
      .data-pager .field { width: auto; min-width: 4.5rem; }
      .data-pager .btn[disabled] { opacity: 0.45; cursor: default; }
      /* Narrow screens (C10/C19): stack each row as a card. */
      @media (max-width: 760px) {
        .txn-table, .txn-table tbody, .txn-table tr, .txn-table td { display: block; width: 100%; }
        .txn-table thead { display: none; }
        .txn-table tbody tr.row { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.5rem; padding: 0.3rem 0.5rem; }
        .txn-table tbody td { border: 0; padding: 0.15rem 0.2rem; }
        .txn-table .td-amount { text-align: left; }
      }
      .amount { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
      .amount-income { color: var(--accent); }
      .amount-expense { color: var(--danger); }

      /* Transactions filter toolbar (C47): compact search + Filters popover + chips. */
      .filter-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
      .filter-search { flex: 1 1 220px; min-width: 160px; }
      .filters-trigger { display: inline-flex; align-items: center; gap: 0.4rem; }
      .filter-badge { display: inline-flex; align-items: center; justify-content: center;
        min-width: 1.25rem; height: 1.25rem; padding: 0 0.35rem; border-radius: 999px;
        background: var(--accent); color: #fff; font-size: 0.72rem; font-weight: 700;
        font-variant-numeric: tabular-nums; }
      .filter-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; }
      .filter-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.3rem 0.2rem 0.6rem;
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; font-size: 0.82rem; }
      .filter-chip .chip-text { line-height: 1.2; }
      .chip-x { display: inline-flex; align-items: center; justify-content: center; width: 1.1rem; height: 1.1rem;
        padding: 0; border: none; border-radius: 999px; background: transparent; color: var(--muted);
        font-size: 0.8rem; line-height: 1; cursor: pointer; }
      .chip-x:hover { background: var(--danger); color: #fff; }
      .chip-clear-all { background: none; border: none; color: var(--accent); font: inherit; cursor: pointer; padding: 0.2rem 0.3rem; }
      .chip-clear-all:hover { text-decoration: underline; }
      /* Filters popover body: stacked labelled fields. */
      .filter-fields { display: flex; flex-direction: column; gap: 0.7rem; }
      .filter-fields .field-label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.8rem; color: var(--muted); }
      .filter-fields .field-label .field { color: var(--text); }

      /* Forms */

        aside.rail .hh-text { display: none; }

        aside.rail .railhead { padding-left: 0; padding-right: 0; justify-content: center; }
        aside.rail .hh { justify-content: center; padding-left: 0; padding-right: 0; }
        .bento { grid-template-columns: 1fr !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
      }
      /* Tablet/narrow (C19): the top bar's controls (resolution segmented + jump +
         stepper + custom range + Add) ran off the right edge with no wrap, so some
         were unreachable. Let the bar grow to two rows — breadcrumb on top, the
         controls wrapping onto a full-width second row — so nothing is clipped. */
      @media (max-width: 1024px) {
        /* height:auto must beat Tailwind's .h-14; flex:1 0 100% forces the
           control cluster onto its own full-width row (without it, flexbox just
           shrinks everything onto one line and squashes the breadcrumb). */
        .topbar { height: auto !important; min-height: 3.5rem; flex-wrap: wrap; row-gap: .4rem; padding-top: .4rem; padding-bottom: .4rem; }
        .topbar-controls { margin-left: 0; flex: 1 0 100%; flex-wrap: wrap; row-gap: .4rem; justify-content: flex-start; }
        .reso-control { flex-wrap: wrap; row-gap: .4rem; }
        /* List rows (transactions etc.): let the action buttons wrap below the
           description instead of overlapping it when the row is too narrow (C19).
           row-main keeps flex:1 so it takes the first line and the controls flow
           underneath. A no-op on rows that still fit. */
        .row { flex-wrap: wrap; row-gap: .4rem; }
      }
      /* Tablet bento (C19): between the phone breakpoint and the desktop, the
         4-column grid squeezed tiles to ~150px and KPI figures clipped. Flow the
         tiles into 2 columns instead (header stays full-width) so figures fit. */
      @media (min-width: 768px) and (max-width: 1024px) {
        .bento { grid-template-columns: repeat(2, 1fr) !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: auto !important; grid-row: auto !important; }
        .bento > *:first-child { grid-column: 1 / -1 !important; } /* dashboard header spans both columns */
      }
      .menu-btn { background:transparent; border:0; color:#a6a6ac; cursor:pointer; display:grid; place-items:center; }
      /* "+ Add" popover menu (C23): a button that opens a small list of add
         actions. Always in the DOM; .hidden-menu toggles visibility so the
         framework's On* hooks stay at stable positions. */
      .add-wrap { position:relative; }
      .add-menu { position:absolute; right:0; top:calc(100% + 6px); z-index:50; min-width:210px;
        background:var(--bg-elev); border:1px solid var(--border); border-radius:8px; padding:4px;
        box-shadow:0 8px 24px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:2px; }
      .add-item { text-align:left; padding:.5rem .7rem; border-radius:5px; background:transparent;
        border:0; color:var(--text); cursor:pointer; font:inherit; font-size:13px; }
      .add-item:hover, .add-item:focus-visible { background:var(--hover); }
      .add-backdrop { position:fixed; inset:0; z-index:40; }
      .hidden-menu { display:none; }
      .menu-btn:hover { color:#f4f4f5; }

      /* global settings panel bits */
      .member-chip { display:inline-flex; align-items:center; gap:.4rem; padding:.25rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; font-size:.8rem; }
      .member-add { padding:.25rem .6rem; border:1px dashed #3a3a40; border-radius:4px; color:#a6a6ac; font-size:.8rem; cursor:pointer; background:transparent; }
      .member-add:hover { color:#f4f4f5; }
      .rate-row { display:flex; align-items:center; gap:.6rem; padding:.25rem 0; font-size:.85rem; }
      .rate-row .rate-in { width:90px; padding:.35rem .5rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; text-align:right; }
      .data-btn { padding:.45rem .7rem; border:1px solid #34343a; border-radius:4px; color:#d6d6da; background:#1a1a1d; cursor:pointer; font-size:.82rem; }
      .data-btn:hover { border-color:#44444c; color:#f4f4f5; }

      /* unified widget header: grip (left) · title (center) · gear (right) */
      .wh { display:flex; align-items:center; gap:.55rem; padding:.7rem .85rem .55rem; }
      .wh h3, .wh .wh-title { font-family:var(--font-display),'Fraunces',serif; font-size:1rem; font-weight:600; letter-spacing:-0.01em; flex:1; text-align:center; }
      /* Title doubles as a drill-in link to the tile's data screen (C30). */
      .wh .wh-title { background:none; border:0; padding:0; margin:0; color:inherit; cursor:pointer; line-height:inherit; }
      .wh .wh-title:hover, .wh .wh-title:focus-visible { color:var(--accent); text-decoration:underline; text-underline-offset:3px; }
      .wh .grip { width:1.1rem; }
      .grip { cursor:grab; color:#4f4f55; }
      .wbody { padding:0 .7rem .7rem; flex:1; min-height:0; }
      .kpi { padding:.95rem 1rem; }

      /* Insights chat: style the marked-rendered Markdown (Tailwind's preflight
         strips default heading/list/spacing styles, so the assistant's replies would
         otherwise look like flat text). Theme-agnostic greys work in light + dark. */
      .insights-answer { font-size:14px; line-height:1.55; word-wrap:break-word; overflow-wrap:anywhere; }
      .insights-answer > :first-child { margin-top:0; }
      .insights-answer > :last-child { margin-bottom:0; }
      .insights-answer p { margin:.5rem 0; }
      .insights-answer h1,.insights-answer h2,.insights-answer h3,.insights-answer h4 { font-family:var(--font-display),'Fraunces',serif; font-weight:600; line-height:1.25; margin:.9rem 0 .35rem; }
      .insights-answer h1 { font-size:1.25rem; }
      .insights-answer h2 { font-size:1.1rem; }
      .insights-answer h3 { font-size:1rem; }
      .insights-answer h4 { font-size:.95rem; }
      .insights-answer ul,.insights-answer ol { margin:.5rem 0; padding-left:1.25rem; }
      .insights-answer ul { list-style:disc; }
      .insights-answer ol { list-style:decimal; }
      .insights-answer li { margin:.2rem 0; }
      .insights-answer li > ul,.insights-answer li > ol { margin:.15rem 0; }
      .insights-answer strong { font-weight:700; }
      .insights-answer em { font-style:italic; }
      .insights-answer a { color:var(--accent,#3b82f6); text-decoration:underline; text-underline-offset:2px; }
      .insights-answer code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.85em; background:rgba(120,120,130,.16); padding:.1em .35em; border-radius:4px; }
      .insights-answer pre { background:rgba(120,120,130,.16); padding:.7rem .85rem; border-radius:8px; overflow-x:auto; margin:.6rem 0; }
      .insights-answer pre code { background:none; padding:0; font-size:.82em; }
      .insights-answer blockquote { border-left:3px solid var(--accent,#3b82f6); margin:.6rem 0; padding:.1rem .8rem; opacity:.85; }
      .insights-answer hr { border:0; border-top:1px solid rgba(120,120,130,.3); margin:.8rem 0; }
      .insights-answer table { border-collapse:collapse; margin:.6rem 0; font-size:.9em; }
      .insights-answer th,.insights-answer td { border:1px solid rgba(120,120,130,.3); padding:.3rem .55rem; text-align:left; }
      .insights-answer th { background:rgba(120,120,130,.12); font-weight:600; }

      /* Brief highlight when the chat "Open it" link jumps to an item. */
      @keyframes cf-jump-flash-kf { 0%{ background:var(--accent,#3b82f6); } 100%{ background:transparent; } }
      .cf-jump-flash { animation:cf-jump-flash-kf 1.6s ease-out; border-radius:8px; }
      @media (prefers-reduced-motion: reduce) { .cf-jump-flash { animation:none; } }

      /* "Needs attention" dashboard digest. A list (stacked) or chips (wide-and-short,
         e.g. the default 4x1) of clickable urgency items, each toned by severity. */
      .attention-list { display:flex; flex-direction:column; gap:.4rem; }
      .attention-chips { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; }
      .attention-item { display:inline-flex; align-items:center; gap:.5rem; text-align:left;
        background:transparent; border:1px solid var(--line,#e5e7eb); border-radius:9px;
        padding:.3rem .6rem; cursor:pointer; font-size:13.5px; color:inherit; line-height:1.3;
        transition:background .12s ease, border-color .12s ease; }
      .attention-list .attention-item { width:100%; }
      .attention-item:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 8%, transparent);
        border-color:color-mix(in srgb, var(--accent,#3b82f6) 35%, var(--line,#e5e7eb)); }
      .attention-item:focus-visible { outline:2px solid var(--accent,#3b82f6); outline-offset:1px; }
      .attention-dot { font-size:11px; line-height:1; flex:none; }
      .attention-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .attention-item.is-critical { border-left:3px solid var(--down,#dc2626); }
      .attention-item.is-critical .attention-dot { color:var(--down,#dc2626); }
      .attention-item.is-warning { border-left:3px solid var(--warn,#d97706); }
      .attention-item.is-warning .attention-dot { color:var(--warn,#d97706); }
      .attention-item.is-info .attention-dot { color:var(--dim,#6b7280); }

      /* Widget Manager: a toolbar card + the reusable sortable data table. */
      .wm .card + .card { margin-top:14px; }
      .wm-toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:.6rem; }
      .wm-sep { width:1px; align-self:stretch; min-height:20px; background:var(--line,#e5e7eb); margin:0 .2rem; }
      .wm-table { width:100%; max-width:780px; }
      .wm-table th, .wm-table td { vertical-align:middle; padding-top:.45rem; padding-bottom:.45rem; }
      /* Keep the controls compact and grouped on the right; the name takes the slack. */
      .wm-table th.wm-col-vis, .wm-table th.wm-col-size, .wm-table th.wm-col-order { text-align:center; }
      .wm-col-vis { width:4.5rem; text-align:center; }
      .wm-col-size { width:1%; white-space:nowrap; }
      .wm-col-order { width:1%; white-space:nowrap; }
      .wm-name { font-weight:600; }
      .wm-row.is-hidden .wm-name { color:var(--dim,#6b7280); text-decoration:line-through; }
      .wm-row.is-hidden td:not(.wm-cell-name) { opacity:.5; }
      .wm-col-vis .switch { margin:0 auto; }
      .wm-size { display:inline-flex; align-items:center; gap:.5rem; }
      .wm-step { display:inline-flex; align-items:stretch; border:1px solid var(--line,#e5e7eb); border-radius:8px; overflow:hidden; }
      .wm-step-btn { width:26px; height:28px; border:0; background:transparent; cursor:pointer; color:inherit;
        font-size:15px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
        transition:background .12s ease; }
      .wm-step-btn:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 10%, transparent); }
      .wm-step-val { min-width:2.6rem; display:inline-flex; align-items:center; justify-content:center;
        font-size:12px; color:var(--dim,#6b7280); border-left:1px solid var(--line,#e5e7eb);
        border-right:1px solid var(--line,#e5e7eb); padding:0 .2rem; }
      .wm-reorder { display:inline-flex; gap:.3rem; justify-content:center; }
      .wm-arrow { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
        border:1px solid var(--line,#e5e7eb); border-radius:8px; background:transparent; cursor:pointer;
        color:inherit; line-height:1; transition:background .12s ease, border-color .12s ease; }
      .wm-arrow:hover:not(:disabled) { background:color-mix(in srgb, var(--accent,#3b82f6) 10%, transparent);
        border-color:color-mix(in srgb, var(--accent,#3b82f6) 35%, var(--line,#e5e7eb)); }
      .wm-arrow:disabled { opacity:.3; cursor:not-allowed; }

      /* Tile-style editor: controls on the left, a sticky live preview on the right. */
      .wm-style { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:1.75rem; align-items:start; }
      @media (max-width:820px){ .wm-style { grid-template-columns:1fr; } }
      .wm-style-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.5rem 1.25rem; margin-top:.75rem; }
      @media (max-width:560px){ .wm-style-grid { grid-template-columns:1fr; } }
      .wm-style-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; min-height:34px; }
      .wm-style-label { font-size:13px; color:var(--dim,#6b7280); }
      .wm-style-color { display:inline-flex; align-items:center; gap:.4rem; }
      .wm-color { width:2rem; height:1.7rem; padding:0; border:1px solid var(--line,#e5e7eb); border-radius:6px; background:none; cursor:pointer; }
      .wm-clear { width:1.4rem; height:1.4rem; border:1px solid var(--line,#e5e7eb); border-radius:5px; background:transparent;
        cursor:pointer; color:var(--dim,#6b7280); line-height:1; font-size:13px; }
      .wm-clear:hover { color:var(--down,#dc2626); border-color:var(--down,#dc2626); }
      .wm-style-select { min-width:8.5rem; }
      .wm-style-preview { position:sticky; top:1rem; display:flex; flex-direction:column; gap:.5rem; }
      .wm-preview-label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint,#9ca3af); }
      /* The preview is a real tile shell so overrides read true; it isn't on the grid. */
      .wm-preview-tile { position:static !important; min-height:120px; }

      /* Background-music (muzak) top-bar toggle. */
      .muzak-btn, .notify-btn { display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px;
        border:1px solid var(--line,#e5e7eb); border-radius:8px; background:transparent; cursor:pointer;
        color:var(--accent,#3b82f6); font-size:15px; line-height:1;
        transition:background .12s ease, color .12s ease, opacity .12s ease; }
      .muzak-btn:hover, .notify-btn:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 10%, transparent); }
      .muzak-btn.is-off { color:var(--faint,#9ca3af); opacity:.7; }
      .muzak-btn.relative { position:relative; }
      .notify-badge { position:absolute; top:-3px; right:-3px; min-width:15px; height:15px; padding:0 3px;
        display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; line-height:1;
        color:#fff; background:var(--down,#dc2626); border-radius:999px; }
      .set-range { width:11rem; accent-color:var(--accent,#3b82f6); cursor:pointer; }
      /* Dashboard To-do widget inline complete checkbox. */
      .dash-check { flex:none; width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center;
        background:transparent; border:0; cursor:pointer; color:var(--dim,#6b7280); font-size:15px; line-height:1; }
      .dash-check[aria-checked="true"] { color:var(--up,#16a34a); }
      .dash-check:hover { color:var(--accent,#3b82f6); }
      /* In-app modal dialogs (C42) — replaces native prompt/confirm/alert. */
      .cf-dialog-backdrop { position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; padding:1rem; }
      .cf-dialog-scrim { position:absolute; inset:0; background:rgba(0,0,0,.45); }
      .cf-dialog { position:relative; z-index:1; width:min(28rem,100%); background:var(--bg-card,#fff);
        border:1px solid var(--line,#e5e7eb); border-radius:14px; box-shadow:0 12px 40px rgba(0,0,0,.3); padding:1.25rem 1.25rem 1rem; }
      .cf-dialog-title { font-family:var(--font-display),'Fraunces',serif; font-size:1.05rem; font-weight:600; margin:0 0 .35rem; }
      .cf-dialog-msg { color:var(--text,inherit); margin:0 0 .9rem; line-height:1.5; }
      .cf-dialog-input { width:100%; margin-bottom:1rem; }
      .cf-dialog-actions { display:flex; justify-content:flex-end; gap:.5rem; }
      .btn-danger { background:var(--down,#dc2626); border-color:var(--down,#dc2626); color:#fff; }
      .btn-danger:hover { filter:brightness(1.05); }
      .row.subtask { border-left:2px solid var(--line,#e5e7eb); }
      .rule-grip { display:inline-flex; align-items:center; color:var(--faint,#9ca3af); cursor:grab; flex:none; margin-right:.25rem; }
      .row[draggable="true"]:active { cursor:grabbing; }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-card">
        <div class="boot-mark">
          <svg class="boot-ring" viewBox="0 0 64 64" aria-hidden="true">
            <circle class="boot-ring-track" cx="32" cy="32" r="28" />
            <circle class="boot-ring-arc" cx="32" cy="32" r="28" />
          </svg>
          <span class="boot-c">C</span>
        </div>
        <div class="boot-word">CashFlux</div>
        <div class="boot-sub">Getting your money in order…</div>
      </div>
    </div>
    <div id="app"></div>
    <div id="boot-error"></div>
    <button id="installBtn" type="button"
      style="display:none; position:fixed; bottom:1rem; right:1rem; z-index:30;
             padding:0.55rem 1rem; border-radius:4px; cursor:pointer; font: inherit; font-size:0.9rem;
             background:#1f2c24; border:1px solid #356b50; color:#7fd0a3;">Install CashFlux</button>

    <script>
      // PWA install prompt: surface an Install button when the browser offers one.
      (function () {
        var deferred = null;
        var btn = document.getElementById("installBtn");
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (btn) btn.style.display = "block";
        });
        if (btn) {
          btn.addEventListener("click", function () {
            if (!deferred) return;
            deferred.prompt();
            deferred.userChoice.then(function () {
              deferred = null;
              btn.style.display = "none";
            });
          });
        }
        window.addEventListener("appinstalled", function () {
          if (btn) btn.style.display = "none";
        });
      })();
    </script>

    <!-- D3 (pinned) + the chart shim the Go ui.Chart component drives. Loaded
         before the wasm boot so window.cashfluxRenderChart exists by first paint;
         both are service-worker cached for offline use. -->
    <!-- D3 vendored locally (C44): no third-party CDN, no SRI gap, works offline. -->
    <script src="./d3.min.js"></script>
    <script src="./chart.js"></script>
    <script src="./flip.js"></script>
    <!-- Calming background music ("muzak"): low-volume looping ambient player. -->
    <script src="./muzak.js"></script>
    <!-- Mermaid diagrams (C70): vendored locally (no CDN, C44) + its shim. -->
    <script src="./mermaid.min.js"></script>
    <script src="./mermaid.js"></script>

    <!-- Markdown rendering for Insights chat (vendored locally, no CDN, C44):
         marked parses Markdown, DOMPurify sanitizes the result before it's set
         as innerHTML, so model-authored text can't inject active markup. -->
    <script src="./marked.min.js"></script>
    <script src="./purify.min.js"></script>

    <script src="./wasm_exec.js"></script>
    <script>
      (function () {
        const boot = document.getElementById("boot");
        const app = document.getElementById("app");
        const errorBox = document.getElementById("boot-error");

        // Dismiss the boot splash once the app has rendered. We fade it (CSS) AND
        // then pull it out of the layer (display:none) so a slow or interrupted
        // transition can never leave a translucent #boot stuck over the app — the
        // lingering-splash bug seen across /planning, /split, /goals, /documents.
        function hideBoot() {
          if (!boot || boot.classList.contains("hidden")) return;
          if (app) app.classList.add("app-enter");
          boot.classList.add("hidden");
          var remove = function () { boot.style.display = "none"; };
          boot.addEventListener("transitionend", remove, { once: true });
          setTimeout(remove, 700); // fallback if transitionend never fires
        }

        if (app) {
          if (app.children.length > 0) {
            hideBoot(); // content already mounted before this script ran
          } else if (typeof MutationObserver === "function") {
            const obs = new MutationObserver(function () {
              if (app.children.length > 0) {
                hideBoot();
                obs.disconnect();
              }
            });
            obs.observe(app, { childList: true });
          }
          // Safety net: never let the splash outlive the boot, even if a re-mount
          // races the observer.
          setTimeout(function () { if (app.children.length > 0) hideBoot(); }, 4000);
        }

        if (typeof Go !== "function") {
          errorBox.style.display = "block";
          errorBox.textContent = "wasm_exec.js failed to load (Go runtime glue missing).";
          return;
        }

        // Register the service worker for offline/installability (best-effort).
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./sw.js").catch(function () {});
          });
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("./bin/main.wasm"), go.importObject)
          .then(function (result) { go.run(result.instance); })
          .catch(function (err) {
            errorBox.style.display = "block";
            errorBox.textContent = "Failed to start CashFlux wasm app:\n" + String(err);
            console.error(err);
          });
      })();
    </script>
  </body>
