      .flip-back { transform:rotateY(180deg); }
      .set-h { display:flex; align-items:center; gap:.5rem; padding:.85rem 1rem; border-bottom:1px solid #2a2a2c; }
      .set-h h3 { font-family:var(--font-display),'Fraunces',serif; font-size:1.05rem; font-weight:600; flex:1; text-align:center; }
      .set-close { background:transparent; border:0; color:#8a8a92; cursor:pointer; font-size:.95rem; width:1.5rem; line-height:1; }
      .set-close:hover { color:#f4f4f5; }
      .set-body { flex:1; overflow-y:auto; padding:1rem 1rem 1.5rem; scrollbar-width:thin; scrollbar-color:#34343a transparent; }
      .set-body::-webkit-scrollbar { width:9px; } .set-body::-webkit-scrollbar-thumb { background:#2d2d33; border-radius:999px; border:2px solid #121214; }
      .set-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:#6c6c72; margin:.7rem 0 .3rem; }
      .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:.55rem 0; border-bottom:1px solid #1f1f22; font-size:.9rem; }
      .switch { width:40px; height:24px; border-radius:999px; background:#34343a; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
      .switch::after { content:""; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#9a9aa4; transition:.2s; }
      .switch.on { background:#3e7f5e; } .switch.on::after { left:19px; background:#e6f3ec; }
      .swatch { width:24px; height:24px; border-radius:6px; cursor:pointer; border:2px solid transparent; }
      .swatch.sel { border-color:#f4f4f5; }
      .set-input { width:100%; padding:.5rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; }
      .set-foot { padding:.75rem 1rem; border-top:1px solid #2a2a2c; display:flex; gap:.5rem; justify-content:flex-end; }
      /* GX3-F3: align modal footer buttons to the same scale token as .btn so height is consistent. */
      .set-btn { min-width:96px; padding:var(--btn-py,0.5rem) 1rem; min-height:44px; border-radius:4px; cursor:pointer; font-size:.9rem; display:inline-flex; align-items:center; justify-content:center; }
      .set-btn.save { background:#1f2c24; border:1px solid #356b50; color:#7fd0a3; font-weight:600; }
      .set-btn.save:hover { background:#26382d; }
      .set-btn.cancel { background:transparent; border:1px solid #34343a; color:#a6a6ac; font-weight:500; }
      .set-btn.cancel:hover { color:#f4f4f5; border-color:#44444c; }

      /* squared progress bars (consistent radii) */
      .bento [class*="rounded-full"][class*="overflow-hidden"] { border-radius:2px; }

      /* Hide the left-rail's scrollbar but keep it scrollable (wheel/trackpad/
         keyboard) — the nav overflows once "My pages" grows (C31). */
      aside.rail nav { scrollbar-width: none; }
      aside.rail nav::-webkit-scrollbar { width: 0; height: 0; display: none; }

      /* sidebar collapse */
      aside.rail { transition:width .18s ease; }
      aside.rail.collapsed { width:58px; }
      aside.rail.collapsed .brand-name,
      aside.rail.collapsed .nv span,
      aside.rail.collapsed nav .rail-section,
      aside.rail.collapsed .hh-text { display:none; }
      aside.rail.collapsed .nv { justify-content:center; gap:0; padding-left:0; padding-right:0; position:relative; }
      /* Alt+1–9 keyboard-jump hint at the trailing edge of each primary nav item (L34).
         Surfaces the otherwise-undiscoverable shortcut; hidden when the rail is collapsed. */
      .nav-alt-hint { margin-left:auto; font-size:0.7rem; line-height:1; color:var(--muted); opacity:0.7;
        border:1px solid var(--border); border-radius:4px; padding:1px 4px; }
      aside.rail.collapsed .nav-alt-hint { display:none; }
      aside.rail.collapsed .railhead { padding-left:0; padding-right:0; justify-content:center; }
      aside.rail.collapsed .hh { justify-content:center; padding-left:0; padding-right:0; }
      /* Collapsed rail: reveal the label as a flyout on hover/focus without widening the rail. */
      aside.rail.collapsed .nv:hover > span,
      aside.rail.collapsed .nv:focus-visible > span,
      aside.rail.collapsed .nv:focus-within > span {
        display:block; position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%);
        white-space:nowrap; background:var(--bg-elev); color:var(--text);
        border:1px solid var(--border); border-radius:6px; padding:0.25rem 0.55rem;
        font-size:13px; line-height:1; box-shadow:0 6px 18px rgba(0,0,0,.28); z-index:60; pointer-events:auto;
      }
      @media (prefers-reduced-motion: no-preference) {
        aside.rail.collapsed .nv:hover > span,
        aside.rail.collapsed .nv:focus-visible > span,
        aside.rail.collapsed .nv:focus-within > span { animation: rail-flyout .12s ease both; }
      }
      @keyframes rail-flyout { from { opacity:0; transform:translate(-4px,-50%); } to { opacity:1; transform:translateY(-50%); } }

      /* Phone layout (C10): below 768px the full 240px rail pushed content
         off-screen and the page scrolled horizontally. Collapse the rail to its
         icon-only width to reclaim space, stack the bento into one column
         (overriding tiles' inline grid placement), and clamp horizontal overflow. */
      @media (max-width: 767px) {
        html, body, #app { overflow-x: hidden; max-width: 100vw; }
        aside.rail { width: 56px; }
        aside.rail .brand-name,
        aside.rail .nv span,
        aside.rail nav .rail-section,
        aside.rail .hh-text { display: none; }
        aside.rail .nv { justify-content: center; gap: 0; padding-left: 0; padding-right: 0; }
        aside.rail .railhead { padding-left: 0; padding-right: 0; justify-content: center; }
        aside.rail .hh { justify-content: center; padding-left: 0; padding-right: 0; }
        .bento { grid-template-columns: 1fr !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
      }
      /* Tablet/narrow (C19): the top bar's controls (resolution segmented + jump +
         stepper + custom range + Add) ran off the right edge with no wrap, so some
         were unreachable. Let the bar grow to two rows — breadcrumb on top, the
         controls wrapping onto a full-width second row — so nothing is clipped. */
      @media (max-width: 1024px) {
        /* height:auto must beat Tailwind's .h-14; flex:1 0 100% forces the
           control cluster onto its own full-width row (without it, flexbox just
           shrinks everything onto one line and squashes the breadcrumb). */
        .topbar { height: auto !important; min-height: 3.5rem; flex-wrap: wrap; row-gap: .4rem; padding-top: .4rem; padding-bottom: .4rem; }
        .topbar-controls { margin-left: 0; flex: 1 0 100%; flex-wrap: wrap; row-gap: .4rem; justify-content: flex-start; }
        .reso-control { flex-wrap: wrap; row-gap: .4rem; }
        /* List rows (transactions etc.): let the action buttons wrap below the
           description instead of overlapping it when the row is too narrow (C19).
           row-main keeps flex:1 so it takes the first line and the controls flow
           underneath. A no-op on rows that still fit. */
        .row { flex-wrap: wrap; row-gap: .4rem; }
      }
      /* Tablet bento (C19): between the phone breakpoint and the desktop, the
         4-column grid squeezed tiles to ~150px and KPI figures clipped. Flow the
         tiles into 2 columns instead (header stays full-width) so figures fit. */
      @media (min-width: 768px) and (max-width: 1024px) {
        .bento { grid-template-columns: repeat(2, 1fr) !important; grid-template-rows: none !important;
          grid-auto-rows: minmax(var(--cell), auto) !important; }
        .bento > * { grid-column: auto !important; grid-row: auto !important; }
        .bento > *:first-child { grid-column: 1 / -1 !important; } /* dashboard header spans both columns */
      }
      /* GX7-F2: at narrow portrait widths (≤480px) the topbar controls wrap to 3–4 rows,
         consuming up to 296px (37%) of an 800px phone screen before any content appears.
         Switch to a horizontally-scrollable single-row strip so all controls stay accessible
         without bloating the vertical chrome. The existing two-row wrap (C19, ≤1024px) is
         preserved at tablet widths; this override only kicks in at phone width. */
      @media (max-width: 480px) {
        .topbar { flex-wrap: nowrap; overflow-x: auto; min-height: 3rem; height: auto !important;
          -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .topbar::-webkit-scrollbar { display: none; }
        .topbar-controls { flex: 0 0 auto; flex-wrap: nowrap; overflow-x: visible; row-gap: 0; }
        .reso-control { flex-wrap: nowrap; }
      }
      /* GX7-F4: at ≤767px the bento override (.bento>* { grid-column: 1/-1 }) can leak into
         .stat-grid when it sits inside the bento flow, collapsing the KPI row to 1 column.
         Re-assert auto-fit with a tighter minmax (120px) so 3 stat tiles fit in 344px. */
      @media (max-width: 767px) {
        .page .stat-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) !important; }
      }
      .menu-btn { background:transparent; border:0; color:#a6a6ac; cursor:pointer; display:grid; place-items:center; }
      /* "+ Add" popover menu (C23): a button that opens a small list of add
         actions. Always in the DOM; .hidden-menu toggles visibility so the
         framework's On* hooks stay at stable positions. */
      .add-wrap { position:relative; }
      .add-menu { position:absolute; right:0; top:calc(100% + 6px); z-index:50; min-width:210px;
        background:var(--bg-elev); border:1px solid var(--border); border-radius:8px; padding:4px;
        box-shadow:0 8px 24px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:2px; }
      .add-item { text-align:left; padding:.5rem .7rem; border-radius:5px; background:transparent;
        border:0; color:var(--text); cursor:pointer; font:inherit; font-size:13px; }
      .add-item:hover, .add-item:focus-visible { background:var(--hover); }
      .add-backdrop { position:fixed; inset:0; z-index:40; }
      .hidden-menu { display:none; }
      .menu-btn:hover { color:#f4f4f5; }

      /* global settings panel bits */
      .member-chip { display:inline-flex; align-items:center; gap:.4rem; padding:.25rem .6rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; font-size:.8rem; }
      .member-add { padding:.25rem .6rem; border:1px dashed #3a3a40; border-radius:4px; color:#a6a6ac; font-size:.8rem; cursor:pointer; background:transparent; }
      .member-add:hover { color:#f4f4f5; }
      .rate-row { display:flex; align-items:center; gap:.6rem; padding:.25rem 0; font-size:.85rem; }
      .rate-row .rate-in { width:90px; padding:.35rem .5rem; background:#1a1a1d; border:1px solid #34343a; border-radius:4px; color:#f4f4f5; font:inherit; text-align:right; }
      .data-btn { padding:.45rem .7rem; border:1px solid #34343a; border-radius:4px; color:#d6d6da; background:#1a1a1d; cursor:pointer; font-size:.82rem; }
      .data-btn:hover { border-color:#44444c; color:#f4f4f5; }
      /* G21: theme-safe danger variant — replaces inline Style() on the Wipe data button. */
      .data-btn-danger { color: var(--danger, #d8716f); border-color: var(--danger-muted, #5a2a2a); }
      .data-btn-danger:hover { color: var(--danger, #d8716f); border-color: var(--danger, #d8716f); }
      /* GM1-S4: collapse settings grid to single column at ≤768px.
         tw.GridCols2 emits an inline style (not a class), so we target the
         attribute value rather than a class name. */
      @media (max-width: 768px) {
        .flip-wrap div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      }

      /* unified widget header: grip (left) · title (center) · gear (right) */
      .wh { display:flex; align-items:center; gap:.55rem; padding:.7rem .85rem .55rem; }
      .wh h2, .wh h3, .wh .wh-title { font-family:var(--font-display),'Fraunces',serif; font-size:1rem; font-weight:600; letter-spacing:-0.01em; flex:1; text-align:center; }
      /* Title doubles as a drill-in link to the tile's data screen (C30). */
      .wh .wh-title { background:none; border:0; padding:0; margin:0; color:inherit; cursor:pointer; line-height:inherit; }
      .wh .wh-title:hover, .wh .wh-title:focus-visible { color:var(--accent); text-decoration:underline; text-underline-offset:3px; }
      .wh .grip { width:1.1rem; margin-right:.15rem; }
      /* GX6-D2: the Unicode ⠿ grip glyph sat off the text baseline (droop). Center it
         until F1 swaps it for the registry SVG. */
      .grip { cursor:grab; color:#4f4f55; display:inline-flex; align-items:center; line-height:1; }

      /* Sample-data banner (G1): these classes were unstyled, so "Start fresh" and
         "Dismiss" rendered as adjacent inline text reading "Start freshDismiss".
         Give the banner a compact styled strip with a clear gap between actions. */
      .sample-banner { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:.6rem;
        padding:.5rem .85rem; margin-bottom:1rem; background:var(--accent-dim); border:1px solid var(--border);
        border-radius:var(--radius); font-size:.86rem; }
      .sample-banner-text { color:var(--text-dim); }
      .sample-banner-actions { display:flex; align-items:center; gap:.6rem; }
      .sample-banner-btn { background:transparent; border:0; padding:.15rem .2rem; font:inherit; color:var(--accent);
        cursor:pointer; text-decoration:underline; text-underline-offset:3px; }
      .sample-banner-btn:hover { color:var(--text); }
      .sample-banner-dismiss { color:var(--text-dim); }
      .wbody { padding:0 .7rem .7rem; flex:1; min-height:0; }
      .kpi { padding:.95rem 1rem; }

      /* Insights chat: style the marked-rendered Markdown (Tailwind's preflight
         strips default heading/list/spacing styles, so the assistant's replies would
         otherwise look like flat text). Theme-agnostic greys work in light + dark. */
      .insights-answer { font-size:14px; line-height:1.55; word-wrap:break-word; overflow-wrap:anywhere; }
      .insights-answer > :first-child { margin-top:0; }
      .insights-answer > :last-child { margin-bottom:0; }
      .insights-answer p { margin:.5rem 0; }
      .insights-answer h1,.insights-answer h2,.insights-answer h3,.insights-answer h4 { font-family:var(--font-display),'Fraunces',serif; font-weight:600; line-height:1.25; margin:.9rem 0 .35rem; }
      .insights-answer h1 { font-size:1.25rem; }
      .insights-answer h2 { font-size:1.1rem; }
      .insights-answer h3 { font-size:1rem; }
      .insights-answer h4 { font-size:.95rem; }
      .insights-answer ul,.insights-answer ol { margin:.5rem 0; padding-left:1.25rem; }
      .insights-answer ul { list-style:disc; }
      .insights-answer ol { list-style:decimal; }
      .insights-answer li { margin:.2rem 0; }
      .insights-answer li > ul,.insights-answer li > ol { margin:.15rem 0; }
      .insights-answer strong { font-weight:700; }
      .insights-answer em { font-style:italic; }
      .insights-answer a { color:var(--accent,#3b82f6); text-decoration:underline; text-underline-offset:2px; }
      .insights-answer code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.85em; background:rgba(120,120,130,.16); padding:.1em .35em; border-radius:4px; }
      .insights-answer pre { background:rgba(120,120,130,.16); padding:.7rem .85rem; border-radius:8px; overflow-x:auto; margin:.6rem 0; }
      .insights-answer pre code { background:none; padding:0; font-size:.82em; }
      .insights-answer blockquote { border-left:3px solid var(--accent,#3b82f6); margin:.6rem 0; padding:.1rem .8rem; opacity:.85; }
      .insights-answer hr { border:0; border-top:1px solid rgba(120,120,130,.3); margin:.8rem 0; }
      .insights-answer table { border-collapse:collapse; margin:.6rem 0; font-size:.9em; }
      .insights-answer th,.insights-answer td { border:1px solid rgba(120,120,130,.3); padding:.3rem .55rem; text-align:left; }
      .insights-answer th { background:rgba(120,120,130,.12); font-weight:600; }

      /* Brief highlight when the chat "Open it" link jumps to an item. */
      @keyframes cf-jump-flash-kf { 0%{ background:var(--accent,#3b82f6); } 100%{ background:transparent; } }
      .cf-jump-flash { animation:cf-jump-flash-kf 1.6s ease-out; border-radius:8px; }
      @media (prefers-reduced-motion: reduce) { .cf-jump-flash { animation:none; } }

      /* "Needs attention" dashboard digest. A list (stacked) or chips (wide-and-short,
         e.g. the default 4x1) of clickable urgency items, each toned by severity. */
      .attention-list { display:flex; flex-direction:column; gap:.4rem; }
      .attention-chips { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; }
      .attention-item { display:inline-flex; align-items:center; gap:.5rem; text-align:left;
        background:transparent; border:1px solid var(--line,#e5e7eb); border-radius:9px;
        padding:.3rem .6rem; cursor:pointer; font-size:13.5px; color:inherit; line-height:1.3;
        transition:background .12s ease, border-color .12s ease; }
      .attention-list .attention-item { width:100%; }
      .attention-item:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 8%, transparent);
        border-color:color-mix(in srgb, var(--accent,#3b82f6) 35%, var(--line,#e5e7eb)); }
      .attention-item:focus-visible { outline:2px solid var(--accent,#3b82f6); outline-offset:1px; }
      .attention-dot { font-size:11px; line-height:1; flex:none; }
      .attention-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .attention-item.is-critical { border-left:3px solid var(--down,#dc2626); }
      .attention-item.is-critical .attention-dot { color:var(--down,#dc2626); }
      .attention-item.is-warning { border-left:3px solid var(--warn,#d97706); }
      .attention-item.is-warning .attention-dot { color:var(--warn,#d97706); }
      .attention-item.is-info .attention-dot { color:var(--dim,#6b7280); }

      /* Widget Manager: a toolbar card + the reusable sortable data table. */
      .wm .card + .card { margin-top:14px; }
      .wm-toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:.6rem; }
      .wm-sep { width:1px; align-self:stretch; min-height:20px; background:var(--line,#e5e7eb); margin:0 .2rem; }
      .wm-table { width:100%; max-width:780px; }
      .wm-table th, .wm-table td { vertical-align:middle; padding-top:.45rem; padding-bottom:.45rem; }
      /* Keep the controls compact and grouped on the right; the name takes the slack. */
      .wm-table th.wm-col-vis, .wm-table th.wm-col-size, .wm-table th.wm-col-order { text-align:center; }
      .wm-col-vis { width:4.5rem; text-align:center; }
      .wm-col-size { width:1%; white-space:nowrap; }
      .wm-col-order { width:1%; white-space:nowrap; }
      .wm-name { font-weight:600; }
      .wm-row.is-hidden .wm-name { color:var(--dim,#6b7280); text-decoration:line-through; }
      .wm-row.is-hidden td:not(.wm-cell-name) { opacity:.5; }
      .wm-col-vis .switch { margin:0 auto; }
      .wm-size { display:inline-flex; align-items:center; gap:.5rem; }
      .wm-step { display:inline-flex; align-items:stretch; border:1px solid var(--line,#e5e7eb); border-radius:8px; overflow:hidden; }
      .wm-step-btn { width:26px; height:28px; border:0; background:transparent; cursor:pointer; color:inherit;
        font-size:15px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
        transition:background .12s ease; }
      .wm-step-btn:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 10%, transparent); }
      .wm-step-val { min-width:2.6rem; display:inline-flex; align-items:center; justify-content:center;
        font-size:12px; color:var(--dim,#6b7280); border-left:1px solid var(--line,#e5e7eb);
        border-right:1px solid var(--line,#e5e7eb); padding:0 .2rem; }
      .wm-reorder { display:inline-flex; gap:.3rem; justify-content:center; }
      .wm-arrow { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
        border:1px solid var(--line,#e5e7eb); border-radius:8px; background:transparent; cursor:pointer;
        color:inherit; line-height:1; transition:background .12s ease, border-color .12s ease; }
      .wm-arrow:hover:not(:disabled) { background:color-mix(in srgb, var(--accent,#3b82f6) 10%, transparent);
        border-color:color-mix(in srgb, var(--accent,#3b82f6) 35%, var(--line,#e5e7eb)); }
      .wm-arrow:disabled { opacity:.3; cursor:not-allowed; }

      /* Tile-style editor: controls on the left, a sticky live preview on the right. */
      .wm-style { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:1.75rem; align-items:start; }
      @media (max-width:820px){ .wm-style { grid-template-columns:1fr; } }
      .wm-style-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.5rem 1.25rem; margin-top:.75rem; }
      @media (max-width:560px){ .wm-style-grid { grid-template-columns:1fr; } }
      .wm-style-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; min-height:34px; }
      .wm-style-label { font-size:13px; color:var(--dim,#6b7280); }
      .wm-style-color { display:inline-flex; align-items:center; gap:.4rem; }
      .wm-color { width:2rem; height:1.7rem; padding:0; border:1px solid var(--line,#e5e7eb); border-radius:6px; background:none; cursor:pointer; }
      .wm-clear { width:1.4rem; height:1.4rem; border:1px solid var(--line,#e5e7eb); border-radius:5px; background:transparent;
        cursor:pointer; color:var(--dim,#6b7280); line-height:1; font-size:13px; }
      .wm-clear:hover { color:var(--down,#dc2626); border-color:var(--down,#dc2626); }
      .wm-style-select { min-width:8.5rem; }
      .wm-style-preview { position:sticky; top:1rem; display:flex; flex-direction:column; gap:.5rem; }
      .wm-preview-label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint,#9ca3af); }
      /* The preview is a real tile shell so overrides read true; it isn't on the grid. */
      .wm-preview-tile { position:static !important; min-height:120px; }

      /* Widget builder: a stage holding a true-proportion preview tile, with the
         size control beneath it. The tile is a real .w shell sized in px to match
         the bento cell geometry (152px cells + 10px gaps). */
      .wb { display:flex; flex-direction:column; gap:1rem; }
      .wb-stage { display:flex; align-items:center; justify-content:center; min-height:200px;
        padding:1.5rem; border-radius:12px; background:var(--bg,#0e0e10);
        background-image:radial-gradient(circle, color-mix(in srgb, var(--dim,#6b7280) 22%, transparent) 1px, transparent 1px);
        background-size:16px 16px; overflow:auto; }
      .wb-tile { position:static !important; transition:width .15s ease, height .15s ease; }
      .wb-size { display:flex; flex-wrap:wrap; gap:.75rem; }

      /* n8n-style pipeline canvas: step nodes joined by directed connectors on a
         dotted, horizontally-scrollable surface. */
      .wb-canvas { display:flex; align-items:center; gap:0; min-height:128px; padding:1.5rem 1rem;
        border-radius:12px; border:1px solid var(--line,#e5e7eb); background:var(--bg,#0e0e10);
        background-image:radial-gradient(circle, color-mix(in srgb, var(--dim,#6b7280) 22%, transparent) 1px, transparent 1px);
        background-size:16px 16px; overflow-x:auto; }
      .wb-node { position:relative; display:flex; flex-direction:column; align-items:flex-start; gap:.15rem;
        min-width:8.5rem; padding:.7rem .9rem; border-radius:10px; cursor:pointer; text-align:left;
        color:inherit; background:var(--bg-elev,#1a1a1d); border:1.5px solid var(--line,#e5e7eb);
        transition:border-color .12s ease, box-shadow .12s ease, transform .12s ease; }
      .wb-node:hover { border-color:color-mix(in srgb, var(--accent,#3b82f6) 45%, var(--line,#e5e7eb)); }
      .wb-node.is-active { border-color:var(--accent,#3b82f6);
        box-shadow:0 0 0 3px color-mix(in srgb, var(--accent,#3b82f6) 22%, transparent); }
      .wb-node-kind { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint,#9ca3af); }
      .wb-node-val { font-size:14px; font-weight:600; color:var(--fg,#e5e7eb); }
      /* Inbound/outbound ports — small circles centred on the node's side edges. */
      .wb-port { position:absolute; top:50%; width:9px; height:9px; border-radius:999px;
        background:var(--bg,#0e0e10); border:1.5px solid var(--dim,#6b7280); transform:translateY(-50%); }
      .wb-port-in { left:-5px; }
      .wb-port-out { right:-5px; }
      .wb-node.is-active .wb-port { border-color:var(--accent,#3b82f6); }
      /* Connector: a line between two nodes with an arrowhead at its end. */
      .wb-edge { position:relative; flex:0 0 2.75rem; height:2px; background:var(--line,#e5e7eb); }
      .wb-edge::after { content:""; position:absolute; right:-1px; top:50%; transform:translateY(-50%);
        border-top:5px solid transparent; border-bottom:5px solid transparent;
        border-left:7px solid var(--line,#e5e7eb); }

      /* Background-music (muzak) top-bar toggle. */
      .muzak-btn, .notify-btn, .add-btn { display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px;
        border:0; border-radius:8px; background:var(--bg-elev,#1a1a1d); cursor:pointer;
        color:var(--accent,#3b82f6); font-size:15px; line-height:1;
        transition:background .12s ease, color .12s ease, opacity .12s ease; }
      .muzak-btn:hover, .notify-btn:hover, .add-btn:hover { background:color-mix(in srgb, var(--accent,#3b82f6) 18%, var(--bg-elev,#1a1a1d)); }
      .muzak-btn.is-off { color:var(--faint,#9ca3af); opacity:.7; }
      .muzak-btn.relative { position:relative; }
      .notify-badge { position:absolute; top:-3px; right:-3px; min-width:15px; height:15px; padding:0 3px;
        display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; line-height:1;
        color:#fff; background:var(--down,#dc2626); border-radius:999px; }
      .set-range { width:11rem; accent-color:var(--accent,#3b82f6); cursor:pointer; }
      /* Dashboard To-do widget inline complete checkbox. */
      .dash-check { flex:none; width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center;
        background:transparent; border:0; cursor:pointer; color:var(--dim,#6b7280); font-size:15px; line-height:1; }
      .dash-check[aria-checked="true"] { color:var(--up,#16a34a); }
      .dash-check:hover { color:var(--accent,#3b82f6); }
      /* In-app modal dialogs (C42) — replaces native prompt/confirm/alert. */
      .cf-dialog-backdrop { position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; padding:1rem; }
      .cf-dialog-scrim { position:absolute; inset:0; background:rgba(0,0,0,.45); }
      .cf-dialog { position:relative; z-index:1; width:min(28rem,100%); background:var(--bg-card,#fff);
        border:1px solid var(--line,#e5e7eb); border-radius:14px; box-shadow:0 12px 40px rgba(0,0,0,.3); padding:1.25rem 1.25rem 1rem; }
      .cf-dialog-title { font-family:var(--font-display),'Fraunces',serif; font-size:1.05rem; font-weight:600; margin:0 0 .35rem; }
      .cf-dialog-msg { color:var(--text,inherit); margin:0 0 .9rem; line-height:1.5; }
      .cf-dialog-input { width:100%; margin-bottom:1rem; }
      .cf-dialog-actions { display:flex; justify-content:flex-end; gap:.5rem; }
      .btn-danger { background:var(--down,#dc2626); border-color:var(--down,#dc2626); color:#fff; }
      .btn-danger:hover { filter:brightness(1.05); }
      .row.subtask { border-left:2px solid var(--line,#e5e7eb); }
      .rule-grip { display:inline-flex; align-items:center; color:var(--faint,#9ca3af); cursor:grab; flex:none; margin-right:.25rem; }
      .row[draggable="true"]:active { cursor:grabbing; }

      /* ============================================================
         RESPONSIVE / MOBILE — L11, L32, L33, L36 (2026-06-23)
         ============================================================ */

      /* --- 1. Tap targets (L11/L36) ---
         On narrow phones every interactive control should clear the
         WCAG 2.5.5 / 44px touch-target recommendation. We grow hit
         areas with padding/min-height only; visual chrome is unchanged
         on desktop. */
      @media (max-width: 640px) {
        /* Primary action buttons */
        .btn {
          min-height: 44px;
          padding-top: clamp(0.5rem, 1.5vw, 0.75rem);
          padding-bottom: clamp(0.5rem, 1.5vw, 0.75rem);
          padding-left: clamp(0.6rem, 2vw, 1rem);
          padding-right: clamp(0.6rem, 2vw, 1rem);
        }
        /* Form fields */
        .field { min-height: 44px; }
        /* Nav items in the top bar */
        .nav-link { min-height: 44px; padding-left: 0.75rem; padding-right: 0.75rem; display: inline-flex; align-items: center; }
        /* Icon-only action buttons in rows (edit/delete/overflow ⋯) */
        .btn-icon, .btn-del, .td-actions .btn {
          min-width: 44px;
          min-height: 44px;
        }
        /* Cleared-toggle and row checkbox */
        .txn-table .clr-toggle,
        .txn-table .td-select .check {
          min-width: 44px;
          min-height: 44px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        /* Pagination controls */
        .data-pager .btn { min-height: 44px; min-width: 44px; }
        /* Segmented-control buttons (resolution picker) */
        .seg-btn { min-height: 44px; padding-left: 0.85rem; padding-right: 0.85rem; }
        /* Stepper prev/next */
        .rstep { min-width: 44px; min-height: 44px; }
        /* Gear / settings inline buttons */
        .gear-inline, .gear-abs { min-width: 44px; min-height: 44px; }
      }

      /* --- 2. Period/date controls (L11/L32) ---
         On phones the resolution+jump+stepper bar should condense
         without dominating the viewport. */
      @media (max-width: 640px) {
        /* Shrink button text in resolution segmented control */
        .seg-btn { font-size: 0.8rem; }
        /* Range label: allow shrink/ellipsis instead of forcing wide pill */
        .rlabel {
          min-width: 0;
          max-width: 8rem;
          text-overflow: ellipsis;
          overflow: hidden;
          white-space: nowrap;
          font-size: 0.75rem;
        }
        /* topbar control cluster wraps tidily */
        .topbar { row-gap: 0.5rem; }
        .topbar-controls { row-gap: 0.5rem; }
        /* reso-control: wrap onto its own line, allow children to shrink */
        .reso-control {
          flex-wrap: wrap;
          gap: 0.4rem;
          width: 100%;
        }
        /* rcap "WEEK / MTH / QTR" uppercase labels hidden to save space */
        .rcap { display: none; }
      }

      /* --- 3. Bottom nav / mobile tab bar (L11) ---
         .mobile-tabbar is the CSS hook for a fixed bottom strip on phones.
         The Go agent wires the markup; these styles make it work.
         Completely removed from layout on desktop/tablet. */
      .mobile-tabbar {
        display: none; /* hidden on desktop */
      }
      @media (max-width: 640px) {
        .mobile-tabbar {
          display: flex;
          position: fixed;
          bottom: 0; left: 0; right: 0;
          z-index: 20;
          background: var(--bg-elev, #1a1a1d);
          border-top: 1px solid var(--border, #2a2a2c);
          /* dvh-aware padding clears iOS home indicator */
          padding-bottom: env(safe-area-inset-bottom, 0px);
          height: calc(56px + env(safe-area-inset-bottom, 0px));
          align-items: stretch;
          justify-content: space-around;
        }
        .mobile-tabbar .tab-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 0.18rem;
          flex: 1;
          min-width: 44px;
          min-height: 44px;
          background: transparent;
          border: 0;
          color: var(--text-dim, #ababb3);
          font: inherit;
          font-size: 0.65rem;
          letter-spacing: 0.02em;
          cursor: pointer;
          transition: color 0.12s ease;
          padding: 0;
        }
        .mobile-tabbar .tab-item.active { color: var(--accent, #2e8b57); }
        .mobile-tabbar .tab-item:hover  { color: var(--text, #f4f4f5); }
        .mobile-tabbar .tab-icon {
          font-size: 1.15rem;
          line-height: 1;
        }
        /* Push page content above the tab bar */
        .app { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)); }
      }

      /* --- 4. Touch chrome — hide drag/resize handles (L11/L33) ---
         Bento drag handles and resize handles are desktop interactions.
         Hide them on touch-primary devices and below the phone breakpoint. */
      @media (hover: none), (max-width: 640px) {
        /* Bento resize handles */
        .rz { display: none !important; }
        /* Drag-grip icon inside widget headers */
        .ghandle, .grip { display: none !important; }
        /* "Reset layout" bento config button */
        .bento-reset-btn { display: none !important; }
      }

      /* --- 5. Splash overlay (L2/L3/L6/L11/L12) ---
         The JS adds .hidden → opacity 0 + pointer-events:none,
         then sets display:none after transitionend (700 ms fallback).
         Belt-and-suspenders: the moment .hidden is applied the splash
         drops out of the stacking context (z-index:-1) and loses all
         pointer events, so it can never cover content even mid-fade.
         Once display:none is written inline the element is fully inert. */
      #boot.hidden {
        pointer-events: none !important;
        z-index: -1 !important;
      }
      /* Covers the window between .hidden added and transitionend firing */
      #boot[style*="display: none"],
      #boot[style*="display:none"] {
        display: none !important;
        pointer-events: none !important;
        z-index: -1 !important;
      }
      /* Extra guard: if #app has children the splash is definitively gone.
         (CSS :has() is supported in all modern browsers; graceful no-op
          in legacy engines where the splash JS already handles it.) */
      #app:not(:empty) ~ #boot,
      body:has(#app:not(:empty)) #boot:not(.hidden) {
        pointer-events: none !important;
        z-index: -1 !important;
      }

      /* --- 6a. Labeled form fields (L37/L41) ---
         labeledField() in accounts.go / goals.go wraps each control in a
         <label class="labeled-field"> with a visible <span> caption above it.
         Without explicit CSS the caption could be clipped by the form-grid's
         minmax columns at ~1280 px.  Fix: flex-column layout so the caption
         always occupies its own line (no width constraint that would truncate
         it), and white-space:normal so the text wraps instead of overflowing. */
      .labeled-field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        width: 100%;
        min-width: 0;
      }
      .labeled-field .t-caption {
        white-space: normal;          /* allow wrap — never clip the label */
        overflow-wrap: break-word;
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.3;
      }
      .labeled-field .field {
        width: 100%;
        min-width: 0;
      }

      /* --- 6b. Split-screen layout (L2 dead space) ---
         The /split page renders cards with a .form-grid inside the standard
         .page (max-width 1040 px).  A 3-field form grid at full width looks
         sparse and leaves lots of empty space.  Constrain the .form-grid
         inside a .card to a comfortable reading width so the form feels
         intentional rather than under-filled.  Capped at 660px — wide enough
         for 3 columns of fields but not the full page width. */
      .card > .form-grid {
        max-width: 660px;
      }
      /* On the split page the member checkboxes + settle-up rows are not form
         grids, so they expand naturally.  The action buttons row should also
         stay left-aligned without extra constraint. */
      .card > .form-grid + * {
        max-width: none;
      }

      /* --- 6c. Fluid type / gaps (L11) ---
         clamp() scaling between 390 px phone and 1040 px desktop;
         dvh/svh where the context is the viewport height. */
      .page {
        padding-left: clamp(0.75rem, 3vw, 1.25rem);
        padding-right: clamp(0.75rem, 3vw, 1.25rem);
        padding-top: clamp(1rem, 3dvh, 1.75rem);
        padding-bottom: clamp(2rem, 5dvh, 4rem);
      }
      .page-title { font-size: clamp(1.25rem, 4vw, 1.6rem); }
      .card { padding: clamp(0.75rem, 2.5vw, 1.25rem); }
      .topbar { min-height: clamp(3rem, 6svh, 3.5rem); }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-card">
        <div class="boot-mark">
          <svg class="boot-ring" viewBox="0 0 64 64" aria-hidden="true">
            <circle class="boot-ring-track" cx="32" cy="32" r="28" />
            <circle class="boot-ring-arc" cx="32" cy="32" r="28" />
          </svg>
          <span class="boot-c">C</span>
        </div>
        <div class="boot-word">CashFlux</div>
        <div class="boot-sub">Getting your money in order…</div>
      </div>
    </div>
    <div id="app"></div>
    <div id="boot-error"></div>
    <button id="installBtn" type="button"
      style="display:none; position:fixed; bottom:1rem; right:1rem; z-index:30;
             padding:0.55rem 1rem; border-radius:4px; cursor:pointer; font: inherit; font-size:0.9rem;
             background:#1f2c24; border:1px solid #356b50; color:#7fd0a3;">Install CashFlux</button>

    <script>
      // PWA install prompt: surface an Install button when the browser offers one.
      (function () {
        var deferred = null;
        var btn = document.getElementById("installBtn");
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferred = e;
          if (btn) btn.style.display = "block";
        });
        if (btn) {
          btn.addEventListener("click", function () {
            if (!deferred) return;
            deferred.prompt();
            deferred.userChoice.then(function () {
              deferred = null;
              btn.style.display = "none";
            });
          });
        }
        window.addEventListener("appinstalled", function () {
          if (btn) btn.style.display = "none";
        });
      })();
    </script>

    <!-- D3 (pinned) + the chart shim the Go ui.Chart component drives. Loaded
         before the wasm boot so window.cashfluxRenderChart exists by first paint;
         both are service-worker cached for offline use. -->
    <!-- D3 vendored locally (C44): no third-party CDN, no SRI gap, works offline. -->
    <script src="./d3.min.js"></script>
    <script src="./chart.js"></script>
    <script src="./flip.js"></script>
    <!-- Calming background music ("muzak"): low-volume looping ambient player. -->
    <script src="./muzak.js"></script>
    <!-- Mermaid diagrams (C70): vendored locally (no CDN, C44) + its shim. -->
    <script src="./mermaid.min.js"></script>
    <script src="./mermaid.js"></script>

    <!-- Markdown rendering for Insights chat (vendored locally, no CDN, C44):
         marked parses Markdown, DOMPurify sanitizes the result before it's set
         as innerHTML, so model-authored text can't inject active markup. -->
    <script src="./marked.min.js"></script>
    <script src="./purify.min.js"></script>

    <script src="./wasm_exec.js"></script>
    <script>
      (function () {
        const boot = document.getElementById("boot");
        const app = document.getElementById("app");
        const errorBox = document.getElementById("boot-error");

        // Dismiss the boot splash once the app has rendered. We fade it (CSS) AND
        // then pull it out of the layer (display:none) so a slow or interrupted
        // transition can never leave a translucent #boot stuck over the app — the
        // lingering-splash bug seen across /planning, /split, /goals, /documents.
        function hideBoot() {
          if (!boot || boot.classList.contains("hidden")) return;
          if (app) app.classList.add("app-enter");
          boot.classList.add("hidden");
          var remove = function () { boot.style.display = "none"; };
          boot.addEventListener("transitionend", remove, { once: true });
          setTimeout(remove, 700); // fallback if transitionend never fires
        }

        if (app) {
          if (app.children.length > 0) {
            hideBoot(); // content already mounted before this script ran
          } else if (typeof MutationObserver === "function") {
            const obs = new MutationObserver(function () {
              if (app.children.length > 0) {
                hideBoot();
                obs.disconnect();
              }
            });
            obs.observe(app, { childList: true });
          }
          // Safety net: never let the splash outlive the boot, even if a re-mount
          // races the observer.
          setTimeout(function () { if (app.children.length > 0) hideBoot(); }, 4000);
        }

        if (typeof Go !== "function") {
          errorBox.style.display = "block";
          errorBox.textContent = "wasm_exec.js failed to load (Go runtime glue missing).";
          return;
        }

        // Register the service worker for offline/installability (best-effort).
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./sw.js").catch(function () {});
          });
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("./bin/main.wasm"), go.importObject)
          .then(function (result) { go.run(result.instance); })
          .catch(function (err) {
            errorBox.style.display = "block";
            errorBox.textContent = "Failed to start CashFlux wasm app:\n" + String(err);
            console.error(err);
          });
      })();
    </script>
  </body>
</html>
