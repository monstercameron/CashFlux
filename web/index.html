<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App base href, set before any relative asset is referenced, so a deep-link
         refresh (e.g. /p/taxes) resolves ./wasm_exec.js, ./bin/main.wasm, etc. to
         the app root instead of the current route's directory. On a *.github.io
         project site the app lives under /<repo>/, so derive the base from the
         first path segment there; everywhere else (local dev, custom domain) it's
         the server root. Must run first in <head>. -->
    <!-- STATIC base so the browser's preload scanner (which does not execute
         scripts) resolves ./assets against the server root, not the current SPA
         route's directory. A dynamically document.write()'n base was invisible to
         the scanner, so deep links like /p/<slug> fetched /p/d3.min.js → 404. The
         script below only *adjusts* this for *.github.io project sites (/<repo>/). -->
    <base href="/" />
    <script>
      (function () {
        if (location.hostname.endsWith("github.io")) {
          var seg = location.pathname.split("/")[1];
          if (seg) document.querySelector("base").setAttribute("href", "/" + seg + "/");
        }
      })();
    </script>

    <script>
      /* GX9-F3: apply the saved theme synchronously BEFORE the boot splash paints, so
         a light-mode user never sees a dark flash on cold start (WASM applies the theme
         too late, after mount). Mirrors uistate.resolveTheme: theme field on the
         cashflux:prefs store; "system" follows the OS color scheme. */
      (function () {
        try {
          var t = "dark", raw = localStorage.getItem("cashflux:prefs");
          if (raw) { var p = JSON.parse(raw); if (p && p.theme) t = p.theme; }
          if (t === "system") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) { /* default dark */ }
      })();
    </script>

    <title>CashFlux — Local-first household budgeting</title>

    <!-- SEO + link-share previews (C6). Copy mirrors manifest.webmanifest. og:image is the
         512px brand PNG (rasterized from favicon.svg) — social scrapers need a raster image. -->
    <meta name="description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights. Your data stays on your device." />
    <meta property="og:title" content="CashFlux" />
    <meta property="og:description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CashFlux" />
    <meta property="og:image" content="./icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CashFlux" />
    <meta name="twitter:description" content="Local-first, household-aware budgeting suite — budgeting, planning, goals, and AI insights." />
    <meta name="twitter:image" content="./icon-512.png" />

    <!-- Brand icons (on-brand green "C" mirroring .brand-mark). SVG for crisp tabs; PNGs
         (rasterized from the SVG) for iOS home-screen + maskable PWA install (C306). -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="mask-icon" href="./favicon.svg" color="#2e8b57" />

    <!-- PWA: installable, standalone, dark theme -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Design system (candidate C): Inter for UI, Fraunces for display headings + figures -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN removed (C91): all utility classes are now emitted by the typed
         Go `tw`/css vocabulary at runtime into <style id="gwc-css">. No external CSS
         dependency, works offline. The former tailwind.config palette/type tokens live
         in internal/ui/tw (exact hex) + the :root CSS variables below. -->

    <style>
      :root {
        /* Retargeted to the candidate-C palette so the legacy screen components
           (cards, stats, rows, forms) match the new bento shell. */
        --bg: #0e0e0f;
        --bg-elev: #1a1a1d;
        --bg-card: #121214;
        --border: #2a2a2c;
        --text: #f4f4f5;
        --text-dim: #ababb3;
        --text-faint: #888890;
        --accent: #2e8b57;
        --accent-dim: #1f2c24;
        --brand: #7c83ff;
        --danger: #d8716f;
        --radius: 0px;
        /* Theme native form controls (date-picker calendar icon, select dropdowns,
           scrollbars) to the dark palette. Without this the native date input's
           calendar indicator renders black on the dark #202022 field — near-invisible.
           The [data-theme="light"] block flips this back to light. */
        color-scheme: dark;
        /* Default type tokens (B20). The theme engine overrides these on :root;
           consumers keep a static fallback chain after var() so text still
           renders if a chosen font fails to load. */
        --font-ui: Inter;
        --font-display: 'Fraunces';
        /* Optional dashboard banner (B20). --banner-bg is the background image /
           gradient; the band is shown only when data-banner="on". */
        --banner-bg: none;
        /* Icon line weight (B13). The theme engine overrides this; the inline
           default keeps icons crisp before the engine applies. */
        --icon-stroke: 1.6;
      }

      /* Dashboard banner band (B20): a decorative full-width header strip above
         the bento grid. Collapsed (not rendered) unless a banner is chosen. */
      .app-banner { display: none; }
      :root[data-banner="on"] .app-banner {
        display: block; height: 132px; margin-bottom: 1rem;
        background-image: var(--banner-bg, none); background-size: cover; background-position: center;
        border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: inset 0 -44px 64px -34px rgba(0,0,0,0.55);
      }
      * { box-sizing: border-box; }
      /* Minimal Tailwind-preflight equivalent (C91): the Tailwind CDN used to ship
         a base reset; with the CDN gone we restore the rules the app relies on so
         layout/typography stay identical. Most important: block-level replaced
         elements (an inline <svg> otherwise leaves a baseline gap that overflows
         tight tiles like the net-worth trend chart). */
      *, ::before, ::after { border-width: 0; border-style: solid; border-color: currentColor; }
      img, svg, video, canvas, audio, iframe, embed, object { display: block; vertical-align: middle; }
      img, video { max-width: 100%; height: auto; }
      button, input, optgroup, select, textarea { font-family: inherit; font-feature-settings: inherit; font-size: 100%; font-weight: inherit; line-height: inherit; color: inherit; margin: 0; padding: 0; }
      button, select { text-transform: none; }
      button, [type='button'], [type='reset'], [type='submit'] { -webkit-appearance: button; background-color: transparent; background-image: none; cursor: pointer; }
      :-moz-focusring { outline: auto; }
      h1, h2, h3, h4, h5, h6 { font-size: inherit; font-weight: inherit; }
      a { color: inherit; text-decoration: inherit; }
      ol, ul, menu { list-style: none; margin: 0; padding: 0; }
      p, h1, h2, h3, h4, h5, h6, blockquote, figure, pre, fieldset, hr { margin: 0; }
      table { border-collapse: collapse; }
      html, body { margin: 0; height: 100%; }
      /* On-brand text selection: an accent-tinted highlight that keeps the text color
         (so selected amounts/labels stay readable) instead of the off-brand OS default.
         color-mix keeps it theme- and custom-accent-aware; works in light and dark. */
      ::selection { background: color-mix(in srgb, var(--accent) 28%, transparent); color: var(--text); }
      ::-moz-selection { background: color-mix(in srgb, var(--accent) 28%, transparent); color: var(--text); }
      body {
        font-family: var(--font-ui), Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        /* Default density rebalanced down (C25): the out-of-the-box 16px/1.5 read
           too heavy for a dense finance app. The Fraunces display figures keep
           their explicit sizes, so the data accents stay prominent. The Compact
           toggle and Display scale remain as further levers on top of this. */
        font-size: 14.5px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }

      /* Print / save-to-PDF (statements, reports, ledgers). With no @media print rules,
         printing output the dark UI + nav rail + topbar + banners (ink-heavy, unreadable).
         Force an ink-friendly light palette regardless of the active theme (override the
         theme engine's INLINE --* vars with !important on <html>), keep semantic accent/
         danger colors, hide the app chrome, let the content flow across pages, and keep
         cards from splitting mid-page. */
      @media print {
        html {
          --bg: #fff !important; --bg-base: #fff !important; --bg-card: #fff !important;
          --bg-elev: #f6f6f6 !important; --border: #ccc !important;
          --text: #111 !important; --text-dim: #333 !important; --text-faint: #555 !important;
          color-scheme: light !important;
        }
        body { background: #fff !important; }
        /* The shell/main/page wrappers AND the bento widgets (.w) bake a dark bg via the
           hardcoded tw palette (BgBase #0e0e0f / BgTile #121214, not var(--bg-card)), so force
           the layout containers + widgets white — else the whole dashboard prints dark with
           dark-on-dark text. */
        .cf-shell, main, main.cf-scroll, #cf-page-view, .bento, .card-alert, .w, .bento .w { background: #fff !important; }
        /* Hide app chrome + interactive-only bits — print just the statement content.
           The per-row Actions column and the select checkboxes are noise on paper. Form
           controls (the search box, filter selects) are interactive-only too — the ledger
           data is plain <td> text, not inputs, so hiding controls never drops statement data. */
        aside.rail, .rail, .topbar, .mobile-tabbar, .skip-link, .sample-banner,
        .app-banner, .toast, .reso-control, .home-hero-actions, .reports-export,
        input, select, textarea,
        /* Action buttons (Export CSV, Roll up sub-categories, Mark paid, Edit, …) are interactive-only
           clutter on paper. Hide every <button> EXCEPT .btn-link, which is how data labels (category /
           account drill names) render — those must stay in the printed statement. */
        button:not(.btn-link),
        .txn-table .td-actions, .txn-table th.td-actions,
        .txn-table .td-select, .txn-table th.td-select { display: none !important; }
        /* Let the scrolling shell flow naturally across printed pages. */
        .cf-shell { display: block !important; height: auto !important; overflow: visible !important; }
        main.cf-scroll { overflow: visible !important; height: auto !important; }
        /* Clean blocks that don't split across a page break. */
        .card, .reports-hero, .w, .home-hero {
          box-shadow: none !important; break-inside: avoid; page-break-inside: avoid;
        }
        /* Keep each ledger row whole across page breaks; let table headers repeat. */
        .txn-table tr { break-inside: avoid; page-break-inside: avoid; }
        .txn-table thead { display: table-header-group; }
        @page { margin: 1.5cm; }
      }

      /* Boot loader: an on-brand animated mark while the wasm downloads and
         instantiates. Fades + lifts away once the app mounts. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: var(--bg); z-index: 10;
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      #boot.hidden { opacity: 0; transform: scale(1.03); pointer-events: none; }
      .boot-card { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
      .boot-mark { position: relative; width: 64px; height: 64px; display: grid; place-items: center; }
      .boot-ring { position: absolute; inset: 0; width: 64px; height: 64px; animation: boot-spin 1.15s linear infinite; }
      .boot-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
      .boot-ring-arc {
        fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
        stroke-dasharray: 70 126; stroke-dashoffset: 0;
      }
      .boot-c {
        font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 1.6rem;
        color: var(--text); line-height: 1; animation: boot-breathe 1.8s ease-in-out infinite;
      }
      .boot-word {
        font-family: "Fraunces", Georgia, serif; font-size: 1.15rem; font-weight: 600;
        letter-spacing: 0.01em; color: var(--text); opacity: 0; animation: boot-fade-up 0.6s ease 0.1s forwards;
      }
      .boot-sub {
        font-size: 0.82rem; color: var(--text-faint); opacity: 0;
        animation: boot-fade-up 0.6s ease 0.25s forwards;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-breathe { 0%,100% { opacity: 0.55; transform: scale(0.97); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes boot-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      /* GX9-F3/F4: light-mode splash variant — warm-white background + dark text so a
         returning light-mode user never sees a dark-on-light flash. The head <script>
         applies data-theme synchronously before first paint; these rules ensure the splash
         and its card surface match the saved preference immediately. */
      [data-theme="light"] #boot { background: #f7f6f3; }
      [data-theme="light"] .boot-card { background: transparent; }
      [data-theme="light"] .boot-c, [data-theme="light"] .boot-word { color: #1c1c1e; }
      [data-theme="light"] .boot-sub { color: #56565c; }
      [data-theme="light"] .boot-ring-track { stroke: #e4e2dd; }
      /* GX17-F6: boot-ring-arc stroke is var(--accent) which can disappear against a
         light background; pin to a visible mid-grey so the spinning arc is always legible
         in light mode regardless of the chosen accent colour. */
      [data-theme="light"] .boot-ring-arc { stroke: #56565c; }

      /* GX17-F1: insights "thinking" bubble — bg-black/4 is invisible on white; pin to
         the border surface colour so the bubble reads as a distinct card in light mode. */
      [data-theme="light"] .insights-thinking {
        background: var(--border, #e4e2dd);
        color: var(--text, #1c1c1e);
      }

      /* Display scale: zoom the whole app by the user's preference (default 1). */
      #app { zoom: var(--ui-scale, 1); }
      /* Skip-to-content link: off-screen until keyboard-focused. */
      .skip-link { position: absolute; left: 8px; top: -48px; z-index: 200; background: var(--bg-elev);
        color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.8rem;
        font-size: 13px; text-decoration: none; transition: top .12s ease; }
      .skip-link:focus { top: 8px; }
      @media (prefers-reduced-motion: reduce) { .skip-link { transition: none; } }
      /* Visible focus ring for keyboard users on every interactive element (both themes). */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
      [role="switch"]:focus-visible, [role="radio"]:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
      }
      /* App settle-in: a calm fade + slight lift/scale once mounted. */
      #app.app-enter { animation: app-settle 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
      @keyframes app-settle {
        from { opacity: 0; transform: translateY(10px) scale(0.992); }
        to   { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot, #boot.hidden { transition: opacity 0.2s ease; transform: none; }
        .boot-ring, .boot-c, .boot-word, .boot-sub, #app.app-enter { animation: none; opacity: 1; }
        /* No motion: the dialog appears in place (no flip/lift), the toast doesn't
           slide in, and the rail resizes instantly. */
        .flip-inner, .flip-backdrop { transition: none; }
        .toast { animation: none; }
        aside.rail { transition: none; }
        /* GX8-F1: the explicit list above missed ~20 interactive-element transitions
           (.btn, .w, .row, .nav-link, .seg-btn, .data-btn, etc.) which still animated
           under reduce. Universally neutralize TRANSITIONS (keyframe animations are
           already guarded individually above + via no-preference blocks). */
        *, *::before, *::after { transition-duration: 0.001ms !important; }
        /* WONDER: also zero the flourish transforms (not just timing) so reduced-motion
           users get no movement at all. */
        :root { --wonder-on: 0 !important; --wonder-lift: 0px !important; --wonder-press: 1 !important; --wonder-shadow: none !important; }
      }

      /* ============================ WONDER ============================
         Configurable animated flourishes, theme-engine driven. Tokens default
         here; the theme engine sets [data-wonder="off|subtle|full"] on <html>
         (exactly like data-theme / data-density) and — once GI0 is fixed — can
         emit --wonder-* via theme.CSSVars() for an editor intensity slider. Every
         flourish reads these tokens, so ONE dial scales the whole app. The
         --wonder-on multiplier (0..1) lets intensity scale transforms smoothly;
         reduced-motion forces everything off (above). See WONDER series in TODOS. */
      :root {
        --wonder-on: 1;                       /* master intensity multiplier 0..1 */
        --wonder-dur-fast: 110ms;
        --wonder-dur: 170ms;
        --wonder-dur-slow: 300ms;
        --wonder-ease: cubic-bezier(.2,.75,.2,1);
        --wonder-ease-out: cubic-bezier(.16,1,.3,1);
        --wonder-lift: 5px;                    /* hover rise distance (>=4px so the lift reads, W-1) */
        --wonder-press: .975;                  /* active/click scale */
        --wonder-shadow: 0 6px 22px rgba(0,0,0,.16);
      }
      [data-wonder="off"]    { --wonder-on: 0; --wonder-dur-fast: 0ms; --wonder-dur: 0ms; --wonder-dur-slow: 0ms; --wonder-lift: 0px; --wonder-press: 1; --wonder-shadow: none; }
      [data-wonder="subtle"] { --wonder-on: .55; --wonder-dur: 140ms; --wonder-lift: 1px; --wonder-press: .99; --wonder-shadow: 0 4px 14px rgba(0,0,0,.12); }
      /* default (no attribute) == [data-wonder="full"] uses the :root values. */

      /* W-1 · Card hover lift — clickable content cards rise + cast a soft shadow.
         translateY is scaled by --wonder-on so the intensity dial controls it. */
      .card { transition: transform var(--wonder-dur) var(--wonder-ease), box-shadow var(--wonder-dur) var(--wonder-ease), border-color var(--wonder-dur-fast) var(--wonder-ease); }
      .card:hover { transform: translateY(calc(-1 * var(--wonder-lift) * var(--wonder-on))); box-shadow: var(--wonder-shadow); }
      /* W-2 · Press feedback — interactive controls compress on click. Supersedes the
         older :active translateY with a cleaner scale; combine both for buttons. */
      .btn, .data-btn, .seg-btn, .add-item, .menu-btn, .icon-btn { transition: transform var(--wonder-dur-fast) var(--wonder-ease), background-color var(--wonder-dur-fast) ease, color var(--wonder-dur-fast) ease; }
      .btn:active, .data-btn:active, .seg-btn:active, .add-item:active, .menu-btn:active, .icon-btn:active, [role="button"]:active { transform: scale(var(--wonder-press)); }
      /* W-3 · Tile/widget hover lift — bento .w tiles rise + shadow on hover, mirroring
         .card (W-1). Excluded while dragging (.w.drag) so the ghost tile doesn't fight the
         drag transform. The transition extends the existing border-color transition on .w. */
      .w:not(.drag) { transition: transform var(--wonder-dur) var(--wonder-ease), box-shadow var(--wonder-dur) var(--wonder-ease), border-color .12s ease; }
      .w:not(.drag):hover { transform: translateY(calc(-1 * var(--wonder-lift) * var(--wonder-on))); box-shadow: var(--wonder-shadow); }
      /* W-4 · Row hover nudge — list rows shift 2px toward the reader on hover.
         Table rows (.txn-table .row) are excluded to preserve column alignment.
         translateX scaled by --wonder-on so off/subtle/reduced-motion all control it. */
      .row:not(.txn-table .row):hover { transform: translateX(calc(2px * var(--wonder-on))); }
      .row:not(.txn-table .row) { transition: background 0.12s ease, transform var(--wonder-dur-fast) var(--wonder-ease); }
      /* W-5 · Nav-item hover — subtle lift + icon micro-scale on .nv / .nav-link.
         Transform scaled by --wonder-on so the intensity dial + reduced-motion both zero it.
         Collapsed-rail flyout span is position:absolute so it is unaffected by translateY. */
      .nv { transition: transform var(--wonder-dur-fast) var(--wonder-ease), background var(--wonder-dur-fast) ease, color var(--wonder-dur-fast) ease, box-shadow var(--wonder-dur-fast) ease; }
      /* GD-15 / nav-pill polish: a 3px accent "you are here" bar on the active nav item. Drawn as an
         absolutely-positioned ::before (no layout shift) so it can GROW IN (scaleY) when an item becomes
         active, instead of the old box-shadow snapping between items. A true shared-indicator slide needs
         JS measurement (the framework's Style() drops CSS custom props), so each newly-active item's bar
         animates in on activation — tasteful, robust, theme-agnostic, and WONDER-gated. */
      aside.rail .nv { position: relative; }
      aside.rail .nv.active::before, aside.rail .nv[aria-current="page"]::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        background: var(--accent); border-radius: 0 2px 2px 0;
        animation: wonder-nav-bar-in var(--wonder-dur) var(--wonder-ease-out); }
      @keyframes wonder-nav-bar-in {
        from { transform: scaleY(calc(1 - 1 * var(--wonder-on))); opacity: calc(1 - 0.6 * var(--wonder-on)); }
        to   { transform: scaleY(1); opacity: 1; } }
      [data-wonder="off"] aside.rail .nv.active::before,
      [data-wonder="off"] aside.rail .nv[aria-current="page"]::before { animation: none; }
      @media (prefers-reduced-motion: reduce) {
        aside.rail .nv.active::before, aside.rail .nv[aria-current="page"]::before { animation: none; } }
      .nv:hover { transform: translateY(calc(-1px * var(--wonder-on))); }
      .nav-link { transition: background 0.12s, color 0.12s, transform var(--wonder-dur-fast) var(--wonder-ease); } /* extends GX8-F2 */
      .nav-link:hover { transform: translateY(calc(-1px * var(--wonder-on))); }
      /* Icon micro-scale: any svg/emoji inside the nav item gets a gentle scale on hover. */
      .nv:hover svg, .nv:hover .nav-icon { transform: scale(calc(1 + 0.06 * var(--wonder-on))); transition: transform var(--wonder-dur-fast) var(--wonder-ease); }

      /* W-6 hover transforms — placed here (early) only for :hover rules; the transition
         extensions are placed after the base rules further down so cascade order is correct. */
      .gear-inline:hover, .gear-abs:hover { transform: rotate(calc(38deg * var(--wonder-on))); color: #f4f4f5; }
      .add-btn:hover    { transform: scale(calc(1 + 0.12 * var(--wonder-on))); }
      .notify-btn:hover { transform: rotate(calc(18deg * var(--wonder-on))); }
      .muzak-btn:hover  { transform: scale(calc(1 + 0.08 * var(--wonder-on))); }

      /* W-20 · Focus-ring ease — `:focus-visible` ring fades in softly (≤120ms).
         We add a transition on outline-offset so the ring eases in from 0px to 2px.
         The ring remains fully visible (a11y preserved) — only the onset is eased. */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
      [role="switch"]:focus-visible, [role="radio"]:focus-visible {
        transition: outline-offset 100ms var(--wonder-ease), box-shadow 100ms var(--wonder-ease);
        outline-offset: 2px; /* unchanged — just now eased */
      }
      /* W-9 · Page-enter transition — new screen fades in + rises slightly on every
         route change. Duration is --wonder-dur-slow (300ms at full, 0ms at off).
         translateY uses --wonder-on multiplier so subtle/off scale it to zero.
         The .page-enter class is toggled by Go (pageenter.go) on each navigation
         via double-rAF so the browser restarts the keyframe cleanly from frame 0.
         Cold-boot is excluded: the UseEffect guard skips the first render. */
      @keyframes wonder-page-enter {
        from { opacity: 0; transform: translateY(calc(8px * var(--wonder-on))); }
        to   { opacity: 1; transform: none; }
      }
      #cf-page-view.page-enter {
        animation: wonder-page-enter var(--wonder-dur-slow) var(--wonder-ease-out) both;
      }
      [data-wonder="off"] #cf-page-view.page-enter { animation: none; }
      @media (prefers-reduced-motion: reduce) { #cf-page-view.page-enter { animation: none; } }

      /* W-10 · Route cross-fade via View Transitions API (progressive enhancement).
         Sets a named view-transition on #cf-page-view so the browser can snapshot
         old → new content when startViewTransition() is called. The Go side
         (pageenter.go) wraps the W-9 class-toggle in startViewTransition when the
         API is available and motion is on, giving the browser control of the
         cross-fade animation machinery.
         NOTE: because GWC's virtual-DOM render swap fires before the UseEffect hook,
         the outgoing page snapshot is already replaced when triggerPageEnter runs.
         The practical effect is that the View Transitions API handles the new-page
         appearance (the W-9 fade-rise) rather than a true old→new cross-fade. A true
         cross-fade would require a pre-render hook in the framework. This scaffold is
         progressive enhancement: browsers without the API degrade silently to W-9. */
      #cf-page-view {
        view-transition-name: cf-page;
      }
      @keyframes wonder-xfade-out {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
      @keyframes wonder-xfade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      ::view-transition-old(cf-page) {
        animation: wonder-xfade-out var(--wonder-dur, 160ms) var(--wonder-ease, ease) both;
      }
      ::view-transition-new(cf-page) {
        animation: wonder-xfade-in var(--wonder-dur, 160ms) var(--wonder-ease, ease) both;
      }
      /* Kill view transitions when wonder is off or reduced-motion. */
      [data-wonder="off"] #cf-page-view { view-transition-name: none; }
      @media (prefers-reduced-motion: reduce) {
        #cf-page-view { view-transition-name: none; }
        ::view-transition-old(cf-page),
        ::view-transition-new(cf-page) { animation: none; }
      }

      /* W-7 · Click ripple — a radial-gradient overlay scales from 0→2.2× on
         :active and fades back out on release; driven purely by CSS :active.
         scale(calc(2.2 * var(--wonder-on))) → 0 when off/reduced-motion.
         overflow:hidden clips the ripple; text stays inside the content box
         so no label clipping occurs. .add-item has no overflow-extending icons
         so hidden is safe there too. */
      .btn, .btn-primary, .set-btn.save, .data-btn, .add-item {
        position: relative; overflow: hidden;
      }
      .btn::after, .btn-primary::after, .set-btn.save::after, .data-btn::after, .add-item::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
        transform: scale(0); opacity: 0;
        transition: transform var(--wonder-dur) var(--wonder-ease-out),
                    opacity var(--wonder-dur) var(--wonder-ease-out);
        pointer-events: none; border-radius: inherit;
      }
      .btn:active::after, .btn-primary:active::after, .set-btn.save:active::after,
      .data-btn:active::after, .add-item:active::after {
        transform: scale(calc(2.2 * var(--wonder-on)));
        opacity: calc(1 * var(--wonder-on));
        transition-duration: 0ms;
      }

      /* W-17 · Success pulse — the ✓ glyph on success toasts pops in with a
         spring-scale (0.6→1.15→1) so the confirmation moment has delight.
         Error toasts (::before shows ⚠) are excluded; they get no animation.
         Duration = --wonder-dur-slow * --wonder-on → 0ms when off (instant/static). */
      @keyframes wonder-success-pulse {
        0%   { transform: scale(.6); opacity: .4; }
        60%  { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .toast:not(.toast-err)::before {
        animation: wonder-success-pulse calc(var(--wonder-dur-slow) * var(--wonder-on, 1)) var(--wonder-ease-out) both;
      }
      [data-wonder="off"] .toast:not(.toast-err)::before { animation: none; }
      @media (prefers-reduced-motion: reduce) { .toast:not(.toast-err)::before { animation: none; } }

      /* W-11 · List stagger — rows fade-rise in a fast cascade on first paint.
         Stagger caps at 8 items (≤320ms total) so long lists don't lag; nth-child > 8
         get delay 0 via the base rule and enter together. Disabled under off+reduce.
         Only non-table rows stagger (table rows excluded to preserve column alignment). */
      @keyframes wonder-row-enter {
        from { opacity: 0; transform: translateY(calc(6px * var(--wonder-on))); }
        to   { opacity: 1; transform: none; }
      }
      .rows .row:not(.txn-table .row),
      .list-rows .row:not(.txn-table .row) {
        animation: wonder-row-enter var(--wonder-dur) var(--wonder-ease-out) both;
      }
      .rows .row:nth-child(1):not(.txn-table .row),
      .list-rows .row:nth-child(1):not(.txn-table .row) { animation-delay: calc(0ms  + 0ms * var(--wonder-on)); }
      .rows .row:nth-child(2):not(.txn-table .row),
      .list-rows .row:nth-child(2):not(.txn-table .row) { animation-delay: calc(40ms * var(--wonder-on)); }
      .rows .row:nth-child(3):not(.txn-table .row),
      .list-rows .row:nth-child(3):not(.txn-table .row) { animation-delay: calc(80ms * var(--wonder-on)); }
      .rows .row:nth-child(4):not(.txn-table .row),
      .list-rows .row:nth-child(4):not(.txn-table .row) { animation-delay: calc(110ms * var(--wonder-on)); }
      .rows .row:nth-child(5):not(.txn-table .row),
      .list-rows .row:nth-child(5):not(.txn-table .row) { animation-delay: calc(140ms * var(--wonder-on)); }
      .rows .row:nth-child(6):not(.txn-table .row),
      .list-rows .row:nth-child(6):not(.txn-table .row) { animation-delay: calc(165ms * var(--wonder-on)); }
      .rows .row:nth-child(7):not(.txn-table .row),
      .list-rows .row:nth-child(7):not(.txn-table .row) { animation-delay: calc(190ms * var(--wonder-on)); }
      .rows .row:nth-child(8):not(.txn-table .row),
      .list-rows .row:nth-child(8):not(.txn-table .row) { animation-delay: calc(210ms * var(--wonder-on)); }
      [data-wonder="off"] .rows .row,
      [data-wonder="off"] .list-rows .row { animation: none; }
      @media (prefers-reduced-motion: reduce) {
        .rows .row, .list-rows .row { animation: none; }
      }

      /* W-12 · Card/bento entrance — dashboard tiles scale-in (0.98→1) + fade on mount.
         Plays once per load via @keyframes; scale uses --wonder-on so intensity dial works.
         Disabled under off+reduce. */
      @keyframes wonder-bento-enter {
        from { opacity: 0; transform: scale(calc(1 - 0.02 * var(--wonder-on))); }
        to   { opacity: 1; transform: none; }
      }
      .bento .w {
        animation: wonder-bento-enter var(--wonder-dur-slow) var(--wonder-ease-out) both;
      }
      [data-wonder="off"] .bento .w { animation: none; }
      @media (prefers-reduced-motion: reduce) { .bento .w { animation: none; } }

      /* W-13 · Modal/flip backdrop — on top of existing 3D flip, the backdrop now
         blur-eases in (blur 0→4px over --wonder-dur-slow) and the content stagger is
         addressed via the flip-inner scale (already .86→1 on .flipped which is a nice
         entrance). We layer a transition on backdrop-filter for the blur-in.
         Under off+reduce the existing `transition: none` on .flip-backdrop covers it. */
      .flip-backdrop {
        transition: opacity .28s var(--wonder-ease),
                    backdrop-filter var(--wonder-dur-slow) var(--wonder-ease-out);
        backdrop-filter: blur(0px);
      }
      .flip-backdrop.show {
        backdrop-filter: blur(calc(3px * var(--wonder-on)));
      }

      /* W-14 · Toast spring — replace the bare ease-out entrance with a spring
         cubic-bezier and add a smooth exit transition on opacity+transform.
         The existing toast-in keyframe is redefined here with spring easing.
         Exit is handled via the .toast.hide class (set by Go before removal). */
      @keyframes wonder-toast-in {
        from { opacity: 0; transform: translate(-50%, calc(0.6rem * var(--wonder-on))); }
        50%  { transform: translate(-50%, calc(-0.15rem * var(--wonder-on))); }
        to   { opacity: 1; transform: translate(-50%, 0); }
      }
      @keyframes toast-in {
        from { opacity: 0; transform: translate(-50%, calc(0.6rem * var(--wonder-on))); }
        50%  { transform: translate(-50%, calc(-0.15rem * var(--wonder-on))); }
        to   { opacity: 1; transform: translate(-50%, 0); }
      }
      .toast {
        animation: toast-in var(--wonder-dur-slow) cubic-bezier(.34,1.56,.64,1) both;
      }
      .toast.hide {
        animation: none;
        transition: opacity var(--wonder-dur-fast) var(--wonder-ease),
                    transform var(--wonder-dur-fast) var(--wonder-ease);
        opacity: 0;
        transform: translate(-50%, 0.3rem);
      }
      [data-wonder="off"] .toast { animation: none; }
      [data-wonder="off"] .toast.hide { transition: none; }
      @media (prefers-reduced-motion: reduce) { .toast { animation: none; } .toast.hide { transition: none; } }

      /* W-16 · Progress-bar fill ease — .bar-fill already has the eased width transition
         under no-preference. The goals page and allocate page use .bar-fill too and inherit
         the same rule. This comment documents the verification: all bar variants (.near,
         .over, .done, .final, .overdue, .soon, .storage-bar-fill) only change background
         colour — they share .bar-fill which already carries the width transition.
         No additional rules needed; this item is a pass-through verification. */

      /* W-19 · Skeleton shimmer — reusable loading placeholder. A shimmering gradient
         sweeps left-to-right over the block. Under reduce → static muted block, no sweep.
         Usage: add class="skeleton" (or "skeleton shimmer") to placeholder elements. */
      @keyframes wonder-shimmer {
        from { background-position: -200% 0; }
        to   { background-position: 200% 0; }
      }
      .skeleton {
        background: var(--bg-elev, rgba(255,255,255,0.04));
        border-radius: 6px;
        color: transparent !important;
        pointer-events: none;
      }
      .skeleton.shimmer,
      .shimmer {
        background: linear-gradient(
          90deg,
          var(--bg-elev, rgba(255,255,255,0.04)) 25%,
          rgba(255,255,255,0.08) 50%,
          var(--bg-elev, rgba(255,255,255,0.04)) 75%
        );
        background-size: 200% 100%;
        animation: wonder-shimmer calc(var(--wonder-dur-slow) * 4) linear infinite;
      }
      [data-wonder="off"] .shimmer,
      [data-wonder="off"] .skeleton.shimmer { animation: none; background: var(--bg-elev, rgba(255,255,255,0.04)); }
      @media (prefers-reduced-motion: reduce) {
        .shimmer, .skeleton.shimmer { animation: none; background: var(--bg-elev, rgba(255,255,255,0.04)); }
      }

      /* W-21 · Scroll-reveal — cards in long pages (Reports) fade + rise as they
         enter the viewport (IntersectionObserver in wonder.js). The JS adds the
         .wonder-reveal class to eligible cards THEN observes them, so content is
         always visible if JS fails or is blocked. The transition reads
         --wonder-dur-slow so off/subtle/full scale duration; --wonder-on scales
         the translateY lift so it zeroes out at intensity 0.
         Off + reduced-motion: wonder.js skips everything and reveals immediately. */
      .wonder-reveal {
        opacity: 0;
        transform: translateY(calc(14px * var(--wonder-on, 1)));
        transition: opacity var(--wonder-dur-slow) var(--wonder-ease-out),
                    transform var(--wonder-dur-slow) var(--wonder-ease-out);
        /* will-change: pre-promote so the first-frame composite avoids a repaint */
        will-change: opacity, transform;
      }
      .wonder-reveal.in-view {
        opacity: 1;
        transform: none;
      }
      /* Safety: if [data-wonder="off"] or prefers-reduced-motion, skip entirely
         (JS also bails early, but CSS is the last-resort guarantee). */
      [data-wonder="off"] .wonder-reveal,
      [data-wonder="off"] .wonder-reveal.in-view {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
        will-change: auto !important;
      }
      @media (prefers-reduced-motion: reduce) {
        .wonder-reveal,
        .wonder-reveal.in-view {
          opacity: 1 !important;
          transform: none !important;
          transition: none !important;
          will-change: auto !important;
        }
      }

      /* W-18 · Chart draw-in — line path strokes in left-to-right (stroke-dashoffset),
         area fill fades up. pathLength="1" on the SVG <path> normalises the dash
         geometry so the animation works regardless of actual path length.
         Under [data-wonder="off"] and prefers-reduced-motion: charts appear instantly. */
      @keyframes wonder-chart-draw {
        from { stroke-dashoffset: 1; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes wonder-chart-fade {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .wonder-chart-line {
        stroke-dasharray: 1;
        animation: wonder-chart-draw var(--wonder-dur-slow) var(--wonder-ease-out) both;
      }
      .wonder-chart-area {
        animation: wonder-chart-fade var(--wonder-dur-slow) var(--wonder-ease-out) both;
      }
      [data-wonder="off"] .wonder-chart-line,
      [data-wonder="off"] .wonder-chart-area { animation: none; }
      @media (prefers-reduced-motion: reduce) {
        .wonder-chart-line,
        .wonder-chart-area { animation: none; }
      }

      /* ========================== /WONDER ============================ */

      #boot-error {
        display: none; position: fixed; inset: auto 1rem 1rem 1rem; z-index: 20;
        background: #3b0d0d; color: #fecaca; border: 1px solid #7f1d1d;
        padding: 0.75rem 1rem; border-radius: 8px; font-family: ui-monospace, monospace;
        font-size: 0.8rem; white-space: pre-wrap;
      }

      /* App shell */
      .app { min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        position: sticky; top: 0; z-index: 5;
        display: flex; align-items: center; gap: 1.25rem;
        padding: 0.75rem 1.25rem; background: rgba(11,16,32,0.85);
        backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
        /* Wrap controls onto a second row when they don't fit, rather than
           turning a fixed-height header into a scroll container (C34). */
        flex-wrap: wrap; row-gap: 0.4rem; min-height: 3.5rem;
      }
      .topbar-controls { flex-wrap: wrap; row-gap: 0.4rem; }
      .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 800; white-space: nowrap; }
      .brand-mark {
        display: grid; place-items: center; width: 1.6rem; height: 1.6rem;
        background: var(--accent); color: #052e13; border-radius: 8px; font-weight: 900;
      }
      .brand-name { font-size: 1.05rem; letter-spacing: -0.01em; }
      .nav { display: flex; gap: 0.25rem; flex-wrap: nowrap; }
      .nav-link {
        appearance: none; border: 0; background: transparent; color: var(--text-dim);
        font: inherit; font-size: 0.9rem; padding: 0.4rem 0.7rem; border-radius: 8px;
        cursor: pointer; white-space: nowrap; transition: background 0.12s, color 0.12s; /* GX8-F2 */
      }
      .nav-link:hover { background: var(--bg-elev); color: var(--text); }
      .nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

      /* Page */
      .page { width: 100%; max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
      /* GX7-F1: on ultra-wide displays content sprawled to ~2320px, giving grotesque table column
         spacing + unreadable line lengths — so the content must be capped + centered. But capping
         `main` ITSELF made main the (narrow) scroll container, which parked the scrollbar at the
         content's right edge instead of the window edge — it floated ~120px (1920) to ~880px (3440)
         in from the right, reading as a "broken" scrollbar on large screens. Fix: keep `main`
         FULL-WIDTH (so it's the scroll container and its scrollbar sits at the window's right edge,
         the conventional fixed-sidebar layout) and cap + center main's CHILDREN (topbar, banner, the
         routed page) instead. Both topbar and page share the same 1440 column, so the gutters beside
         them stay empty — nothing shows through under the sticky bar. Gated ≥1441px; common widths
         untouched. (Supersedes the earlier .cf-shell centering, which put the scrollbar even further in.) */
      @media (min-width: 1441px) { main.cf-scroll > * { max-width: 1440px; margin-inline: auto; } }
      .page-head { margin-bottom: 1.5rem; }
      .page-title { margin: 0; font-size: 1.6rem; letter-spacing: -0.02em; }
      .page-sub { margin: 0.25rem 0 0; color: var(--text-dim); }

      /* Cards & bits */
      .card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      }
      /* Refined resting elevation (design pass 2026-06-24): give cards real depth instead of
         flat fills — a soft ambient shadow plus a hairline top highlight so surfaces read as
         layered, premium panels. WONDER hover still lifts further via --wonder-shadow (this is
         the resting state). Theme-aware: airy grey shadows on light, deeper shadows + a faint
         white top edge on dark. (Bento .w tiles are excluded — the drag/pack engine sets an
         inline box-shadow on them, so resting depth there belongs in the engine, not CSS.) */
      .card {
        box-shadow: 0 1px 1px rgba(0,0,0,0.20), 0 10px 26px -18px rgba(0,0,0,0.55),
                    inset 0 1px 0 rgba(255,255,255,0.035);
      }
      [data-theme="light"] .card {
        box-shadow: 0 1px 2px rgba(17,24,39,0.05), 0 12px 28px -20px rgba(17,24,39,0.16),
                    inset 0 1px 0 rgba(255,255,255,0.7);
      }
      /* Spending highlights (Insights anomaly cards) */
      .insight-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
      .insight-row { display: flex; align-items: flex-start; gap: 0.6rem; margin: 0; line-height: 1.45; }
      .insight-dot { flex: none; font-weight: 800; font-size: 1rem; line-height: 1.35; }
      /* Compact density: tighter cards, rows, and fields (set via data-density on <html>). */
      /* Section divider (G9): groups a long card scroll into labelled clusters
         (Spending / Income / Trends) so the page can be navigated, not just read
         top-to-bottom. An uppercase muted label with a hairline rule. */
      .section-divider { display: flex; align-items: center; gap: 0.6rem; margin: 1.6rem 0 0.6rem;
        font-size: 0.74rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
        /* --text-dim (not --text-faint): the divider eyebrow measured 3.69:1 on --text-faint (fails AA). */
        color: var(--text-dim); }
      .section-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
      .section-divider:first-child { margin-top: 0; }
      [data-theme="light"] .section-divider { color: #686870; }

      [data-density="compact"] .card { padding: 0.7rem 0.8rem; margin-bottom: 0.6rem; }
      [data-density="compact"] .card-title { margin-bottom: 0.45rem; }
      [data-density="compact"] .row { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      [data-density="compact"] .field, [data-density="compact"] .btn { padding-top: 0.35rem; padding-bottom: 0.35rem; min-height: 40px; }

      /* Light theme (set via data-theme="light" on <html>). Overrides the legacy
         palette variables, the shell's Tailwind utility colors, and the widgets'
         hardcoded surface hexes. The user accent (--accent) is left untouched. */
      /* GX14 SYSTEMIC ROOT FIX: internal/uistate/theme.go ApplyTheme writes the (dark,
         candidate-C) theme's surface/text tokens as INLINE custom properties on <html>
         via style.setProperty — REGARDLESS of the light/dark prefs. So data-theme="light"
         triggers the hex-pinned overrides, but every element using var(--bg-elev)/(--bg-card)/
         (--text) reads the INLINE DARK value and renders dark in light mode (the recurring
         shell/table/budgets "var resolves dark in light" class — GX1/GX3/GX13). The inline
         vars are set WITHOUT !important, so pinning the light token values with !important here
         (stylesheet-!important beats inline-non-important) fixes the WHOLE class in one place.
         The proper fix is GO-side (ApplyTheme should derive light tokens in light mode) — build-
         gated behind GI0; this is the landable mitigation. Trade-off: a user's CUSTOM theme
         surface colors won't apply in LIGHT mode while this is active (acceptable — light was
         broken before). --accent / --danger / --warn are intentionally NOT pinned. */
      /* GX14: these are now relaxed from !important. The theme engine emits a
         COMPLETE light-derived token set inline via ApplyTheme (CSSVars + the
         light-only --muted/--hover in derivedVars), so these serve only as the
         pre-wasm default that prevents a dark flash on first paint — and a custom
         light theme's own inline surfaces correctly win over them. */
      [data-theme="light"] {
        --bg: #f7f6f3; --bg-base: #f7f6f3; --bg-elev: #efede8; --bg-card: #ffffff;
        --border: #e4e2dd; --text: #1c1c1e; --text-dim: #56565c; --text-faint: #686870;
        --muted: #56565c; --accent-dim: #e4f3ea;
        --hover: #e8e6e1;
        color-scheme: light; /* native controls (date picker, dropdowns, scrollbars) light-themed */
      }
      [data-theme="light"] .bg-base { background-color: #f7f6f3; }
      [data-theme="light"] .bg-tile { background-color: #ffffff; }
      [data-theme="light"] .bg-hover, [data-theme="light"] .hover\:bg-hover:hover { background-color: #efede8; }
      [data-theme="light"] .text-fg { color: #1c1c1e; }
      [data-theme="light"] .text-dim { color: #56565c; }
      [data-theme="light"] .text-faint { color: #686870; }
      /* The bright --warn amber (#cfa14e/#e0a93b) is ~2.2:1 on white. Warning TEXT in
         light mode uses a darker amber-brown so it clears AA; the bright amber stays
         for fills/icons (bg-warn) where contrast isn't a text concern. */
      [data-theme="light"] .text-warn { color: #8a6a16; }
      /* Bills calendar weekday headers (.cal-head) read var(--text-faint); in light the
         theme engine's runtime --text-faint resolves to a too-pale #969698 (≈1.6:1 on
         the white card — fails AA). Pin to the palette's intended faint tone #686870
         (≈5:1) so "Sun…Sat" stay legible. Scoped to .cal-head only — does NOT touch the
         systemic --text-faint token (its light derivation is separate GX14/Go work). */
      [data-theme="light"] .cal-head { color: #686870; }
      /* Legacy components read var(--text)/(--text-dim), but the theme engine emits
         those as runtime vars that can outrank the [data-theme="light"] palette
         override — so in light mode a card title or category name could keep the
         dark theme's near-white --text and vanish on a white card (G9 measured
         rgb(244,244,245) on white). Pin the COLOR directly (not via the var) under
         data-theme="light" so these always read on white, whatever --text resolves
         to. This is the definitive fix for the recurring G4–G11 light-mode finding. */
      [data-theme="light"] .card-title, [data-theme="light"] .page-title,
      [data-theme="light"] .row-desc, [data-theme="light"] .stat-value,
      [data-theme="light"] .budget-amount,
      [data-theme="light"] .amount:not(.amount-income):not(.amount-expense),
      [data-theme="light"] .budget .row-desc { color: #1c1c1e; }
      /* GX13-F3: budget category names render as <button class="row-desc budget-drill"> —
         the button node wasn't covered and inherited near-white. Pin it. */
      [data-theme="light"] .budget-drill, [data-theme="light"] button.row-desc { color: #1c1c1e !important; }
      /* GX13-F1/F2: progress-bar tracks (.bar) and stat tiles (.stat) read a runtime
         --bg-elev/--bg-card that resolved DARK in light on this screen. Pin light surfaces. */
      [data-theme="light"] .bar { background: #efede8 !important; border-color: #e4e2dd !important; }
      [data-theme="light"] .stat { background: #ffffff !important; border-color: #e4e2dd; }
      /* GX16-F2/F3/F4: chart surfaces that bypass the token system in light. Reports hero
         secondary stat values + hero card bg were near-white/dark; mermaid/Sankey node
         <text> has no fill attr and inherited near-white → invisible on white. */
      [data-theme="light"] .hero-stat-value { color: #1c1c1e !important; }
      [data-theme="light"] .reports-hero { background: #ffffff !important; border-color: #e4e2dd; }
      [data-theme="light"] svg[id^="cf-mmd"] text, [data-theme="light"] .mermaid text { fill: #1c1c1e !important; }
      /* D3 charts (.cf-chart, web/chart.js) bake their text `fill` from the runtime
         --text/--text-dim/--text-faint tokens AT RENDER TIME and do not re-render on a
         theme switch — so axis ticks, category labels, the donut center total + its
         legend (labels/percentages) keep the dark near-white value and vanish on the
         white card in light mode (measured rgb(244,244,245) on bgLum 255, Δ=11). CSS
         `fill` outranks the baked SVG `fill=""` attribute (same mechanism as the mermaid
         pin above), so pin chart text dark in light mode; keep axis ticks a dimmer tone
         so the chrome stays quieter than the data labels. Proper fix is GO-side
         (re-render charts on theme change) — tracked as a G9.1a follow-up. */
      [data-theme="light"] .cf-chart text { fill: #1c1c1e !important; }
      [data-theme="light"] .cf-chart .x-axis text,
      [data-theme="light"] .cf-chart .y-axis text { fill: #686870 !important; }
      /* GX13-F5: budget row separators (.budget border-top) used var(--border) which resolved dark in light. */
      [data-theme="light"] .budget { border-color: #e4e2dd; }
      [data-theme="light"] .muted, [data-theme="light"] .row-meta,
      [data-theme="light"] .budget-sub,
      [data-theme="light"] .stat-label, [data-theme="light"] .page-sub,
      [data-theme="light"] .set-label, [data-theme="light"] .t-caption { color: #3c3c43; }
      [data-theme="light"] .border-line, [data-theme="light"] .border-r, [data-theme="light"] .border-b { border-color: #e4e2dd; }
      [data-theme="light"] .bg-\[\#1c1c1e\] { background-color: #ececec; color: #1c1c1e; }
      [data-theme="light"] .bg-fg { background-color: #1c1c1e; }
      [data-theme="light"] .text-base { color: #f7f6f3; }
      /* G22 CRITICAL: custom widget tile header text was near-white (rgb(244,244,245)) on a
         white tile background — ~1.05:1 ratio, completely invisible. Pin .wh headings to
         the darkest foreground token so the title is always readable. */
      [data-theme="light"] .wh h2, [data-theme="light"] .wh h3 { color: #1c1c1e; }
      /* GX11-F3: the clickable-title variant (.wh-title button) was NOT covered by the
         h2/h3 override above and inherited near-white text → invisible on the white .w
         tile in light. Pin it dark too. */
      [data-theme="light"] .wh .wh-title { color: #1c1c1e; }
      [data-theme="light"] .wh .grip { color: #6a6a72; }
      /* GX11-F2: widget containers (.w) are already overridden below, but belt-and-suspenders
         explicit --bg-card surface ensures tiles read as elevated cards in light. */
      [data-theme="light"] .w { background: var(--bg-card, #ffffff) !important; border-color: #e4e2dd; }
      /* GX11-F4: bento items have padding managed inside .wh/.wbody; ensure no extra
         outer padding gap makes them inconsistent — reset outer container padding. */
      [data-theme="light"] .bento > .w { padding: 0; }
      /* GX11-F1: alert chips (.attention-item) had transparent bg — first chip especially
         lacked fill + correct text color in light (white-on-white). Give every chip a solid
         card surface and pin text dark in light. */
      [data-theme="light"] .attention-item { background: var(--bg-card, #ffffff); color: #1c1c1e; border-color: #e4e2dd; }
      /* GX11-F5: is-critical/is-warning chips in light mode showed a colored border on a
         transparent bg (empty error-box look). Pair the border with a faint danger/warn tint. */
      [data-theme="light"] .attention-item.is-critical { background: color-mix(in srgb, var(--down, #dc2626) 6%, #ffffff); border-color: color-mix(in srgb, var(--down, #dc2626) 30%, #e4e2dd); }
      [data-theme="light"] .attention-item.is-warning { background: color-mix(in srgb, var(--warn, #d97706) 6%, #ffffff); border-color: color-mix(in srgb, var(--warn, #d97706) 30%, #e4e2dd); }
      /* G22 CRITICAL: custom page content area had no background-color in light mode — the
         body dark bg bled through the transparent content div as a near-black void. Apply
         the warm-white body bg so bento and empty-state cards sit on the correct surface. */
      [data-theme="light"] .bento, [data-theme="light"] .bento + *, [data-theme="light"] main > div { background-color: var(--bg); }
      /* G23 T1-B: shell/nav backgrounds switch to light tokens — eliminates dark bands between cards
         and the dark topbar/rail stripe in light mode. */
      /* GX1: the theme engine emits runtime backgrounds that outrank these shell
         overrides, leaving the whole chrome (topbar, rail, icon buttons, +Add menu,
         active nav chip) DARK in light mode. Strengthen with !important + add the
         missing surfaces so the shell is correct in light. All [CSS-ONLY]. */
      [data-theme="light"] .topbar { background: rgba(247,246,243,0.92) !important; color: #1c1c1e; border-color: #e4e2dd; }
      [data-theme="light"] aside.rail, [data-theme="light"] .rail { background: var(--bg-elev) !important; color: #1c1c1e; }
      [data-theme="light"] main { background: var(--bg) !important; }
      /* GX1-F2: active nav chip was dark-on-dark → invisible on the warm-white rail. */
      [data-theme="light"] aside.rail .nv.active, [data-theme="light"] aside.rail .nv[aria-current="page"] {
        background: var(--accent-dim) !important; color: #1c1c1e !important;
        /* GD-15 accent bar now drawn by the theme-agnostic .nv::before (grows in) — no box-shadow here. */ }
      [data-theme="light"] aside.rail .nv { color: #3c3c43; }
      [data-theme="light"] aside.rail .nv:hover { background: #efede8 !important; color: #1c1c1e; }
      [data-theme="light"] aside.rail .rail-section { color: #6a6a72; }
      /* GX1-F3: topbar icon buttons rendered on a dark rgb(32,32,34) surface in light. */
      [data-theme="light"] .muzak-btn, [data-theme="light"] .notify-btn, [data-theme="light"] .add-btn {
        background: #ffffff !important; color: #3c3c43; border: 1px solid #e4e2dd; }
      [data-theme="light"] .muzak-btn:hover, [data-theme="light"] .notify-btn:hover, [data-theme="light"] .add-btn:hover {
        background: #efede8 !important; color: #1c1c1e; }
      /* GX1-F4: +Add menu + notices popover panels were near-black in light. */
      [data-theme="light"] .add-menu, [data-theme="light"] .notify-menu, [data-theme="light"] .muzak-menu {
        background: #ffffff !important; border-color: #e4e2dd !important; color: #1c1c1e; }
      [data-theme="light"] .add-item:hover, [data-theme="light"] .notify-item:hover { background: #efede8 !important; color: #1c1c1e; }
      /* G22 + GX2-F5: darken .empty text in light for WCAG AA. The plain rule was
         outranked on some surfaces (dashboard widgets, cards) by runtime --text-faint
         (~3.2:1), so pin a darker value with !important across .empty + widget empties. */
      [data-theme="light"] .empty, [data-theme="light"] .w .empty, [data-theme="light"] .card .empty { color: #4b4b52 !important; }
      /* Widget shell, segmented + stepper pills, nav hover */
      /* GX11-F2 note: .w light-mode bg+border are now set above (with !important) near the GX11 block */
      [data-theme="light"] .nav:hover { background: #efede8; color: #1c1c1e; }
      [data-theme="light"] .seg, [data-theme="light"] .rpill { background: #efede8; border-color: #e4e2dd; }
      [data-theme="light"] .seg-btn, [data-theme="light"] .rstep { color: #56565c; }
      [data-theme="light"] .seg-btn.active { background: transparent; color: #1c1c1e; }
      [data-theme="light"] .seg-pill { background: #ffffff; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
      [data-theme="light"] .gear-inline, [data-theme="light"] .gear-abs, [data-theme="light"] .menu-btn, [data-theme="light"] .set-close { color: #6a6a72; }
      /* Flip panel + settings controls */
      [data-theme="light"] .flip-face, [data-theme="light"] .set-face { background: #ffffff; border-color: #e4e2dd; }
      /* G21 CRITICAL: panel backdrop was dark semi-transparent in light mode; use warm-white surface. */
      [data-theme="light"] .flip-backdrop { background: rgba(239,237,232,0.75); }
      /* G21 CRITICAL: toggle-row labels were near-white (rgb(244,244,245)) in light — white-on-white. */
      [data-theme="light"] .toggle-row span { color: #1c1c1e; }
      [data-theme="light"] .set-input, [data-theme="light"] .member-chip, [data-theme="light"] .rate-row .rate-in, [data-theme="light"] .data-btn { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .badge-soon { background: #e8f2ff; color: #1d4ed8; border-color: #bfdbfe; }
      [data-theme="light"] .switch { background: #d4d2cc; }
      [data-theme="light"] .switch::after { background: #ffffff; }
      /* GM (modal UX) light-mode + polish fixes — landable CSS, no wasm rebuild.
         GM2-1: modal/flip-panel title (.set-h h3) was near-white on the now-white
         face → invisible across ALL entity modals. Pin to dark foreground. */
      [data-theme="light"] .set-h h3 { color: #1c1c1e; }
      /* GM2-2 / GM4-9: footer Save/Cancel buttons were hardcoded dark-green/dark on a
         white face. Light: accent-filled Save with white label, neutral Cancel. */
      [data-theme="light"] .set-btn.save { background: var(--accent,#2e8b57); border-color: transparent; color: #ffffff; }
      [data-theme="light"] .set-btn.save:hover { filter: brightness(0.95); }
      [data-theme="light"] .set-btn.cancel { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .set-btn.cancel:hover { border-color: #cfcdc7; color: #000; }
      /* GM4-8: flip/settings panel header + footer separators were dark hex in light. */
      [data-theme="light"] .set-h { border-bottom-color: #e4e2dd; }
      [data-theme="light"] .set-foot { border-top-color: #e4e2dd; }
      /* GM2-6: the top-bar "+" Add button had no border/fill in light and read as
         invisible. Give it a subtle outline so the primary entry point is findable. */
      [data-theme="light"] .add-btn { border: 1px solid var(--border); border-radius: 6px; }
      /* GM2-10: CloseOnly footer button used .set-btn.save styling (green, primary-
         looking) on a dismiss action, misleading users. .set-btn.close styles it as
         a neutral dismiss action matching .set-btn.cancel. */
      .set-btn.close { background: transparent; border: 1px solid #34343a; color: #a6a6ac; font-weight: 500; }
      .set-btn.close:hover { color: #f4f4f5; border-color: #44444c; }
      [data-theme="light"] .set-btn.close { background: #ffffff; border-color: #e4e2dd; color: #1c1c1e; }
      [data-theme="light"] .set-btn.close:hover { border-color: #cfcdc7; color: #000; }
      /* GM2-12: .set-body scrollbar was hardcoded dark. In light mode the dark-grey
         thumb on white looks jarring; switch to a warm-neutral thumb. */
      [data-theme="light"] .set-body { scrollbar-color: #c5c3be transparent; }
      [data-theme="light"] .set-body::-webkit-scrollbar-thumb { background: #c5c3be; border-color: #ffffff; }
      /* GM4-7: command-palette backdrop used a harsh dark scrim in light while the
         FlipPanel uses a warm tint. Match it (inline 0,0,0,.5 needs !important). */
      [data-theme="light"] #cf-cmd-palette { background: rgba(239,237,232,0.72) !important; }
      /* GM3-5/GM3-6/GM3-7: confirm-dialog scrim had no blur (inconsistent with FlipPanel),
         the box-shadow was not theme-aware, and the panel was cramped at 110px.
         Add blur + hairline ring + breathing room. */
      .cf-dialog-scrim { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
      .cf-dialog { box-shadow: 0 12px 40px rgba(0,0,0,.35), 0 0 0 1px var(--border,#2a2a2c);
                   padding: 1.5rem 1.5rem 1.25rem; min-height: 6rem; }
      /* GM1-S5: at 768 the flip panel sat 15px from the viewport edge. Give it a
         comfortable gutter without exceeding its design width. */
      .flip-wrap { max-width: min(760px, calc(100vw - 24px)); }
      /* Scrollbars */
      [data-theme="light"] main.cf-scroll::-webkit-scrollbar-thumb { background: #cfcdc7; border-color: #f7f6f3; }
      /* Card titles stay full-contrast in both themes (G4–G11): they inherit --text
         (dark in the light palette) already, but pin it explicitly so the recurring
         "titles invisible in light mode" audit finding can never recur from a muted
         wrapper or utility class. */
      .card-title { margin: 0 0 0.75rem; font-size: 1.05rem; color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
      /* G9.1 Reports hero zone — headline stat strip above the card scroll. */
      .reports-hero { margin-bottom: 1rem; padding: 1.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
      .hero-period { font-size: 0.825rem; font-weight: 500; color: var(--text-dim); margin: 0 0 0.6rem; }
      .hero-main { display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap; }
      .hero-net { font-size: 2.5rem; font-weight: 800; line-height: 1.1; font-variant-numeric: tabular-nums; white-space: nowrap; letter-spacing: -0.025em; }
      .hero-net.pos { color: var(--accent); }
      .hero-net.neg { color: var(--danger); }
      /* G9.1: period-over-period Net delta chip under the headline figure. */
      .hero-net-delta { display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.2rem; font-size: 0.8rem; font-weight: 600; font-variant-numeric: tabular-nums; }
      .hero-net-delta.pos { color: var(--accent); }
      .hero-net-delta.neg { color: var(--danger); }
      .hero-flankers { display: flex; gap: 1.25rem; align-items: baseline; flex-wrap: wrap; }
      .hero-flanker { display: flex; flex-direction: column; gap: 0.1rem; }
      .hero-flanker-label { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
      .hero-flanker-value { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; letter-spacing: -0.015em; }
      .hero-flanker-value.pos { color: var(--accent); }
      .hero-flanker-value.neg { color: var(--danger); }
      .hero-secondary { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
      .hero-stat { display: flex; flex-direction: column; gap: 0.1rem; }
      /* --text-dim (not --text-faint): the uppercase eyebrow label measured only 3.58:1 on --text-faint
         (fails AA); --text-dim lifts it past 4.5 while staying a quiet label. */
      .hero-stat-label { font-size: 0.73rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
      .hero-stat-value { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
      /* Semantic tone for the hero-secondary stats (savings rate / runway / no-spend days).
         reports_screen.go already emits .pos/.neg here (toneForSavingsRate, accentForRunway, and
         "pos" on no-spend days) but no CSS rendered them, so a negative savings rate read as plain
         white like a healthy one. Color by sign/health so the warning states (short runway, negative
         savings rate) are glanceable — matching the Net/Income/Spending strip directly above. */
      .hero-stat-value.pos { color: var(--accent); }
      .hero-stat-value.neg { color: var(--danger); }
      [data-theme="light"] .hero-stat-value.pos { color: var(--accent) !important; }
      [data-theme="light"] .hero-stat-value.neg { color: var(--danger) !important; }
      /* Dashboard HomeHero band (EC4): the component (internal/screens/homehero.go) ships
         these class names but no CSS existed for the layout wrappers, so the this-month
         stat blocks collapsed to display:block and the label+value jammed together
         ("Income$6,982.00"). Lay them out like the Reports hero secondary stats: a wrapping
         row of label-above-value blocks. Greeting/figure/label spans already carry scoped
         tw styles; these rules add only the missing container/spacing. */
      .home-hero { margin-bottom: 1.25rem; }
      .home-hero-greeting { margin: 0 0 0.75rem; }
      .home-hero-nw { display: flex; flex-direction: column; gap: 0.15rem; margin-bottom: 0.85rem; }
      .home-hero-nw-fig { line-height: 1.1; }
      .home-hero-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: baseline; }
      .home-hero-stat { display: flex; flex-direction: column; gap: 0.1rem; }
      .home-hero-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1.1rem; }
      .home-hero-welcome-body { max-width: 42rem; }
      /* G9.1 Alert card strip — heads-up anomaly urgency. */
      .card-alert { border-left: 4px solid var(--danger); background: color-mix(in srgb, var(--danger) 6%, var(--card-bg)); }
      /* C125: salient over-budget banner — leads the list when any budget is over. */
      .budget-over-banner { padding: 0.6rem 0.85rem; border-radius: 8px; margin: 0 0 0.6rem;
        background: color-mix(in srgb, var(--danger) 10%, var(--bg-elev)); }
      .budget-over-icon { color: var(--danger); font-size: 1rem; line-height: 1; }
      .budget-over-text { font-weight: 600; color: var(--text); font-size: 0.9rem; }
      .muted { color: var(--text-dim); margin: 0.25rem 0; }
      .empty { color: var(--text-faint); font-style: italic; }
      /* Empty-state call-to-action block: centered message + "Add first…" button (§6.5). */
      .empty-cta { display:flex; flex-direction:column; align-items:center; gap:.85rem; padding:1.75rem 1rem; text-align:center; }
      .empty-cta .empty { margin:0; }
      /* GD-12: empty-state glyph as a soft accent badge instead of a bare muted icon — warmer,
         more intentional first-run illustration. The accent tint + circular wash are theme-adaptive. */
      .empty-cta .empty-icon { color: var(--accent); padding: 0.7rem; border-radius: 999px; box-sizing: content-box;
        background: color-mix(in srgb, var(--accent) 12%, transparent); }
      /* Bills month calendar (B22): a 7-column grid of day cells with due-day dots. */
      .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:.5rem; }
      .cal-head { text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); padding:2px 0; }
      .cal-cell { min-height:46px; border:1px solid var(--border); border-radius:6px; padding:4px 5px; position:relative; }
      .cal-cell.out { opacity:.35; }
      /* GD-11: "today" got only an accent border — easy to miss. Add a faint accent wash + bold
         accent day number so the current day reads at a glance (theme-adaptive via color-mix). */
      .cal-cell.today { border-color:var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
      .cal-cell.today .cal-day { color: var(--accent); font-weight: 700; }
      .cal-day { font-size:12px; color:var(--text-dim); }
      .cal-dot { position:absolute; bottom:6px; left:6px; width:7px; height:7px; border-radius:50%; background:var(--danger,#d8716f); }
      /* Bills two-column layout (G11 follow-up): at ≥1024 px the bill list sits on the
         left and the calendar floats to the right so both are visible without scrolling. */
      .bills-layout { display: flex; flex-direction: column; gap: 1rem; }
      @media (min-width: 1024px) {
        .bills-layout { flex-direction: row; align-items: flex-start; }
        .bills-layout > .card:first-child { flex: 1 1 auto; min-width: 0; }
        .bills-layout > .card:last-child { flex: 0 0 320px; }
      }
      /* bill-sub-actions: fixed trailing action group per bill row, mirrors .sub-actions
         from G10 so buttons don't crowd the name/amount (G11 follow-up). */
      .bill-sub-actions { flex: none; display: inline-flex; align-items: center; gap: 0.4rem; }
      @media (max-width: 760px) {
        .bill-sub-actions { flex-wrap: wrap; }
      }
      .badge {
        display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 999px;
      }
      .badge-soon { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }

      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
      .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
      .stat-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
      /* An inline info-tooltip must not inflate a .stat-label's line box: a full .btn
         trigger (16px icon + padding) made the first stat's label 44px tall vs siblings'
         ~18px, dropping that stat's value 26px below the row baseline. Collapse the
         trigger to the label's text size so every stat value shares one baseline. */
      .stat-label .smart-tip-wrap button.btn { padding: 0; border: 0; min-height: 0; height: 1em; line-height: 1; }
      .stat-label .smart-tip-wrap svg { width: 0.95em; height: 0.95em; }
      /* Keep stat figures on one line (G11): a "Next due" ISO date was hyphenating to
         "2026-07-" / "01" in the narrow single-column 768px stat card. */
      .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; white-space: nowrap; letter-spacing: -0.015em; }
      .stat-value.pos { color: var(--accent); }
      .stat-value.neg { color: var(--danger); }
      .stat-sub { display: block; margin-top: 0.3rem; font-size: 0.82rem; }

      /* Net-worth-dominant summary (G3): a hero net-worth tile beside smaller
         assets/liabilities tiles. The hero spans both rows and reads larger so the
         north-star figure lands first. Collapses to a single column when narrow. */
      .nw-summary { display: grid; grid-template-columns: 1.6fr 1fr; grid-auto-rows: 1fr; gap: 0.75rem; margin-bottom: 1rem; }
      .nw-summary .stat-hero { grid-row: 1 / 3; display: flex; flex-direction: column; justify-content: center; }
      .nw-summary .stat-hero .stat-value { font-size: 2.1rem; }
      @media (max-width: 640px) {
        .nw-summary { grid-template-columns: 1fr; }
        .nw-summary .stat-hero { grid-row: auto; }
      }

      /* Stale-action buttons (G3 §4/§6): tie "Mark all updated" and the per-row
         "Update balance" to the amber STALE badge so they read as the resolving
         action, not muted chrome. */
      .btn-stale { border: 1px solid #c2870b; color: #d98c00; }
      .btn-stale:hover { background: rgba(245,158,11,0.12); }
      [data-theme="light"] .btn-stale { color: #b45309; border-color: #d39200; }

      /* Account-type glyph slot (G3 §5). */
      .acct-type-icon { display: inline-flex; align-items: center; flex: none; }

      /* Rows */
      .rows { display: flex; flex-direction: column; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.6rem 0; border-top: 1px solid var(--border); transition: background 0.12s ease; }
      /* Row hover affordance: a subtle highlight so the cursor's row is obvious and
         the list is easier to scan (§6.16). Inset slightly so it reads as a band. */
      .row:hover { background: var(--bg-elev); }
      /* GX8-F3: warm hover bg for non-transaction rows in light mode (txn rows already
         have an explicit #efede8 override; this aligns generic .row:hover to match). */
      [data-theme="light"] .row:hover { background: #efede8; }
      .row:first-child { border-top: 0; }
      /* Narrow reflow (G3 §1): below ~760px a list row wraps so a long account name
         + STALE badge no longer collide with the action buttons — the name/meta take
         the full first line, the figure + actions wrap beneath, left-aligned. */
      @media (max-width: 760px) {
        .row { flex-wrap: wrap; row-gap: 0.4rem; }
        .row .row-main { flex: 1 1 100%; }
        .row .acct-type-icon { order: -1; }
      }
      /* Inline-edit rows: a full-width block (not the flex .row) so the nested
         .form-grid expands to multiple columns and editing looks like adding,
         instead of collapsing into a tall single column (C18). */
      .row-edit { padding: 0.6rem 0; border-top: 1px solid var(--border); }
      .row-edit:first-child { border-top: 0; }
      [data-density="compact"] .row-edit { padding-top: 0.3rem; padding-bottom: 0.3rem; }
      .row-main { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; flex: 1; }
      /* Primary row label stays full-contrast in both themes (G4/G5/G6): it
         inherits body text, but pin it explicitly so a muted wrapper or a stale
         utility class can never wash a task/account/goal name out in light mode. */
      /* overflow-wrap:anywhere so a long unbroken name (email/URL/ID, or a no-space
         string) breaks and wraps inside list rows instead of overflowing the card —
         white-space:normal alone only breaks at spaces. The txn-table's row-desc uses
         nowrap+ellipsis (more specific rule), so this only affects the list-row variant. */
      .row-desc { font-weight: 500; color: var(--text); overflow-wrap: anywhere; }
      /* To-do portfolio summary line (G6). */
      .todo-summary { margin: 0 0 0.6rem; font-size: 0.86rem; font-variant-numeric: tabular-nums; }
      .row-meta { color: var(--text-dim); font-size: 0.82rem; }
      /* Transactions table (C47): a dense, sortable, column-aligned ledger. */
      .txn-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
      .txn-table thead th { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); color: var(--text-dim); font-weight: 600; white-space: nowrap; position: sticky; top: 0; background: var(--bg); z-index: 1; }
      /* GX4-F3: padding-block lifts .th-sort from 20px to ≥24px — meets WCAG 2.5.8 minimum tap target. */
      .txn-table .th-sort { background: transparent; border: 0; color: inherit; font: inherit; font-weight: 600; cursor: pointer; padding: 0.2rem 0; display: inline-flex; align-items: center; gap: 0.15rem; min-height: 24px; }
      .txn-table .th-sort:hover { color: var(--text); }
      .txn-table th[aria-sort="ascending"] .th-sort, .txn-table th[aria-sort="descending"] .th-sort { color: var(--accent); }
      .txn-table tr { display: table-row; }                 /* override the legacy .row flex */
      /* Denser rows for a scan-heavy ledger (G2 §2): tighter vertical padding lifts
         visible row count toward the 15–20 target. */
      /* GX12-F1: row height varied (42px@1440 vs 50px@1280/768) because the description/amount
         columns drove height differently at each viewport. A uniform min-height on the row and
         matching padding-block on every cell floors all rows at ~44px regardless of column width. */
      .txn-table tbody tr.row { min-height: 44px; }
      .txn-table tbody td { padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .txn-table tbody tr.selected { background: var(--accent-dim); }
      /* Zebra striping + themed hover (G2 §3): alternating tint + a clear hover band
         so the eye doesn't lose its place across the columns. */
      /* GX12-F2: zebra alpha was below the perceptibility threshold (3% dark / 2.4% light).
         Bump slightly so rows are scannable without becoming stripey. */
      .txn-table tbody tr.row:nth-child(even) { background: rgba(255,255,255,0.055); }
      [data-theme="light"] .txn-table tbody tr.row:nth-child(even) { background: rgba(0,0,0,0.04); }
      /* GX3-D2: the DataTable stayed dark-on-dark in light (runtime vars resolved to the
         dark palette in the table context, outranking var(--bg)/(--text)). Pin light
         surfaces + text with !important, matching the GX1 shell pattern. */
      [data-theme="light"] .txn-table thead th { background: #f7f6f3 !important; color: #3c3c43 !important; }
