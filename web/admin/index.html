<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/console/" />
    <title>CashFlux — Operator Console</title>
    <meta name="description" content="The CashFlux operator console — manage users, subscriptions, usage, and zero-knowledge encrypted sync from one secure interface." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /* ===================================================================
         CashFlux Operator Console — design system
         Dark, layered canvas · emerald→teal brand · glass surfaces · motion
         =================================================================== */
      :root {
        --bg:            #07090a;
        --bg-elev:       #0d1012;
        --surface:       rgba(255, 255, 255, 0.025);
        --surface-2:     rgba(255, 255, 255, 0.045);
        --border:        rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text:          #f3f6f5;
        --text-dim:      #9aa6a1;
        --text-faint:    #69736e;
        --accent:        #3ee08f;
        --accent-2:      #28c7c0;
        --accent-deep:   #2e8b57;
        --danger:        #f0726f;
        --warn:          #e6b860;
        --grad:          linear-gradient(135deg, #3ee08f 0%, #28c7c0 100%);
        --grad-text:     linear-gradient(120deg, #eafff4 0%, #6ff0bd 38%, #46d6cf 72%, #8ad9ff 100%);
        --radius:        14px;
        --radius-lg:     22px;
        --ring:          0 0 0 3px rgba(62, 224, 143, 0.28);
        --shadow-glow:   0 18px 50px -18px rgba(40, 199, 192, 0.45);
        --maxw:          1120px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        font-family: "Inter", -apple-system, "Segoe UI Variable Display", "Segoe UI", Roboto, system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.55;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }

      #app { min-height: 100vh; position: relative; z-index: 1; }

      ::selection { background: rgba(62, 224, 143, 0.28); color: #fff; }

      /* --- Ambient background: gradient glows + faint grid ----------------- */
      body::before,
      body::after {
        content: "";
        position: fixed;
        z-index: 0;
        pointer-events: none;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
      }
      body::before {
        top: -260px; left: -160px;
        width: 620px; height: 620px;
        background: radial-gradient(circle at center, rgba(62, 224, 143, 0.55), transparent 70%);
        animation: drift1 22s ease-in-out infinite alternate;
      }
      body::after {
        bottom: -300px; right: -180px;
        width: 680px; height: 680px;
        background: radial-gradient(circle at center, rgba(40, 199, 192, 0.45), transparent 70%);
        animation: drift2 26s ease-in-out infinite alternate;
      }
      .bg-grid {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 78%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 78%);
      }
      @keyframes drift1 { to { transform: translate(80px, 60px) scale(1.1); } }
      @keyframes drift2 { to { transform: translate(-70px, -50px) scale(1.08); } }

      /* --- Shared layout -------------------------------------------------- */
      .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

      /* --- Nav ------------------------------------------------------------ */
      .nav {
        position: sticky; top: 0; z-index: 20;
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        background: rgba(7, 9, 10, 0.62);
        border-bottom: 1px solid var(--border);
      }
      .nav-inner {
        display: flex; align-items: center; justify-content: space-between;
        height: 64px; max-width: var(--maxw); margin: 0 auto; padding: 0 24px;
      }
      .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; letter-spacing: -0.01em; }
      .brand-mark {
        width: 30px; height: 30px; border-radius: 9px; background: var(--grad);
        box-shadow: var(--shadow-glow);
        display: grid; place-items: center; color: #04140c; font-weight: 900; font-size: 15px;
      }
      .brand-name { font-size: 15.5px; font-weight: 800; letter-spacing: -0.01em;
        background: var(--grad-text); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .brand-tag { color: var(--text-faint); font-weight: 500; font-size: 13px; }
      .nav-actions { display: flex; align-items: center; gap: 10px; }

      /* --- Buttons -------------------------------------------------------- */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font: inherit; font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
        padding: 11px 20px; border-radius: 11px; border: 1px solid transparent;
        cursor: pointer; white-space: nowrap; text-decoration: none;
        transition: transform .16s cubic-bezier(.2,.7,.3,1), box-shadow .2s, background .2s, border-color .2s, opacity .2s;
      }
      .btn:focus-visible { outline: none; box-shadow: var(--ring); }
      .btn:active { transform: translateY(1px); }
      .btn-primary {
        background: var(--grad); color: #04140c;
        box-shadow: 0 10px 30px -10px rgba(62, 224, 143, 0.6);
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 18px 40px -12px rgba(62, 224, 143, 0.7); }
      .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
      .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.28); transform: translateY(-2px); }
      .btn-ghost { background: transparent; color: var(--text-dim); }
      .btn-ghost:hover { color: var(--text); background: var(--surface); }
      .btn-danger { background: rgba(240,114,111,0.14); color: var(--danger); border-color: rgba(240,114,111,0.4); }
      .btn-danger:hover { background: rgba(240,114,111,0.22); }
      .btn-lg { padding: 14px 26px; font-size: 15px; border-radius: 13px; }
      .btn-sm { padding: 8px 14px; font-size: 13px; }

      /* --- Hero ----------------------------------------------------------- */
      .hero { text-align: center; padding: 92px 0 30px; display: flex; flex-direction: column; align-items: center; }
      .eyebrow {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 6px 14px 6px 11px; border-radius: 999px;
        background: var(--surface-2); border: 1px solid var(--border-strong);
        font-size: 12.5px; font-weight: 600; color: var(--text-dim); letter-spacing: .01em;
      }
      .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(62,224,143,.18); }
      .hero-title {
        margin: 26px 0 0; font-weight: 800; letter-spacing: -0.035em; line-height: 1.04;
        font-size: clamp(40px, 6.4vw, 74px);
        background: var(--grad-text); -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        max-width: 16ch;
      }
      .hero-sub {
        margin: 22px auto 0; max-width: 60ch; font-size: clamp(16px, 1.6vw, 19px);
        line-height: 1.6; color: var(--text-dim);
      }
      .hero-actions { display: flex; flex-wrap: wrap; gap: 13px; justify-content: center; margin-top: 34px; }
      .hero-trust { display: flex; flex-wrap: wrap; gap: 10px 22px; justify-content: center; margin-top: 38px; }
      .trust-item { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--text-faint); font-weight: 500; }
      .trust-item .chk { color: var(--accent); font-weight: 800; }

      /* --- Section scaffolding -------------------------------------------- */
      .section { padding: 64px 0; }
      .section-head { text-align: center; max-width: 60ch; margin: 0 auto 44px; }
      .section-eyebrow { font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
        background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .section-title { margin-top: 12px; font-size: clamp(26px, 3.4vw, 38px); font-weight: 800; letter-spacing: -0.025em; }
      .section-desc { margin-top: 14px; color: var(--text-dim); font-size: 16px; }

      /* --- Feature grid --------------------------------------------------- */
      .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 18px; }
      .feature-card {
        position: relative; overflow: hidden;
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
        padding: 26px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        transition: transform .22s cubic-bezier(.2,.7,.3,1), border-color .22s, background .22s, box-shadow .22s;
      }
      .feature-card::after {
        content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
        background: radial-gradient(420px circle at var(--mx, 50%) -10%, rgba(62,224,143,0.10), transparent 70%);
        opacity: 0; transition: opacity .25s;
      }
      .feature-card:hover { transform: translateY(-5px); border-color: var(--border-strong); background: var(--surface-2); box-shadow: 0 24px 50px -28px rgba(0,0,0,.8); }
      .feature-card:hover::after { opacity: 1; }
      .feat-num {
        font-size: 13px; font-weight: 800; letter-spacing: .08em; margin-bottom: 14px;
        background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      .feature-card-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
      .feature-card-desc { margin-top: 8px; font-size: 14.5px; line-height: 1.6; color: var(--text-dim); }

      /* --- Browser-framed product screenshots ----------------------------- */
      .frame {
        border: 1px solid var(--border-strong); border-radius: 16px; overflow: hidden;
        background: var(--bg-elev); box-shadow: 0 40px 90px -40px rgba(0,0,0,.85);
      }
      .frame-bar {
        display: flex; align-items: center; gap: 7px; padding: 11px 14px;
        background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--border);
      }
      .frame-dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
      .frame-dot:nth-child(1){ background:#f0726f; } .frame-dot:nth-child(2){ background:#e6b860; } .frame-dot:nth-child(3){ background:#3ee08f; }
      .frame-url { margin-left: 10px; font-size: 12px; color: var(--text-faint); font-weight: 500; }
      .frame img { display: block; width: 100%; height: auto; }
      .shot-hero {
        margin: 46px auto 0; max-width: 940px; position: relative;
        -webkit-mask-image: linear-gradient(180deg, #000 76%, transparent 100%);
        mask-image: linear-gradient(180deg, #000 76%, transparent 100%);
      }
      .shots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 22px; }
      .shot-cap { margin-top: 14px; }
      .shot-cap h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
      .shot-cap p { margin-top: 5px; font-size: 14px; color: var(--text-dim); line-height: 1.55; }

      /* --- Stats band ----------------------------------------------------- */
      .stats-band {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1px; background: var(--border); border: 1px solid var(--border);
        border-radius: var(--radius-lg); overflow: hidden;
      }
      .stat-pill { background: var(--bg-elev); padding: 26px 22px; text-align: center; }
      .stat-pill .num { font-size: 30px; font-weight: 800; letter-spacing: -0.02em;
        background: var(--grad-text); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .stat-pill .cap { margin-top: 4px; font-size: 13px; color: var(--text-faint); font-weight: 500; }

      /* --- CTA band ------------------------------------------------------- */
      .cta-band {
        position: relative; overflow: hidden; text-align: center;
        border: 1px solid var(--border-strong); border-radius: var(--radius-lg);
        padding: 56px 28px;
        background: radial-gradient(120% 140% at 50% 0%, rgba(40,199,192,0.16), transparent 60%), var(--bg-elev);
      }
      .cta-band h2 { font-size: clamp(24px, 3vw, 34px); font-weight: 800; letter-spacing: -0.025em; }
      .cta-band p { margin: 12px auto 26px; max-width: 52ch; color: var(--text-dim); }

      /* --- Footer --------------------------------------------------------- */
      .footer { border-top: 1px solid var(--border); margin-top: 48px; padding: 28px 0 56px; }
      .footer-inner { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between; }
      .footer small { color: var(--text-faint); font-size: 13px; }
      .footer-links { display: flex; gap: 20px; }
      .footer-links a { color: var(--text-faint); font-size: 13px; text-decoration: none; transition: color .2s; }
      .footer-links a:hover { color: var(--text); }

      /* --- Entrance animation --------------------------------------------- */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
      .fade { opacity: 0; animation: fadeUp .7s cubic-bezier(.2,.7,.3,1) forwards; }
      .d1 { animation-delay: .05s; } .d2 { animation-delay: .12s; } .d3 { animation-delay: .19s; }
      .d4 { animation-delay: .26s; } .d5 { animation-delay: .33s; }
      .feature-grid .feature-card:nth-child(1){animation-delay:.04s}
      .feature-grid .feature-card:nth-child(2){animation-delay:.10s}
      .feature-grid .feature-card:nth-child(3){animation-delay:.16s}
      .feature-grid .feature-card:nth-child(4){animation-delay:.22s}
      .feature-grid .feature-card:nth-child(5){animation-delay:.28s}
      .feature-grid .feature-card:nth-child(6){animation-delay:.34s}
      @media (prefers-reduced-motion: reduce) {
        .fade { animation: none; opacity: 1; }
        body::before, body::after { animation: none; }
      }

      /* ===================================================================
         LOGIN
         =================================================================== */
      .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
      .login-card {
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg);
        padding: 38px 34px; width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 16px;
        box-shadow: 0 40px 80px -40px rgba(0,0,0,.9);
      }
      .login-brand { display: flex; align-items: center; gap: 11px; margin-bottom: 6px; }
      .login-title { font-size: 23px; font-weight: 800; letter-spacing: -0.025em; }
      .login-sub { color: var(--text-dim); font-size: 14px; margin-top: -10px; }
      .login-label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
      .login-input {
        width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border-strong);
        border-radius: 11px; color: var(--text); font: inherit; font-size: 15px; outline: none; transition: border-color .15s, box-shadow .15s;
      }
      .login-input::placeholder { color: var(--text-faint); }
      .login-input:focus { border-color: var(--accent); box-shadow: var(--ring); }
      .dev-banner {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        background: linear-gradient(135deg, rgba(62,224,143,0.12), rgba(40,199,192,0.08));
        border: 1px solid rgba(62,224,143,0.34); border-radius: 12px; padding: 11px 11px 11px 15px;
      }
      .dev-hint { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }

      /* ===================================================================
         LOADING · ERROR
         =================================================================== */
      .loading-page { padding: 40px; display: flex; flex-direction: column; gap: 22px; max-width: var(--maxw); margin: 0 auto; }
      .skeleton { background: linear-gradient(100deg, var(--surface) 30%, var(--surface-2) 50%, var(--surface) 70%);
        background-size: 200% 100%; border-radius: var(--radius); animation: shimmer 1.4s linear infinite; }
      .skeleton-title { height: 34px; width: 340px; max-width: 100%; }
      .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; }
      .skeleton-card { height: 96px; }
      @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
      .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 18px; padding: 24px; text-align: center; }
      .error-msg { color: var(--danger); font-size: 16px; max-width: 440px; }

      /* ===================================================================
         CONSOLE (signed-in)
         =================================================================== */
      .console-page { display: flex; flex-direction: column; gap: 30px; padding: 30px 32px 64px; max-width: var(--maxw); margin: 0 auto; }
      .console-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
        padding-bottom: 22px; border-bottom: 1px solid var(--border); }
      .console-title { font-size: 23px; font-weight: 800; letter-spacing: -0.025em; display: flex; align-items: center; gap: 11px; }
      .header-actions { display: flex; gap: 10px; align-items: center; }
      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; }
      .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px;
        display: flex; flex-direction: column; gap: 7px; transition: border-color .2s, transform .2s; }
      .stat-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
      .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-faint); }
      .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); font-variant-numeric: tabular-nums; }
      .table-section { display: flex; flex-direction: column; gap: 14px; }
      .table-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
      .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .users-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      .users-table th, .users-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
      .users-table tr:last-child td { border-bottom: none; }
      .users-table th { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-faint); background: var(--bg-elev); }
      .users-table td { color: var(--text); font-variant-numeric: tabular-nums; }
      .users-table tbody tr { transition: background .15s; }
      .users-table tbody tr:hover td { background: var(--surface); }

      /* --- Users toolbar: search + pagination ----------------------------- */
      .users-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 4px; }
      .users-search {
        flex: 1 1 240px; min-width: 180px; padding: 10px 14px;
        background: var(--bg); border: 1px solid var(--border-strong); border-radius: 11px;
        color: var(--text); font: inherit; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s;
      }
      .users-search::placeholder { color: var(--text-faint); }
      .users-search:focus { border-color: var(--accent); box-shadow: var(--ring); }
      .users-pager { display: flex; align-items: center; gap: 10px; margin-left: auto; }
      .users-page-label { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; min-width: 64px; text-align: center; }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      @media (max-width: 640px) {
        .hero { padding-top: 64px; }
        .nav-brand-tag, .brand-tag { display: none; }
        .console-page, .console-header { padding-left: 18px; padding-right: 18px; }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div id="app"></div>
    <script src="./wasm_exec.js"></script>
    <script>
      const go = new Go();
      WebAssembly.instantiateStreaming(fetch("./admin.wasm"), go.importObject)
        .then(result => go.run(result.instance))
        .catch(err => {
          document.getElementById("app").textContent = "Failed to load console: " + err;
        });
    </script>
  </body>
</html>
