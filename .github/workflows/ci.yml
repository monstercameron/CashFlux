name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Security scan
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -severity high -confidence medium ./...

      - name: Test (pure logic packages — js/wasm view packages are build-tagged out)
        run: go test ./...

      - name: Build WebAssembly
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -o /dev/null .
