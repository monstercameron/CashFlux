name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Security scan
        # Exclude e2e/: it's test tooling (a localhost static server), not production
        # code, so its file-serving path handling isn't a production risk.
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -severity high -confidence medium -exclude-dir=e2e ./...

      - name: Secrets scan
        run: go run github.com/zricethezav/gitleaks/v8@latest detect --no-git --source . --config .gitleaks.toml --redact --verbose

      - name: API compatibility guard
        run: go run ./cmd/api_compat_guard

      - name: Proto drift check
        run: |
          go run github.com/bufbuild/buf/cmd/buf@v1.57.2 generate
          git diff --exit-code -- buf.yaml buf.gen.yaml proto internal/backendrpc/pb

      - name: Test (pure logic packages — js/wasm view packages are build-tagged out)
        run: go test ./...

      - name: Build server
        run: go build ./cmd/cashflux-server

      - name: Build WebAssembly
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -o /dev/null .

  e2e:
    name: E2E regression (Playwright)
    # Runs on Windows so the committed coverage/a11y/-win32 visual baselines match
    # the runner's rendering. globalSetup builds the wasm; Playwright serves it and
    # drives Chromium. Visual pixel-diffs are a local gate (skipped in CI).
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install chromium

      # Middle layer of the pyramid: fast wasm component/registry tests via
      # GoWebComponents testkit (mock DOM, no browser). These never run under
      # `go test ./...` (js&&wasm build tag), so they get a dedicated lane here.
      - name: WASM component tests (testkit)
        run: pwsh tools/wasm-test.ps1

      - name: Run regression suite
        working-directory: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
