name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The roadmap is public in [`TODOS.md`](https://github.com/monstercameron/CashFlux/blob/main/TODOS.md) —
        a quick look there might find your idea already planned (add your thoughts to it!).
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What are you trying to do, and where does the app get in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches/examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Fits the project's principles?
      options:
        - label: Works **local-first** (doesn't require a server for core use)
        - label: Keeps computations **deterministic / explainable** (no black boxes)
