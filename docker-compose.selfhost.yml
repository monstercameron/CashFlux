services:
  cashflux-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - ./deploy/cashflux-server.env
    volumes:
      - cashflux-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - cashflux-server
    env_file:
      - ./deploy/cashflux-server.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.selfhost:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /run:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  cashflux-data:
  caddy-data:
  caddy-config:
