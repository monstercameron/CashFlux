syntax = "proto3";

package cashflux.v1;

option go_package = "github.com/monstercameron/CashFlux/internal/backendrpc/pb;backendrpcpb";

message Workspace {
  string id = 1;
  string name = 2;
  string color = 3;
  int32 sort = 4;
  bool deleted = 5;
  int64 version = 6;
  string updated_at = 7;
  string device_id = 8;
}

message DatasetEnvelope {
  int32 schema_version = 1;
  bytes gzipped_json = 2;
}

message BlobRef {
  string hash = 1;
  string mime = 2;
  int64 size = 3;
  string name = 4;
}

message ListWorkspacesRequest {
  bool include_deleted = 1;
}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

message GetWorkspaceRequest {
  string id = 1;
  string if_none_match = 2;
}

message GetWorkspaceResponse {
  bool found = 1;
  bool not_modified = 2;
  string etag = 3;
  Workspace workspace = 4;
  bytes dataset = 5;
}

message PutWorkspaceRequest {
  Workspace workspace = 1;
  bytes dataset = 2;
  string client_updated_at = 3;
  bool force = 4;
}

message PutWorkspaceResponse {
  bool accepted = 1;
  Workspace workspace = 2;
  bytes dataset = 3;
  int64 version = 4;
  string updated_at = 5;
}

message DeleteWorkspaceRequest {
  string id = 1;
  string updated_at = 2;
  string device_id = 3;
}

message DeleteWorkspaceResponse {
  bool deleted = 1;
}

message WatchWorkspacesRequest {
  bool include_deleted = 1;
}

message WatchWorkspacesResponse {
  Workspace workspace = 1;
}

message SetKeyRequest {
  string provider = 1;
  string key = 2;
}

message SetKeyResponse {
  bool stored = 1;
  string provider = 2;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated string models = 1;
}

message Message {
  string role = 1;
  string content = 2;
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message ChatRequest {
  string model = 1;
  repeated Message messages = 2;
  double temperature = 3;
}

message VisionRequest {
  string model = 1;
  string system_prompt = 2;
  string user_text = 3;
  string image_url = 4;
  double temperature = 5;
  string schema_name = 6;
  bytes schema = 7;
}

message Completion {
  string content = 1;
  Usage usage = 2;
}

message CompletionChunk {
  string content = 1;
  Usage usage = 2;
  bool done = 3;
}

service SyncService {
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc PutWorkspace(PutWorkspaceRequest) returns (PutWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc WatchWorkspaces(WatchWorkspacesRequest) returns (stream WatchWorkspacesResponse);
}

service AIService {
  rpc SetKey(SetKeyRequest) returns (SetKeyResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc Chat(ChatRequest) returns (Completion);
  rpc Vision(VisionRequest) returns (Completion);
  rpc ChatStream(ChatRequest) returns (stream CompletionChunk);
  rpc VisionStream(VisionRequest) returns (stream CompletionChunk);
}

// --- AuthService: device/session identity core (TODOS.md C418) ---

message EnrollRequest {
  string device_label = 1;
}

message TokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in_seconds = 3;
  string device_id = 4;
}

message RedeemPairingCodeRequest {
  string pairing_code = 1;
  string device_label = 2;
  string idempotency_key = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string device_label = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string device_label = 3;
  string idempotency_key = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool revoked = 1;
}

message ListDevicesRequest {}

message DeviceSession {
  string family_id = 1;
  string device_label = 2;
  string expires_at = 3;
  bool current = 4;
}

message ListDevicesResponse {
  repeated DeviceSession devices = 1;
}

message RevokeDeviceRequest {
  string family_id = 1;
}

message RevokeDeviceResponse {
  bool revoked = 1;
}

service AuthService {
  rpc Enroll(EnrollRequest) returns (TokenPairResponse);
  rpc RedeemPairingCode(RedeemPairingCodeRequest) returns (TokenPairResponse);
  rpc Register(RegisterRequest) returns (TokenPairResponse);
  rpc Login(LoginRequest) returns (TokenPairResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPairResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);
}

// --- AccountService: entitlement read (TODOS.md C431) ---

message GetEntitlementRequest {}

message GetEntitlementResponse {
  bool active = 1;
  string reason = 2;
  int64 bytes_used = 3;
  int64 bytes_limit = 4;
  string plan_tier = 5;
}

service AccountService {
  rpc GetEntitlement(GetEntitlementRequest) returns (GetEntitlementResponse);
}

// --- BillingService: checkout session (TODOS.md C440) ---

message CreateCheckoutSessionRequest {
  string plan = 1;
  string provider = 2;
}

message CreateCheckoutSessionResponse {
  string checkout_url = 1;
}

service BillingService {
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest) returns (CreateCheckoutSessionResponse);
}

// --- BlobService: artifact transfer off REST (TODOS.md C426) ---

message UploadBlobHeader {
  string hash = 1;
  int64 declared_size_bytes = 2;
  string mime = 3;
  string name = 4;
}

message UploadBlobChunk {
  oneof payload {
    UploadBlobHeader header = 1;
    bytes data = 2;
  }
}

message UploadBlobResponse {
  string hash = 1;
  int64 size = 2;
}

message DownloadBlobRequest {
  string hash = 1;
}

message DownloadBlobChunk {
  bytes data = 1;
}

service BlobService {
  rpc UploadBlob(stream UploadBlobChunk) returns (UploadBlobResponse);
  rpc DownloadBlob(DownloadBlobRequest) returns (stream DownloadBlobChunk);
}
